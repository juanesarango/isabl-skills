igure output. This centralizes field definitions in the model.", "tags": ["center", "metadata", "serializers"], "content": "# Serializer: CenterSerializer\n\nInherits from: IsablSerializer\n\n## Meta\n\n```python\nmodel = models.Center\nread_only_fields = models.Center.get_readonly_fields()\nfields = models.Center.get_serializer_fields()\n```", "source_url": "https://github.com/papaemmelab/isabl_api/blob/master/isabl_api/serializers.py"}, "isabl_api/isabl_api/serializers.py:serializer:SignalSerializer": {"title": "Signal serializer using model-provided fields", "summary": "Serializer for the Signal model that inherits common IsablSerializer behavior and relies on model helper methods for field and read-only configuration. No extra fields are declared in this snippet. The Meta ties the serializer to models.Signal and uses centralized model definitions.", "tags": ["signal", "model-driven", "serializers"], "content": "# Serializer: SignalSerializer\n\nInherits from: IsablSerializer\n\n## Meta\n\n```python\nmodel = models.Signal\nread_only_fields = models.Signal.get_readonly_fields()\nfields = models.Signal.get_serializer_fields()\n```", "source_url": "https://github.com/papaemmelab/isabl_api/blob/master/isabl_api/serializers.py"}, "isabl_api/isabl_api/serializers.py:serializer:DiseaseSerializer": {"title": "Disease serializer exposing model fields and readonlys", "summary": "DiseaseSerializer provides API serialization for the Disease model by inheriting from IsablSerializer and pulling field lists from the model's helper functions. The serializer itself does not define additional fields in this excerpt; Meta uses models.Disease.get_serializer_fields() and get_readonly_fields(). This keeps model-to-API mapping centralized.", "tags": ["disease", "ontology", "serializers"], "content": "# Serializer: DiseaseSerializer\n\nInherits from: IsablSerializer\n\n## Meta\n\n```python\nmodel = models.Disease\nread_only_fields = models.Disease.get_readonly_fields()\nfields = models.Disease.get_serializer_fields()\n```", "source_url": "https://github.com/papaemmelab/isabl_api/blob/master/isabl_api/serializers.py"}, "isabl_api/isabl_api/serializers.py:serializer:GroupSerializer": {"title": "Group serializer mapping Group model fields", "summary": "Defines a serializer for the Group model by inheriting from IsablSerializer. It pulls the model, read-only fields, and the serializer fields dynamically from models.Group via helper methods.", "tags": ["serializer", "group", "models", "isabl"], "content": "# Serializer: GroupSerializer\n\nInherits from: IsablSerializer\n\n## Meta\n\n```python\nmodel = models.Group\nread_only_fields = models.Group.get_readonly_fields()\nfields = models.Group.get_serializer_fields()\n```", "source_url": "https://github.com/papaemmelab/isabl_api/blob/master/isabl_api/serializers.py"}, "isabl_api/isabl_api/serializers.py:serializer:ProjectSerializer": {"title": "Project serializer with sharing and group fields", "summary": "Serializer for the Project model that inherits from IsablSerializer and uses model-driven field lists. It declares a nested GroupSerializer for the group relation and a non-model serializer named 'sharing' handled by ProjectSharingSerializer.", "tags": ["project", "serializer", "nested-fields", "sharing"], "content": "# Serializer: ProjectSerializer\n\nInherits from: IsablSerializer\n\n## Meta\n\n```python\nmodel = models.Project\nread_only_fields = models.Project.get_readonly_fields()\nfields = models.Project.get_serializer_fields()\nnon_model_serializers = ['sharing']\n```\n\n## Declared Fields\n\n- `group`: GroupSerializer(required=False, default=None, allow_null=True)\n- `sharing`: ProjectSharingSerializer()", "source_url": "https://github.com/papaemmelab/isabl_api/blob/master/isabl_api/serializers.py"}, "isabl_api/isabl_api/serializers.py:serializer:ApplicationSerializer": {"title": "Application serializer including assembly and results", "summary": "ApplicationSerializer maps the Application model and declares nested fields including an assembly (nullable) and a 'results' DictField that holds a results specification. The results field defaults to an empty dict and expects each entry to be validated by a ResultSerializer.", "tags": ["application", "serializer", "results", "assembly"], "content": "# Serializer: ApplicationSerializer\n\nInherits from: IsablSerializer\n\n## Meta\n\n```python\nmodel = models.Application\nread_only_fields = models.Application.get_readonly_fields()\nfields = models.Application.get_serializer_fields()\n```\n\n## Declared Fields\n\n- `assembly`: AssemblySerializer(allow_null=True)\n- `results`: serializers.DictField(default=dict, allow_null=True, help_text='Results specification.', child=ResultSerializer(help_text='Each element is a different...", "source_url": "https://github.com/papaemmelab/isabl_api/blob/master/isabl_api/serializers.py"}, "isabl_api/isabl_api/serializers.py:serializer:SubmissionSerializer": {"title": "Submission serializer mapping Submission model fields", "summary": "A straightforward serializer for the Submission model that inherits from IsablSerializer. It sources its fields and read-only settings from models.Submission helper methods.", "tags": ["submission", "serializer", "models", "isabl"], "content": "# Serializer: SubmissionSerializer\n\nInherits from: IsablSerializer\n\n## Meta\n\n```python\nmodel = models.Submission\nread_only_fields = models.Submission.get_readonly_fields()\nfields = models.Submission.get_serializer_fields()\n```", "source_url": "https://github.com/papaemmelab/isabl_api/blob/master/isabl_api/serializers.py"}, "isabl_api/isabl_api/serializers.py:serializer:TechniqueSerializer": {"title": "Technique serializer with reference data and method", "summary": "TechniqueSerializer serializes the Technique model and includes both model-driven fields and a non-model serializer 'reference_data'. It declares a name CharField, a reference_data DictField for technique assets, and a method ChoiceField populated from a lazy choices source.", "tags": ["technique", "reference_data", "method", "serializer"], "content": "# Serializer: TechniqueSerializer\n\nInherits from: IsablSerializer\n\n## Meta\n\n```python\nmodel = models.Technique\nread_only_fields = models.Technique.get_readonly_fields()\nfields = models.Technique.get_serializer_fields()\nnon_model_serializers = ['reference_data']\n```\n\n## Declared Fields\n\n- `name`: serializers.CharField(validators=[], max_length=100, allow_blank=True)\n- `reference_data`: serializers.DictField(default=dict, allow_null=True, help_text='Technique reference assets, each element is a dictionary.', child=ReferenceDataSeriali...\n- `method`: serializers.ChoiceField(choices=lazy_choices('technique_methods'), help_text='Experimental technique method (e.g. WHOLE GENOME SEQUENCING).')", "source_url": "https://github.com/papaemmelab/isabl_api/blob/master/isabl_api/serializers.py"}, "isabl_api/isabl_api/serializers.py:serializer:BaseBioSerializer": {"title": "Base bio serializer adding submission relation", "summary": "BaseBioSerializer extends IsablSerializer and adds a standardized submission relation used by biological entity serializers. It exposes a submission field as a PrimaryKeyRelatedField pointing to models.Submission, allowing null and defaulting to None.", "tags": ["base", "bio", "submission", "serializer"], "content": "# Serializer: BaseBioSerializer\n\nInherits from: IsablSerializer\n\n## Declared Fields\n\n- `submission`: PrimaryKeyRelatedField(queryset=models.Submission.objects.all(), allow_null=True, default=None)", "source_url": "https://github.com/papaemmelab/isabl_api/blob/master/isabl_api/serializers.py"}, "isabl_api/isabl_api/serializers.py:serializer:IndividualSerializer": {"title": "Individual serializer with species and gender", "summary": "IndividualSerializer inherits from BaseBioSerializer and maps the Individual model using dynamic model helpers. It declares nested center data plus species and gender ChoiceFields, where gender defaults to 'UNKNOWN' and choices are provided by lazy choice lookups.", "tags": ["individual", "species", "gender", "serializer"], "content": "# Serializer: IndividualSerializer\n\nInherits from: BaseBioSerializer\n\n## Meta\n\n```python\nmodel = models.Individual\nread_only_fields = models.Individual.get_readonly_fields()\nfields = models.Individual.get_serializer_fields()\n```\n\n## Declared Fields\n\n- `center`: CenterSerializer()\n- `species`: serializers.ChoiceField(choices=lazy_choices('species'), help_text='Individual species.')\n- `gender`: serializers.ChoiceField(default='UNKNOWN', choices=lazy_choices('genders'), help_text='Individual species.')", "source_url": "https://github.com/papaemmelab/isabl_api/blob/master/isabl_api/serializers.py"}, "isabl_api/isabl_api/serializers.py:serializer:SampleSerializer": {"title": "Sample serializer linking individual, disease, category", "summary": "SampleSerializer is a BaseBioSerializer-derived serializer for the Sample model that includes nested IndividualSerializer and DiseaseSerializer fields. It also exposes a category ChoiceField with choices loaded lazily from sample_categories.", "tags": ["sample", "individual", "category", "serializer"], "content": "# Serializer: SampleSerializer\n\nInherits from: BaseBioSerializer\n\n## Meta\n\n```python\nmodel = models.Sample\nread_only_fields = models.Sample.get_readonly_fields()\nfields = models.Sample.get_serializer_fields()\n```\n\n## Declared Fields\n\n- `individual`: IndividualSerializer()\n- `disease`: DiseaseSerializer()\n- `category`: serializers.ChoiceField(choices=lazy_choices('sample_categories'), help_text='Sample category.')", "source_url": "https://github.com/papaemmelab/isabl_api/blob/master/isabl_api/serializers.py"}, "isabl_api/isabl_api/serializers.py:serializer:AliquotSerializer": {"title": "Aliquot serializer referencing parent sample object", "summary": "AliquotSerializer extends BaseBioSerializer to serialize the Aliquot model and declares a nested SampleSerializer for its sample relationship. Field lists and read-only fields are obtained from the Aliquot model via its helper methods.", "tags": ["aliquot", "sample", "nested-serializer", "bio"], "content": "# Serializer: AliquotSerializer\n\nInherits from: BaseBioSerializer\n\n## Meta\n\n```python\nmodel = models.Aliquot\nread_only_fields = models.Aliquot.get_readonly_fields()\nfields = models.Aliquot.get_serializer_fields()\n```\n\n## Declared Fields\n\n- `sample`: SampleSerializer()", "source_url": "https://github.com/papaemmelab/isabl_api/blob/master/isabl_api/serializers.py"}, "isabl_api/isabl_api/serializers.py:serializer:_Application": {"title": "Compact _Application serializer exposing assembly name", "summary": "_Application is a minimal ModelSerializer for the Application model exposing a small set of fields (pk, name, version, assembly). The assembly field is serialized as a read-only CharField sourced from assembly.name to present the assembly label rather than the full object.", "tags": ["application", "compact", "assembly", "serializer"], "content": "# Serializer: _Application\n\nInherits from: serializers.ModelSerializer\n\n## Meta\n\n```python\nmodel = models.Application\nfields = ['pk', 'name', 'version', 'assembly']\n```\n\n## Declared Fields\n\n- `assembly`: serializers.CharField(source='assembly.name', read_only=True)", "source_url": "https://github.com/papaemmelab/isabl_api/blob/master/isabl_api/serializers.py"}, "isabl_api/isabl_api/serializers.py:serializer:_Experiment": {"title": "Experiment serializer for minimal experiment representation", "summary": "Defines a minimal ModelSerializer for the Experiment model. The serializer exposes only the primary key (pk) and the system_id fields for lightweight experiment representations.", "tags": ["serializer", "experiment", "ModelSerializer", "fields"], "content": "# Serializer: _Experiment\n\nInherits from: serializers.ModelSerializer\n\n## Meta\n\n```python\nmodel = models.Experiment\nfields = ['pk', 'system_id']\n```", "source_url": "https://github.com/papaemmelab/isabl_api/blob/master/isabl_api/serializers.py"}, "isabl_api/isabl_api/serializers.py:serializer:_Analysis": {"title": "Analysis serializer exposing pk and application field", "summary": "A concise ModelSerializer for the Analysis model that exposes the primary key and the application relationship. The declared application field uses a nested _Application() serializer representation.", "tags": ["serializer", "analysis", "application", "ModelSerializer"], "content": "# Serializer: _Analysis\n\nInherits from: serializers.ModelSerializer\n\n## Meta\n\n```python\nmodel = models.Analysis\nfields = ['pk', 'application']\n```\n\n## Declared Fields\n\n- `application`: _Application()", "source_url": "https://github.com/papaemmelab/isabl_api/blob/master/isabl_api/serializers.py"}, "isabl_api/isabl_api/serializers.py:serializer:AnalysisResultsSerializer": {"title": "Serializer aggregating analysis results and metadata", "summary": "Serializes Analysis objects with rich result-related fields including analyses, application, references, results, status, storage_url, targets, run_time and wait_time. It nests experiments for targets/references and includes a many-to-many analyses field (no longer artificially limited), allowing aggregated result views for downstream consumers.", "tags": ["analysis-results", "nested-serializers", "experiments", "application"], "content": "# Serializer: AnalysisResultsSerializer\n\nInherits from: serializers.ModelSerializer\n\n## Meta\n\n```python\nmodel = models.Analysis\nfields = ['pk', 'analyses', 'application', 'references', 'results', 'status', 'storage_url', 'targets', 'run_time', 'wait_time']\n```\n\n## Declared Fields\n\n- `targets`: _Experiment(many=True)\n- `references`: _Experiment(many=True)\n- `analyses`: _Analysis(many=True, help_text='No longer limited to the first 50 analyses.')\n- `application`: _Application()", "source_url": "https://github.com/papaemmelab/isabl_api/blob/master/isabl_api/serializers.py"}, "isabl_api/isabl_api/serializers.py:serializer:ExperimentSerializer": {"title": "Full experiment serializer with nested relationships", "summary": "A comprehensive Experiment serializer that inherits BaseBioSerializer and includes model-defined serializer fields plus aliquot_id and analytics. It embeds many related nested serializers (sample, technique, platform, center, projects, raw_data) and exposes computed/read-only fields like aliquot identifier, bam_files structure, and an appended results list of succeeded analyses.", "tags": ["experiment", "nested-serializers", "raw_data", "bam_files"], "content": "# Serializer: ExperimentSerializer\n\nInherits from: BaseBioSerializer\n\n## Meta\n\n```python\nmodel = models.Experiment\nread_only_fields = models.Experiment.get_readonly_fields()\nfields = models.Experiment.get_serializer_fields() + ['aliquot_id', 'analytics']\nnon_model_serializers = ['raw_data']\n```\n\n## Declared Fields\n\n- `sample`: SampleSerializer()\n- `technique`: TechniqueSerializer()\n- `platform`: PlatformSerializer()\n- `center`: CenterSerializer()\n- `projects`: ProjectSerializer(many=True, allow_null=False)\n- `raw_data`: RawDataSerializer(many=True, default=None, allow_null=True)\n- `aliquot_id`: serializers.CharField(source='aliquot.identifier', allow_null=True, default=None)\n- `bam_files`: serializers.DictField(default=dict, allow_null=True, help_text='Default bams are a function of Assembly.', child=BamsSerializer(help_text='Default bam...\n- `results`: serializers.ListSerializer(child=AnalysisResultsSerializer(), help_text='Analyses results are appended here as they are marked SUCCEEDED.', read_only=...", "source_url": "https://github.com/papaemmelab/isabl_api/blob/master/isabl_api/serializers.py"}, "isabl_api/isabl_api/serializers.py:serializer:AnalysisSerializer": {"title": "Comprehensive Analysis serializer with nested links", "summary": "An Isabl-specific serializer for Analysis that combines model-derived fields with analytics extras and multiple nested relations. It includes nested application, project- and individual-level analysis links, targets/references as Experiment serializers, a read-only cached_fields JSON blob, an analyses linkage field, a ran_by slug field, and a status choice field with default 'CREATED'.", "tags": ["analysis", "serializer", "nested-relations", "status"], "content": "# Serializer: AnalysisSerializer\n\nInherits from: IsablSerializer\n\n## Meta\n\n```python\nmodel = models.Analysis\nfields = models.Analysis.get_serializer_fields() + ['analytics']\nread_only_fields = models.Analysis.get_readonly_fields() + ['pk', 'cached_fields']\n```\n\n## Declared Fields\n\n- `application`: ApplicationSerializer(validators=[])\n- `project_level_analysis`: ProjectSerializer(allow_null=True, default=None)\n- `individual_level_analysis`: IndividualSerializer(allow_null=True, default=None)\n- `targets`: ExperimentSerializer(many=True, allow_null=True, default=list)\n- `references`: ExperimentSerializer(many=True, allow_null=True, default=list)\n- `cached_fields`: serializers.JSONField(binary=False, required=False, read_only=True)\n- `analyses`: AnalysesField(default=list, allow_null=True, help_text='Linked analyses')\n- `ran_by`: serializers.SlugRelatedField(read_only=False, slug_field='username', allow_null=True, default=None, queryset=User.objects.all())\n- `status`: serializers.ChoiceField(default='CREATED', choices=lazy_choices('status'), help_text='Analysis current status.')", "source_url": "https://github.com/papaemmelab/isabl_api/blob/master/isabl_api/serializers.py"}, "isabl_api/isabl_api/serializers.py:serializer:TreeSerializer": {"title": "Base tree serializer for top-down hierarchical views", "summary": "A top-down ModelSerializer mixin designed to be a base for tree-like representations. It adds common fields used in hierarchical views: tags (read-only many TagSerializer), a flexible JSON data field, and created_by as a read-only slug-related username.", "tags": ["tree", "hierarchy", "tags", "created_by"], "content": "# Serializer: TreeSerializer\n\nInherits from: IsablQueryFieldsMixin, serializers.ModelSerializer\n\nTop down serializers.\n\n## Declared Fields\n\n- `tags`: TagSerializer(many=True, read_only=True)\n- `data`: serializers.JSONField(binary=False, required=False)\n- `created_by`: serializers.SlugRelatedField(read_only=True, slug_field='username')", "source_url": "https://github.com/papaemmelab/isabl_api/blob/master/isabl_api/serializers.py"}, "isabl_api/isabl_api/serializers.py:serializer:ExperimentTreeSerializer": {"title": "Experiment-focused tree serializer with aliquot id", "summary": "A TreeSerializer specialized for Experiment model hierarchical views. It includes technique, platform, center serializers and exposes aliquot_id as a read-only field sourced from the aliquot relationship for easy display in tree contexts.", "tags": ["experiment", "tree", "aliquot", "technique"], "content": "# Serializer: ExperimentTreeSerializer\n\nInherits from: TreeSerializer\n\n## Meta\n\n```python\nmodel = models.Experiment\nfields = models.Experiment.get_serializer_fields()\n```\n\n## Declared Fields\n\n- `technique`: TechniqueSerializer(many=False, read_only=True)\n- `platform`: PlatformSerializer()\n- `center`: CenterSerializer()\n- `aliquot_id`: serializers.ReadOnlyField(source='aliquot.identifier')", "source_url": "https://github.com/papaemmelab/isabl_api/blob/master/isabl_api/serializers.py"}, "isabl_api/isabl_api/serializers.py:serializer:SampleTreeSerializer": {"title": "Sample tree serializer embedding experiment summaries", "summary": "A TreeSerializer specialization for Sample objects that includes disease metadata and an experiment_set of nested ExperimentTreeSerializer entries. It provides a hierarchical view where each sample lists its related experiments in a read-only fashion.", "tags": ["sample", "tree", "disease", "experiments"], "content": "# Serializer: SampleTreeSerializer\n\nInherits from: TreeSerializer\n\n## Meta\n\n```python\nmodel = models.Sample\nfields = models.Sample.get_serializer_fields()\n```\n\n## Declared Fields\n\n- `disease`: DiseaseSerializer()\n- `experiment_set`: ExperimentTreeSerializer(many=True, read_only=True)", "source_url": "https://github.com/papaemmelab/isabl_api/blob/master/isabl_api/serializers.py"}, "isabl_api/isabl_api/serializers.py:serializer:IndividualTreeSerializer": {"title": "Individual tree serializer including samples and center", "summary": "A TreeSerializer for the Individual model that embeds center metadata and a read-only sample_set using SampleTreeSerializer. It provides a hierarchical top-down view where an individual lists its samples and associated metadata for UI or API tree endpoints.", "tags": ["individual", "tree", "samples", "center"], "content": "# Serializer: IndividualTreeSerializer\n\nInherits from: TreeSerializer\n\n## Meta\n\n```python\nmodel = models.Individual\nfields = models.Individual.get_serializer_fields()\n```\n\n## Declared Fields\n\n- `center`: CenterSerializer()\n- `sample_set`: SampleTreeSerializer(many=True, read_only=True)", "source_url": "https://github.com/papaemmelab/isabl_api/blob/master/isabl_api/serializers.py"}, "isabl_api/isabl_api/serializers.py:serializer:SendEmailSerializer": {"title": "Serializer for sending emails and notifications", "summary": "A plain DRF Serializer for composing outbound emails: recipients (list of validated emails), subject, content and an html_template identifier. Each field carries specific length limits to enforce payload size constraints when sending notifications through Isabl.", "tags": ["email", "notifications", "serializer", "recipients"], "content": "# Serializer: SendEmailSerializer\n\nInherits from: serializers.Serializer\n\n## Declared Fields\n\n- `recipients`: serializers.ListField(child=serializers.EmailField(max_length=160500))\n- `subject`: serializers.CharField(max_length=998)\n- `content`: serializers.CharField(max_length=384000)\n- `html_template`: serializers.CharField(max_length=20)", "source_url": "https://github.com/papaemmelab/isabl_api/blob/master/isabl_api/serializers.py"}, "isabl_api/example/views.py:view:FrontendView": {"title": "Frontend template view for Isabl UI", "summary": "A simple TemplateView subclass that renders the frontend template for the Isabl UI. It exposes a get_context_data method to inject custom context into the template rendering.", "tags": ["frontend", "django", "templates", "context"], "content": "# View: FrontendView\n\nInherits from: generic.TemplateView\n\nFrontend template.\n\n## Methods\n\n### get_context_data\n\n```python\ndef get_context_data(self, **kwargs)\n```\n\nGet custom context data.", "source_url": "https://github.com/papaemmelab/isabl_api/blob/master/example/views.py"}, "isabl_api/isabl_api/integrations/views.py:view:ProjectEpic": {"title": "Project JIRA epic integration view", "summary": "Endpoint view that retrieves or creates a JIRA epic associated with a given project. The view is a BaseView subclass and exposes a get(request, pk) method to perform the lookup or creation using the project primary key.", "tags": ["integrations", "jira", "projects", "api"], "content": "# View: ProjectEpic\n\nInherits from: BaseView\n\n## Methods\n\n### get\n\n```python\ndef get(self, request, pk)\n```\n\nGet or create a JIRA epic for a project.", "source_url": "https://github.com/papaemmelab/isabl_api/blob/master/isabl_api/integrations/views.py"}, "isabl_api/isabl_api/integrations/views.py:view:ProjectTicket": {"title": "Create or retrieve Jira ticket for project", "summary": "A BaseView subclass exposing a POST endpoint to get or create a JIRA ticket tied to a project's epic. The view accepts a project identifier and ensures a ticket exists under the project's epic, creating one if needed.", "tags": ["jira", "tickets", "integrations", "api"], "content": "# View: ProjectTicket\n\nInherits from: BaseView\n\n## Methods\n\n### post\n\n```python\ndef post(self, request, pk)\n```\n\nGet or create a jira ticket for a project's epic.", "source_url": "https://github.com/papaemmelab/isabl_api/blob/master/isabl_api/integrations/views.py"}, "isabl_api/isabl_api/integrations/views.py:view:ProjectDrive": {"title": "Google Drive directory integration for projects", "summary": "This BaseView subclass exposes a GET endpoint that retrieves or creates a Google Drive directory for a project. It maps a project (by primary key) to a Drive folder, creating the folder structure when it does not exist.", "tags": ["integrations", "google-drive", "projects", "storage"], "content": "# View: ProjectDrive\n\nInherits from: BaseView\n\n## Methods\n\n### get\n\n```python\ndef get(self, request, pk)\n```\n\nGet or create google drive directory for a project.", "source_url": "https://github.com/papaemmelab/isabl_api/blob/master/isabl_api/integrations/views.py"}, "isabl_api/isabl_api/views/analyses.py:view:BaseResultsView": {"title": "Base view enforcing analysis result download permissions", "summary": "BaseResultsView extends BaseView to add result-download-specific permission requirements by appending CanDownloadResults to the permission classes. It provides a get_analysis helper to check whether the requesting user is allowed to download the results for a particular analysis.", "tags": ["analyses", "permissions", "downloads", "api"], "content": "# View: BaseResultsView\n\nInherits from: BaseView\n\n## Attributes\n\n- `permission_classes` = BaseView.permission_classes + (CanDownloadResults,)\n\n## Methods\n\n### get_analysis\n\n```python\ndef get_analysis(request, pk)\n```\n\nCheck if user can download results for this particular analysis.", "source_url": "https://github.com/papaemmelab/isabl_api/blob/master/isabl_api/views/analyses.py"}, "isabl_api/isabl_api/views/analyses.py:view:ReadAnalysisResult": {"title": "Read analysis result file (cat-like rendering)", "summary": "ReadAnalysisResult inherits from BaseResultsView and provides a GET endpoint to render the contents of a file located within an analysis output directory, similar to a UNIX cat. It relies on the base permission checks to ensure the user is authorized to view the file.", "tags": ["analyses", "results", "file-reading", "api"], "content": "# View: ReadAnalysisResult\n\nInherits from: BaseResultsView\n\n## Methods\n\n### get\n\n```python\ndef get(self, request, pk)\n```\n\ncat-like render file given path relative to analysis output directory.", "source_url": "https://github.com/papaemmelab/isabl_api/blob/master/isabl_api/views/analyses.py"}, "isabl_api/isabl_api/views/analyses.py:view:DownloadAnalysisResult": {"title": "Download analysis result file endpoint", "summary": "DownloadAnalysisResult is a BaseResultsView that exposes a GET endpoint to render a file from an analysis output directory as a downloadable response. It ensures users have the required download permissions before serving the file.", "tags": ["analyses", "downloads", "files", "api"], "content": "# View: DownloadAnalysisResult\n\nInherits from: BaseResultsView\n\n## Methods\n\n### get\n\n```python\ndef get(self, request, pk)\n```\n\nRender file given path relative to analysis output directory.", "source_url": "https://github.com/papaemmelab/isabl_api/blob/master/isabl_api/views/analyses.py"}, "isabl_api/isabl_api/views/analyses.py:view:StreamAnalysisResult": {"title": "Stream analysis result file (HTTP streaming)", "summary": "StreamAnalysisResult extends BaseResultsView and provides a GET endpoint for streaming a file from an analysis output directory, suitable for large files or continuous transfer. The view uses the base permission checks to confirm the requester may access the streamed content.", "tags": ["analyses", "streaming", "large-files", "results"], "content": "# View: StreamAnalysisResult\n\nInherits from: BaseResultsView\n\n## Methods\n\n### get\n\n```python\ndef get(self, request, pk)\n```\n\nRender file given path relative to analysis output directory.", "source_url": "https://github.com/papaemmelab/isabl_api/blob/master/isabl_api/views/analyses.py"}, "isabl_api/isabl_api/views/analyses.py:view:BulkUpdateAnalyses": {"title": "Bulk update analyses statuses efficiently", "summary": "BulkUpdateAnalyses is a BaseView that provides a PATCH endpoint for efficiently updating the status of multiple analyses in a single request. If an analysis status is set to SUBMITTED by the bulk operation, relevant time fields are reset to reflect the new submission state.", "tags": ["analyses", "bulk-operations", "statuses", "api"], "content": "# View: BulkUpdateAnalyses\n\nInherits from: BaseView\n\n## Methods\n\n### patch\n\n```python\ndef patch(self, request)\n```\n\nEfficiently bulk update the status of many analyses.\n\nIf status is SUBMITTED, time fields will be reset.", "source_url": "https://github.com/papaemmelab/isabl_api/blob/master/isabl_api/views/analyses.py"}, "isabl_api/isabl_api/views/analyses.py:view:BaseIGVView": {"title": "Base IGV view for genome visualization integration", "summary": "BaseIGVView extends BaseResultsView to render an IGV (Integrative Genomics Viewer) HTML interface using the igv.html template and TemplateHTMLRenderer. It exposes a render_igv helper for composing the IGV view and overrides dispatch to integrate with request handling and permission checks.", "tags": ["visualization", "IGV", "templates", "analyses"], "content": "# View: BaseIGVView\n\nInherits from: BaseResultsView\n\n## Attributes\n\n- `renderer_classes` = [TemplateHTMLRenderer]\n- `template_name` = 'igv.html'\n\n## Methods\n\n### render_igv\n\n```python\ndef render_igv(self, request, pk)\n```\n### dispatch\n\n```python\ndef dispatch(self, *args, **kwargs)\n```", "source_url": "https://github.com/papaemmelab/isabl_api/blob/master/isabl_api/views/analyses.py"}, "isabl_api/isabl_api/views/analyses.py:view:IGVExperimentView": {"title": "IGV Experiment view for genome visualization", "summary": "Defines a view that renders an Experiment in IGV (Integrative Genomics Viewer). It inherits from BaseIGVView and exposes a GET method that accepts a system_id to load the experiment data into IGV.", "tags": ["IGV", "visualization", "analyses", "views"], "content": "# View: IGVExperimentView\n\nInherits from: BaseIGVView\n\n## Methods\n\n### get\n\n```python\ndef get(self, request, system_id)\n```\n\nView Experiment in IGV.", "source_url": "https://github.com/papaemmelab/isabl_api/blob/master/isabl_api/views/analyses.py"}, "isabl_api/isabl_api/views/analyses.py:view:IGVAnalysisView": {"title": "IGV Analysis view for analysis visualization", "summary": "Provides a view to render an Analysis in IGV. The view inherits from BaseIGVView and exposes a GET endpoint that accepts a primary key to identify the analysis to display in IGV.", "tags": ["IGV", "analyses", "visualization", "views"], "content": "# View: IGVAnalysisView\n\nInherits from: BaseIGVView\n\n## Methods\n\n### get\n\n```python\ndef get(self, request, pk)\n```\n\nView Experiment in IGV.", "source_url": "https://github.com/papaemmelab/isabl_api/blob/master/isabl_api/views/analyses.py"}, "isabl_api/isabl_api/views/assemblies.py:view:StreamAssemblyReference": {"title": "Stream assembly reference file via API endpoint", "summary": "A view that serves files from an assembly reference collection. It inherits from BaseView and provides a GET method that takes a primary key to render or stream the referenced assembly file to the client.", "tags": ["assemblies", "file streaming", "references", "views"], "content": "# View: StreamAssemblyReference\n\nInherits from: BaseView\n\n## Methods\n\n### get\n\n```python\ndef get(self, request, pk)\n```\n\nRender file from assembly reference files.", "source_url": "https://github.com/papaemmelab/isabl_api/blob/master/isabl_api/views/assemblies.py"}, "isabl_api/isabl_api/views/base.py:view:BaseView": {"title": "Base API view with JSON and auth defaults", "summary": "BaseView is a lightweight base class for API views that sets default renderers and enforces authentication. It inherits from Django REST Framework's APIView and configures JSONRenderer, a form-less renderer, and requires authenticated users by default.", "tags": ["base", "authentication", "renderers", "framework"], "content": "# View: BaseView\n\nInherits from: APIView\n\n## Attributes\n\n- `renderer_classes` = (JSONRenderer, FormlessAPIRenderer)\n- `permission_classes` = (permissions.IsAuthenticated,)", "source_url": "https://github.com/papaemmelab/isabl_api/blob/master/isabl_api/views/base.py"}, "isabl_api/isabl_api/views/base.py:view:ModelView": {"title": "Generic model-backed view with helper methods", "summary": "ModelView is a reusable generic view combining BaseView and GenericAPIView to support model-backed endpoints. It documents configurable attributes (model, serializer_class, lookup_field, ordering, permissions) and helper methods to resolve models, serializers, querysets, filters, pagination, and object retrieval at runtime.", "tags": ["models", "serialization", "querysets", "permissions"], "content": "# View: ModelView\n\nInherits from: BaseView, GenericAPIView\n\nA base ModelView.\n\nIf `model` is not provided, then `serializer_class` is required.\n\n## Attributes\n\n- `model` = None\n- `lookup_field` = 'pk'\n- `ordering` = ('id',)\n- `serializer_class` = None\n- `ordering_fields` = '__all__'\n- `permission_classes` = (permissions.IsAuthenticated, permissions.DjangoModelPermissions)\n\n## Methods\n\n### filter_backends\n\n```python\ndef filter_backends(self)\n```\n### pagination_class\n\n```python\ndef pagination_class(self)\n```\n### search_fields\n\n```python\ndef search_fields(self)\n```\n\nUse `get_search_fields` for local models.\n### filter_class\n\n```python\ndef filter_class(self)\n```\n\nGet filter class at run time to be aware of custom fields.\n### get_model\n\n```python\ndef get_model(self)\n```\n\nRetrieve model from serializer if not set.\n### get_queryset\n\n```python\ndef get_queryset(self)\n```\n\nCheck if serializer has `get_optimized_queryset` method.\n### get_object\n\n```python\ndef get_object(self)\n```\n\nGet instance from url option.\n### get_serializer_class\n\n```python\ndef get_serializer_class(self)\n```\n\nIf serializer class was not provided, model is required.", "source_url": "https://github.com/papaemmelab/isabl_api/blob/master/isabl_api/views/base.py"}, "isabl_api/isabl_api/views/base.py:view:RetrieveUpdateDestroyView": {"title": "Retrieve, update, and destroy model instances", "summary": "A composite view that provides retrieve, update, and delete operations for model instances. It inherits ModelView and Django REST Framework's RetrieveUpdateDestroyAPIView to offer standard CRUD endpoints for single objects.", "tags": ["CRUD", "retrieve", "update", "destroy"], "content": "# View: RetrieveUpdateDestroyView\n\nInherits from: ModelView, RetrieveUpdateDestroyAPIView\n\nRetrieve and update objects.", "source_url": "https://github.com/papaemmelab/isabl_api/blob/master/isabl_api/views/base.py"}, "isabl_api/isabl_api/views/base.py:view:RetrieveView": {"title": "Read-only retrieve view for single objects", "summary": "Provides a read-only endpoint to retrieve a single model instance. RetrieveView combines ModelView with DRF's RetrieveAPIView to enforce serializer/model resolution and authentication while allowing only GET retrieval.", "tags": ["retrieve", "read-only", "endpoints", "models"], "content": "# View: RetrieveView\n\nInherits from: ModelView, RetrieveAPIView\n\nRead only retrieve view.", "source_url": "https://github.com/papaemmelab/isabl_api/blob/master/isabl_api/views/base.py"}, "isabl_api/isabl_api/views/base.py:view:ListCreateView": {"title": "List and create view with deduplication behavior", "summary": "ListCreateView implements listing of objects and creation with special get-or-create semantics. The GET method lists objects, while POST will either create new objects or return existing ones matched by primary key or unique-together constraints; if an existing object is returned, the posted data will not update it.", "tags": ["list", "create", "idempotency", "endpoints"], "content": "# View: ListCreateView\n\nInherits from: ModelView, ListCreateAPIView\n\nList and create objects.\n\n## Methods\n\n### get\n\n```python\ndef get(self, *args, **kwargs)\n```\n\nList objects.\n### post\n\n```python\ndef post(self, *args, **kwargs)\n```\n\nGet or create objects.\n\nExisting objects are retrieved using either the `pk` field or unique\ntogether constraints. If the view supports nested objects, these will\nalso be retrieved or created using the same criteria.\n\n\u26a0\ufe0f **IMPORTANT**: If an existing object is retrieved, its fields\n**won't** be updated with the posted data.", "source_url": "https://github.com/papaemmelab/isabl_api/blob/master/isabl_api/views/base.py"}, "isabl_api/isabl_api/views/base.py:view:ListView": {"title": "List view for querying model collections", "summary": "A simple view that lists model instances, combining ModelView with DRF's ListAPIView. It provides standard list behavior, inheriting authentication, serializer/model resolution, and filtering capabilities from ModelView.", "tags": ["list", "query", "pagination", "models"], "content": "# View: ListView\n\nInherits from: ModelView, ListAPIView\n\nList objects.", "source_url": "https://github.com/papaemmelab/isabl_api/blob/master/isabl_api/views/base.py"}, "isabl_api/isabl_api/views/base.py:view:AuthenticateUser": {"title": "Endpoint to authenticate and verify users", "summary": "AuthenticateUser is a small view that performs user authentication checks. It inherits from BaseView and exposes a GET method intended to authenticate or verify the current user session or token.", "tags": ["authentication", "users", "session", "endpoints"], "content": "# View: AuthenticateUser\n\nInherits from: BaseView\n\n## Methods\n\n### get\n\n```python\ndef get(self, *args, **kwargs)\n```\n\nAuthenticate user.", "source_url": "https://github.com/papaemmelab/isabl_api/blob/master/isabl_api/views/base.py"}, "isabl_api/isabl_api/views/base.py:view:UserPreferences": {"title": "User Preferences Retrieve and Update API View", "summary": "Defines a view for retrieving and updating a user's preferences. It subclasses BaseView and RetrieveUpdateAPIView and uses the PreferencesSerializer. The get_object method resolves the preferences instance using request.user.", "tags": ["user-preferences", "API", "Django-REST", "serialization"], "content": "# View: UserPreferences\n\nInherits from: BaseView, RetrieveUpdateAPIView\n\n## Attributes\n\n- `serializer_class` = serializers.PreferencesSerializer\n\n## Methods\n\n### get_object\n\n```python\ndef get_object(self)\n```\n\nUse request.user to find preferences object.", "source_url": "https://github.com/papaemmelab/isabl_api/blob/master/isabl_api/views/base.py"}, "isabl_api/isabl_api/views/emails.py:view:SendEmail": {"title": "Send No-Reply Email via Mailgun Backend", "summary": "Implements an API endpoint that sends a no-reply email using the Django Mailgun backend. The view inherits from BaseView and exposes a post method that sends the message. The endpoint returns a value of 1 when the message is sent successfully.", "tags": ["email", "mailgun", "notifications", "API"], "content": "# View: SendEmail\n\nInherits from: BaseView\n\n## Methods\n\n### post\n\n```python\ndef post(self, request)\n```\n\nSends a no reply email with django mailgun backend.\n\nEndpoint returns a 1 if the message is successfully sent.", "source_url": "https://github.com/papaemmelab/isabl_api/blob/master/isabl_api/views/emails.py"}, "isabl_api/isabl_api/views/registration.py:view:RegistrationSettings": {"title": "Public Registration Settings API View (AllowAny)", "summary": "Provides a public API endpoint to expose registration settings. The view inherits from Django REST Framework's APIView and sets permission_classes to AllowAny. A get method is implemented to retrieve the settings.", "tags": ["registration", "settings", "API", "authentication"], "content": "# View: RegistrationSettings\n\nInherits from: APIView\n\n## Attributes\n\n- `permission_classes` = [AllowAny]\n\n## Methods\n\n### get\n\n```python\ndef get(self, *args, **kwargs)\n```", "source_url": "https://github.com/papaemmelab/isabl_api/blob/master/isabl_api/views/registration.py"}, "isabl_api/isabl_api/views/registration.py:view:ConfirmEmailView": {"title": "Confirm Email Endpoint and Lookup Logic", "summary": "Defines the confirm-email endpoint used to validate and confirm user email addresses. The view inherits from APIView, allows any user (AllowAny), and implements get, get_object, and get_queryset methods to locate and operate on the relevant confirmation records. These methods encapsulate the logic for fetching the confirmation instance and handling GET confirmation requests.", "tags": ["email-confirmation", "registration", "API", "authentication"], "content": "# View: ConfirmEmailView\n\nInherits from: APIView\n\n## Attributes\n\n- `permission_classes` = [AllowAny]\n\n## Methods\n\n### get\n\n```python\ndef get(self, *args, **kwargs)\n```\n### get_object\n\n```python\ndef get_object(self, queryset=None)\n```\n### get_queryset\n\n```python\ndef get_queryset(self)\n```", "source_url": "https://github.com/papaemmelab/isabl_api/blob/master/isabl_api/views/registration.py"}, "isabl_api/isabl_api/views/submissions.py:view:DownloadSubmissionForm": {"title": "Download Submission Excel Template Endpoint", "summary": "Provides an endpoint to download the submission_form Excel template used for batch submissions. The view subclasses BaseView and implements a GET method to return the template file. This endpoint is intended for users preparing submission spreadsheets.", "tags": ["submissions", "templates", "excel", "API"], "content": "# View: DownloadSubmissionForm\n\nInherits from: BaseView\n\n## Methods\n\n### get\n\n```python\ndef get(self, *args, **kwargs)\n```\n\nDownload `submission_form` excel template.", "source_url": "https://github.com/papaemmelab/isabl_api/blob/master/isabl_api/views/submissions.py"}, "isabl_api/isabl_api/views/submissions.py:view:ProcessSubmissionForm": {"title": "Process Submission Excel Form and Create Objects", "summary": "Accepts and processes a filled submission_form Excel file to create objects in the system. The view inherits from BaseView and exposes a POST endpoint that takes a primary key and the uploaded form, creates resources accordingly, and returns the submission object. The response includes a data field reporting any errors encountered during processing.", "tags": ["submissions", "import", "excel", "API"], "content": "# View: ProcessSubmissionForm\n\nInherits from: BaseView\n\n## Methods\n\n### post\n\n```python\ndef post(self, request, pk)\n```\n\nCreate objects using `submission_form` excel file.\n\nThis endpoint returns the submission object, see the `data` field for\nreported errors.", "source_url": "https://github.com/papaemmelab/isabl_api/blob/master/isabl_api/views/submissions.py"}, "isabl_api/isabl_api/urls/base.py:urls": {"title": "API URL Patterns and Model Route Generation", "summary": "Lists the top-level URL patterns for the Isabl API and shows how model-specific routes are generated. It documents endpoints for analyses (download, raw, stream, IGV), assemblies, system_id redirect, individuals tree, submissions processing, registration settings, send_email, and a helper get_models_patterns() that auto-creates list/detail routes for registered models (excluding preferences). The file also defines named path constants used across the API.", "tags": ["routing", "urls", "endpoints", "Django"], "content": "# URL Configuration: isabl_api/urls/base.py\n\n## URL Patterns\n\n- `{0}/<id>`\n- `analyses/bulk_update/`\n- `analyses/download/<int:pk>`\n- `analyses/raw/<int:pk>`\n- `analyses/stream/<int:pk>`\n- `analyses/igv/<int:pk>`\n- `assemblies/stream/<int:pk>`\n- `system_id/<system_id>`\n- `individuals/tree/<id>`\n- `submissions/process/<int:pk>`\n- `warmup`\n- `rest-auth/registration/settings`\n- `send_email`\n\n## Full Source\n\n```python\nfrom django.conf.urls import include\nfrom django.conf.urls import url\nfrom django.urls import path\n\nfrom isabl_api import serializers\nfrom isabl_api import views\n\n\ndef _get_plural_slug(model):\n    return model._meta.verbose_name_plural.lower().replace(\" \", \"_\")\n\n\ndef get_models_patterns():\n    \"\"\"Get URLs for models returned by :function:`.get_models_serializers`.\"\"\"\n    models_urls = []\n\n    for model, serializer in serializers.get_models_serializers().items():\n        if serializer != serializers.PreferencesSerializer:\n            plural_name = _get_plural_slug(model)\n            models_urls += [\n                path(\n                    \"{0}/<id>\".format(plural_name),\n                    name=f\"{plural_name}_detail\",\n                    view=views.RetrieveUpdateDestroyView.as_view(model=model),\n                ),\n                url(\n                    r\"^{0}$\".format(plural_name),\n                    name=f\"{plural_name}_list\",\n                    view=views.ListCreateView.as_view(model=model),\n                ),\n            ]\n\n    return models_urls\n\n\nANALYSES_BULK_UPDATE = path(\n    \"analyses/bulk_update/\",\n    views.BulkUpdateAnalyses.as_view(),\n    name=\"analyses_bulk_update\",\n)\n\nANALYSES_DOWNLOAD = path(\n    \"analyses/download/<int:pk>\",\n    views.DownloadAnalysisResult.as_view(),\n    name=\"analyses_download\",\n)\n\nANALYSES_RAW = path(\n    \"analyses/raw/<int:pk>\", views.ReadAnalysisResult.as_view(), name=\"analyses_raw\"\n)\n\nANALYSES_STREAM = path(\n    \"analyses/stream/<int:pk>\",\n    views.StreamAnalysisResult.as_view(),\n    name=\"analyses_stream\",\n)\n\nANALYSES_IGV = path(\n    \"analyses/igv/<int:pk>\", views.IGVAnalysisView.as_view(), name=\"analyses_igv\"\n)\n\nASSEMBLIES_REFERENCE_STREAM = path(\n    \"assemblies/stream/<int:pk>\",\n    views.StreamAssemblyReference.as_view(),\n    name=\"assemblies_reference_stream\",\n)\n\nSYSTEM_ID_DETAIL = path(\n    \"system_id/<system_id>\", views.base.system_id_redirect, name=\"system_id_detail\"\n)\n\nEXPERIMENTS_IGV = url(\n    r\"^experiments/igv/(?P<system_id>[\\w.@+-]+)$\",\n    views.IGVExperimentView.as_view(),\n    name=\"experiments_igv\",\n)\n\nAUTHENTICATE = url(r\"^auth/$\", views.AuthenticateUser.as_view(), name=\"authenticate\")\n\nUSER_PREFERENCES = url(\n    r\"^preferences/$\", views.UserPreferences.as_view(), name=\"preferences\"\n)\n\nINDIVIDUALS_TREE = path(\n    \"individuals/tree/<id>\",\n    name=\"individuals_tree\",\n    view=views.RetrieveView.as_view(\n        serializer_class=serializers.IndividualTreeSerializer\n    ),\n)\n\nINDIVIDUALS_TREE_LIST = url(\n    r\"^individuals/tree$\",\n    name=\"individuals_tree\",\n    view=views.ListView.as_view(serializer_class=serializers.IndividualTreeSerializer),\n)\n\nPROCESS_SUBMISSIONS = path(\n    \"submissions/process/<int:pk>\",\n    views.ProcessSubmissionForm.as_view(),\n    name=\"submissions_process\",\n)\n\nDOWNLOAD_SUBMISSION_FORM = url(\n    r\"^submissions/download/?$\",\n    views.DownloadSubmissionForm.as_view(),\n    name=\"submissions_download\",\n)\n\nWARMUP = path(\"warmup\", views.base.warmup, name=\"warmup\")\n\n# models URL patterns\nMODELPATTERNS = [\n    SYSTEM_ID_DETAIL,\n    INDIVIDUALS_TREE,\n    INDIVIDUALS_TREE_LIST,\n] + get_models_patterns()\n\n# third party URLs\nACCOUNT_ALL_AUTH = url(r\"^account/\", include(\"allauth.urls\"), name=\"auth_account\")\n\nREST_AUTH = url(r\"^rest-auth/\", include(\"rest_auth.urls\"), name=\"rest_auth\")\n\n# See https://stackoverflow.com/a/29505964/3949081\nREST_AUTH_DEPENDENCY = url(r\"^\", include(\"django.contrib.auth.urls\"))\n\nREST_FRAMEWORK_AUTH = url(\n    r\"^api-auth/\", include(\"rest_framework.urls\"), name=\"rest_framework\"\n)\n\nREGISTRATION_AUTH = url(\n    r\"^rest-auth/registration/\",\n    include(\"rest_auth.registration.urls\"),\n    name=\"registration_auth\",\n)\n\nCONFIRM_EMAIL = url(\n    r\"^rest-auth/registration/account-confirm-email/(?P<key>[-:\\w]+)/$\",\n    views.ConfirmEmailView.as_view(),\n    name=\"account_verify_email\",\n)\n\nREGISTRATION_SETTINGS = path(\n    \"rest-auth/registration/settings\",\n    views.RegistrationSettings.as_view(),\n    name=\"registration_settings\",\n)\n\nSEND_EMAIL = path(\n    \"send_email\",\n    views.SendEmail.as_view(),\n    name=\"send_email\",\n)\n\n\n```", "source_url": "https://github.com/papaemmelab/isabl_api/blob/master/isabl_api/urls/base.py"}};

const COLORS = ['#1f6feb','#238636','#a371f7','#f0883e','#f85149','#79c0ff','#56d364','#d2a8ff'];

function countDocs(d) {
  let n = (d.documents || []).length;
  (d.children || []).forEach(c => n += countDocs(c));
  return n;
}

// Prepare hierarchy
const root = d3.hierarchy(TREE, d => d.children);
root.each(d => { d.data._docs = countDocs(d.data); });

// Store original children for collapse/expand
root.each(d => { d._children = d.children; });
// Start with first level expanded
root.children?.forEach(c => { c.children?.forEach(gc => collapse(gc)); });

function collapse(d) {
  if (d.children) {
    d._children = d.children;
    d._children.forEach(collapse);
    d.children = null;
  }
}
function expand(d) {
  if (d._children) {
    d.children = d._children;
    d.children.forEach(expand);
  }
}

const svg = d3.select('#svg');
const g = svg.append('g');
const zoom = d3.zoom().scaleExtent([0.1, 3]).on('zoom', e => g.attr('transform', e.transform));
svg.call(zoom);

const nodeW = 180, nodeH = 36, sepH = 8, sepV = 12;

function update(source) {
  const treemap = d3.tree().nodeSize([nodeH + sepH, nodeW + sepV]);
  const treeData = treemap(root);
  const nodes = treeData.descendants();
  const links = treeData.links();

  // Swap x/y for horizontal layout
  nodes.forEach(d => { const tmp = d.x; d.x = d.y; d.y = tmp; });

  // Links
  const link = g.selectAll('.link').data(links, d => d.target.data.id || d.target.data.title);
  link.exit().remove();
  const linkEnter = link.enter().append('path').attr('class', 'link');
  linkEnter.merge(link).transition().duration(300).attr('d', d => {
    return `M${d.source.x + nodeW/2},${d.source.y}
            C${(d.source.x + d.target.x + nodeW) / 2},${d.source.y}
             ${(d.source.x + d.target.x + nodeW) / 2},${d.target.y}
             ${d.target.x},${d.target.y}`;
  });

  // Nodes
  const node = g.selectAll('.node-group').data(nodes, d => d.data.id || d.data.title);
  node.exit().remove();

  const nodeEnter = node.enter().append('g').attr('class', 'node-group');

  nodeEnter.append('rect').attr('class', 'node-rect');
  nodeEnter.append('text').attr('class', 'node-label');
  nodeEnter.append('text').attr('class', 'node-badge');
  nodeEnter.append('text').attr('class', 'node-collapse');

  const nodeAll = nodeEnter.merge(node);

  nodeAll.transition().duration(300)
    .attr('transform', d => `translate(${d.x},${d.y - nodeH/2})`);

  nodeAll.select('.node-rect')
    .attr('width', nodeW).attr('height', nodeH)
    .attr('fill', d => {
      const idx = root.children ? root.children.indexOf(d.ancestors().find(a => a.depth === 1)) : 0;
      const c = COLORS[idx % COLORS.length];
      return d.depth === 0 ? '#1f6feb' : c + (d.children || d._children ? '33' : '1a');
    })
    .attr('stroke', d => {
      const idx = root.children ? root.children.indexOf(d.ancestors().find(a => a.depth === 1)) : 0;
      return d.depth === 0 ? '#58a6ff' : COLORS[idx % COLORS.length] + '88';
    });

  nodeAll.select('.node-label')
    .attr('x', 10).attr('y', nodeH/2 + 1)
    .attr('dominant-baseline', 'middle')
    .text(d => {
      const t = d.data.title;
      return t.length > 22 ? t.slice(0, 20) + '...' : t;
    });

  nodeAll.select('.node-badge')
    .attr('x', nodeW - 8).attr('y', nodeH/2 + 1)
    .attr('text-anchor', 'end').attr('dominant-baseline', 'middle')
    .text(d => d.data._docs ? d.data._docs : '');

  nodeAll.select('.node-collapse')
    .attr('x', nodeW - 8).attr('y', 11)
    .attr('text-anchor', 'end')
    .text(d => d._children && !d.children ? '+' : '');

  // Interactions
  nodeAll.on('click', (e, d) => {
    if (d.depth === 0) return;
    if (d.children) {
      d._children = d.children;
      d.children = null;
    } else if (d._children) {
      d.children = d._children;
    }
    update(d);
    e.stopPropagation();
  });

  nodeAll.on('mouseover', (e, d) => {
    const tt = document.getElementById('tooltip');
    tt.style.display = 'block';
    tt.innerHTML =
      '<div class="tt-title">' + d.data.title + '</div>' +
      (d.data.summary ? '<div class="tt-summary">' + d.data.summary + '</div>' : '') +
      (d.data._docs ? '<div class="tt-docs">' + d.data._docs + ' documents</div>' : '') +
      '<div class="tt-hint">Click to expand/collapse. Double-click for details.</div>';
  });

  nodeAll.on('mousemove', e => {
    const tt = document.getElementById('tooltip');
    tt.style.left = (e.clientX + 15) + 'px';
    tt.style.top = (e.clientY + 15) + 'px';
  });

  nodeAll.on('mouseout', () => {
    document.getElementById('tooltip').style.display = 'none';
  });

  nodeAll.on('dblclick', (e, d) => {
    showPanel(d.data);
    e.stopPropagation();
  });
}

function toggleContent(id) {
  const el = document.getElementById(id);
  const btn = el.previousElementSibling;
  if (el.style.display === 'none') {
    el.style.display = 'block';
    btn.textContent = 'Hide content';
  } else {
    el.style.display = 'none';
    btn.textContent = 'Show content';
  }
}

function showPanel(data) {
  const panel = document.getElementById('panel');
  const content = document.getElementById('panel-content');
  let html = '<h2>' + data.title + '</h2>';
  if (data.summary) html += '<p class="p-summary">' + data.summary + '</p>';

  const docIds = data.documents || [];
  if (docIds.length) {
    html += '<h3 style="font-size:0.85rem;margin-bottom:0.5rem;">Documents (' + docIds.length + ')</h3>';
    docIds.forEach(id => {
      const doc = DOCS[id];
      if (!doc) return;
      const cid = 'doc-content-' + id.replace(/[^a-zA-Z0-9]/g, '_');
      html += '<div class="doc-item">' +
        '<div class="doc-title">' + (doc.title || id) + '</div>' +
        (doc.source_url ? '<a class="doc-link" href="' + doc.source_url + '" target="_blank">View source</a>' : '') +
        (doc.summary ? '<div class="doc-summary">' + doc.summary + '</div>' : '') +
        (doc.tags?.length ? '<div class="doc-tags">' +
          doc.tags.map(t => '<span class="tag">' + t + '</span>').join('') + '</div>' : '') +
        (doc.content ? '<button class="doc-content-toggle" onclick="toggleContent(\'' + cid + '\')">Show content</button>' +
          '<div class="doc-content" id="' + cid + '" style="display:none">' +
          doc.content.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;") + '</div>' : '') +
        '</div>';
    });
  }
  content.innerHTML = html;
  panel.classList.add('open');
}

document.getElementById('panel-close').onclick = () =>
  document.getElementById('panel').classList.remove('open');

document.getElementById('btn-expand').onclick = () => { root.each(d => { if (d._children) d.children = d._children; }); update(root); };
document.getElementById('btn-collapse').onclick = () => { root.children?.forEach(c => { collapse(c); }); update(root); };
document.getElementById('btn-fit').onclick = fitView;

function fitView() {
  const bounds = g.node().getBBox();
  const parent = svg.node().getBoundingClientRect();
  const scale = Math.min(
    parent.width / (bounds.width + 100),
    parent.height / (bounds.height + 100),
    1.5
  );
  const tx = parent.width / 2 - (bounds.x + bounds.width / 2) * scale;
  const ty = parent.height / 2 - (bounds.y + bounds.height / 2) * scale;
  svg.transition().duration(500).call(
    zoom.transform, d3.zoomIdentity.translate(tx, ty).scale(scale)
  );
}

// Init
update(root);
setTimeout(fitView, 100);

document.getElementById('stats').textContent =
  root.descendants().length + ' nodes \u00B7 ' + countDocs(TREE) + ' documents';
</script>
</body>
</html>
