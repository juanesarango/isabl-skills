<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Isabl Knowledge Tree</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #0d1117; color: #e6edf3; overflow: hidden;
  }
  #header {
    position: fixed; top: 0; left: 0; right: 0; z-index: 10;
    background: #0d1117ee; backdrop-filter: blur(8px);
    padding: 1rem 1.5rem; display: flex; align-items: center; gap: 1rem;
    border-bottom: 1px solid #21262d;
  }
  h1 { font-size: 1.2rem; white-space: nowrap; }
  .controls { display: flex; gap: 0.5rem; }
  .btn {
    padding: 0.3rem 0.7rem; background: #21262d; border: 1px solid #30363d;
    color: #8b949e; border-radius: 6px; cursor: pointer; font-size: 0.75rem;
  }
  .btn:hover { background: #30363d; color: #e6edf3; }
  .stats { color: #8b949e; font-size: 0.75rem; margin-left: auto; }
  #canvas { width: 100vw; height: 100vh; padding-top: 52px; }
  svg { width: 100%; height: 100%; }

  .link { fill: none; stroke: #30363d; stroke-width: 1.5; }
  .node-group { cursor: pointer; }
  .node-rect {
    rx: 6; ry: 6; stroke-width: 1.5;
    transition: filter 0.15s;
  }
  .node-group:hover .node-rect { filter: brightness(1.2); }
  .node-label {
    font-size: 11px; fill: #e6edf3; font-weight: 500;
    pointer-events: none;
  }
  .node-badge {
    font-size: 9px; fill: #8b949e; pointer-events: none;
  }
  .node-collapse {
    font-size: 10px; fill: #58a6ff; pointer-events: none;
  }

  /* Tooltip */
  #tooltip {
    position: fixed; pointer-events: none; z-index: 20;
    background: #161b22; border: 1px solid #30363d; border-radius: 8px;
    padding: 0.8rem 1rem; max-width: 350px; display: none;
    box-shadow: 0 4px 12px #00000066;
  }
  #tooltip .tt-title { font-weight: 600; font-size: 0.85rem; margin-bottom: 0.3rem; }
  #tooltip .tt-summary { color: #8b949e; font-size: 0.8rem; margin-bottom: 0.4rem; }
  #tooltip .tt-docs { font-size: 0.75rem; color: #58a6ff; }
  #tooltip .tt-hint { font-size: 0.7rem; color: #484f58; margin-top: 0.4rem; }

  /* Detail panel */
  #panel {
    position: fixed; top: 52px; right: 0; width: 380px; height: calc(100vh - 52px);
    background: #161b22; border-left: 1px solid #30363d; z-index: 15;
    overflow-y: auto; padding: 1.5rem; display: none;
  }
  #panel.open { display: block; }
  #panel .close {
    position: absolute; top: 0.8rem; right: 0.8rem; background: none;
    border: none; color: #8b949e; font-size: 1.2rem; cursor: pointer;
  }
  #panel h2 { font-size: 1rem; margin-bottom: 0.5rem; }
  #panel .p-summary { color: #8b949e; font-size: 0.85rem; margin-bottom: 1rem; }
  .doc-item {
    margin: 0.5rem 0; padding: 0.5rem 0.7rem; background: #0d1117;
    border-radius: 4px; border-left: 3px solid #1f6feb;
  }
  .doc-title { font-weight: 500; font-size: 0.8rem; }
  .doc-summary { font-size: 0.75rem; color: #8b949e; margin-top: 0.2rem; }
  .doc-tags { margin-top: 0.3rem; }
  .tag {
    display: inline-block; font-size: 0.65rem; background: #30363d;
    color: #8b949e; padding: 0.1rem 0.35rem; border-radius: 3px; margin: 0.1rem;
  }
  .doc-content {
    margin-top: 0.4rem; padding: 0.5rem; background: #0d1117;
    border: 1px solid #21262d; border-radius: 4px;
    font-size: 0.72rem; color: #c9d1d9; max-height: 200px;
    overflow-y: auto; white-space: pre-wrap; word-break: break-word;
    font-family: 'SFMono-Regular', Consolas, monospace; line-height: 1.4;
  }
  .doc-content-toggle {
    font-size: 0.7rem; color: #58a6ff; cursor: pointer;
    margin-top: 0.3rem; border: none; background: none; padding: 0;
  }
  .doc-content-toggle:hover { text-decoration: underline; }
  .doc-link {
    display: inline-block; margin-top: 0.3rem; font-size: 0.72rem;
    color: #58a6ff; text-decoration: none;
  }
  .doc-link:hover { text-decoration: underline; }
</style>
</head>
<body>

<div id="header">
  <h1>Isabl Knowledge Tree</h1>
  <div class="controls">
    <button class="btn" id="btn-expand">Expand All</button>
    <button class="btn" id="btn-collapse">Collapse All</button>
    <button class="btn" id="btn-fit">Fit View</button>
  </div>
  <span class="stats" id="stats"></span>
</div>

<div id="canvas"><svg id="svg"></svg></div>
<div id="tooltip"></div>
<div id="panel"><button class="close" id="panel-close">&times;</button><div id="panel-content"></div></div>

const DOCS = {"isabl_cli/isabl_cli/api.py:isablfy": {"title": "Recursive conversion to IsablDict utility function", "summary": "isablfy converts arbitrary Python objects into IsablDict representations recursively. It is used to normalize nested data structures (e.g., API responses or model objects) into the Isabl expected dictionary-like format for downstream processing or serialization.", "tags": ["utilities", "serialization", "data-models", "python"], "content": "# isablfy\n\n```python\ndef isablfy(obj)\n```\n\nConvert objects to IsablDicts recursively.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/api.py"}, "isabl_cli/isabl_cli/api.py:chunks": {"title": "Array chunking helper yields fixed-size groups", "summary": "chunks splits an input array into successive n-sized pieces and yields each piece in turn. It's a small utility useful for batching operations (for example batching IDs into requests) while avoiding copying the entire sequence.", "tags": ["utils", "iteration", "batching", "python"], "content": "# chunks\n\n```python\ndef chunks(array, size)\n```\n\nYield successive n-sized chunks from ``array``.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/api.py"}, "isabl_cli/isabl_cli/api.py:get_api_url": {"title": "Resolve and normalize base API URL", "summary": "get_api_url returns a normalized API URL suitable for client requests. It ensures the provided URL is in the correct form (trailing slashes, base path) so other API helpers can construct endpoints consistently.", "tags": ["api", "urls", "configuration", "cli"], "content": "# get_api_url\n\n```python\ndef get_api_url(url)\n```\n\nGet an API URL.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/api.py"}, "isabl_cli/isabl_cli/api.py:retry_request": {"title": "Retry wrapper for HTTP request operations", "summary": "retry_request wraps HTTP calls and retries them multiple times to improve robustness against transient failures. It accepts a request method and keyword arguments and will attempt repeated calls (optionally with backoff) until success or timeout.", "tags": ["retries", "network", "requests", "robustness"], "content": "# retry_request\n\n```python\ndef retry_request(method, **kwargs)\n```\n\nRetry request operation multiple times.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/api.py"}, "isabl_cli/isabl_cli/api.py:get_token_headers": {"title": "Obtain and cache API token in home", "summary": "get_token_headers retrieves an API token and stores it in the user's home directory for reuse, returning HTTP headers (e.g., Authorization) ready for authenticated requests. This centralizes token retrieval/caching to streamline authenticated API calls from CLI tools.", "tags": ["auth", "tokens", "security", "cli"], "content": "# get_token_headers\n\n```python\ndef get_token_headers()\n```\n\nGet an API token and store it in user's home directory.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/api.py"}, "isabl_cli/isabl_cli/api.py:send_analytics": {"title": "Send user identity and group analytics", "summary": "send_analytics transmits telemetry about the user's identity and group membership to the analytics service. It is intended to collect usage data for the CLI or platform and typically runs when a user performs certain operations.", "tags": ["analytics", "telemetry", "usage", "privacy"], "content": "# send_analytics\n\n```python\ndef send_analytics(user)\n```\n\nSend analytics about the identity and group of the user.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/api.py"}, "isabl_cli/isabl_cli/api.py:api_request": {"title": "Generic API request with naive retry logic", "summary": "api_request performs HTTP requests to the API with built-in, simple retry logic and optional authentication. It centralizes request behavior (headers, retries, error handling) so callers can execute API operations with consistent semantics.", "tags": ["api", "requests", "retries", "auth"], "content": "# api_request\n\n```python\ndef api_request(method, url, authenticate=True, **kwargs)\n```\n\nPerform any request operation using a naive retry implementation.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/api.py"}, "isabl_cli/isabl_cli/api.py:process_api_filters": {"title": "Convert keyword filters to requests params", "summary": "process_api_filters converts function keyword filter arguments into a requests-compatible params dictionary for API queries. It takes name/value pairs used for filtering and returns properly formatted query parameters to be appended to GET requests.", "tags": ["filters", "api", "query-params", "utils"], "content": "# process_api_filters\n\n```python\ndef process_api_filters(**filters)\n```\n\nProcess filters for API.\n\nArguments:\n    filters (dict): name, value pairs for API filtering.\n\nReturns:\n    dict: a `requests` formatted `params` dict.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/api.py"}, "isabl_cli/isabl_cli/api.py:iterate": {"title": "Paginated API iterator yielding all results", "summary": "iterate walks through a paginated API endpoint and yields each object in the 'results' key across pages. It accepts URL and filter parameters, handling pagination transparently so callers can stream or collect all items without manual page handling.", "tags": ["pagination", "api", "iteration", "streaming"], "content": "# iterate\n\n```python\ndef iterate(url, **filters)\n```\n\nIterate through a paginated API endpoint and yield instances.\n\nArguments:\n    url (str): API URL address.\n    filters (dict): name, value pairs for API filtering.\n\nReturns:\n    list: of objects in the 'results' key of the API response.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/api.py"}, "isabl_cli/isabl_cli/api.py:get_instance": {"title": "Lookup database instance by various identifiers", "summary": "get_instance retrieves a database instance from an API endpoint using flexible identifiers (primary key, system_id, email, or username). It accepts an endpoint and optional fields list, returning a SimpleNamespace populated with the instance data for easy attribute access.", "tags": ["lookup", "records", "api", "instances"], "content": "# get_instance\n\n```python\ndef get_instance(endpoint, identifier, fields=None)\n```\n\nGet database instance given any identifier.\n\nArguments:\n    identifier (str): a primary key, system_id, email or username.\n    endpoint (str): endpoint without API base URL (e.g. `analyses`).\n    fields (str): comma separated list of fields to be retrieved.\n\nReturns:\n    types.SimpleNamespace: loaded with data returned from the API.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/api.py"}, "isabl_cli/isabl_cli/api.py:create_instance": {"title": "Create a database instance via API", "summary": "Describes the create_instance function used to create a new database object through the Isabl API. It takes an endpoint string (e.g., 'analyses') and a data dict of fields to set, and returns a types.SimpleNamespace populated with the API response.", "tags": ["api", "create", "instances", "cli"], "content": "# create_instance\n\n```python\ndef create_instance(endpoint, **data)\n```\n\nCreate database instance.\n\nArguments:\n    endpoint (str): endpoint without API base URL (e.g. `analyses`).\n    data (dict): fields to be created.\n\nReturns:\n    types.SimpleNamespace: loaded with data returned from the API.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/api.py"}, "isabl_cli/isabl_cli/api.py:patch_instance": {"title": "Patch (update) a database instance remotely", "summary": "Documents the patch_instance function for updating fields on an existing database object via the Isabl API. It requires an endpoint, an instance identifier (primary key, system_id, email or username), and keyword fields to patch, returning a types.SimpleNamespace with the API response.", "tags": ["api", "update", "instances", "cli"], "content": "# patch_instance\n\n```python\ndef patch_instance(endpoint, instance_id, **data)\n```\n\nPatch database instance.\n\nArguments:\n    instance_id (str): a primary key, system_id, email or username.\n    endpoint (str): endpoint without API base URL (e.g. `analyses`).\n    data (dict): fields to be patched.\n\nReturns:\n    types.SimpleNamespace: loaded with data returned from the API.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/api.py"}, "isabl_cli/isabl_cli/api.py:delete_instance": {"title": "Delete a database instance via API call", "summary": "Explains the delete_instance function for removing an object from the Isabl database through the API. It requires the endpoint name and an identifier (primary key, system_id, email, or username) to specify which object to delete.", "tags": ["api", "delete", "instances", "cli"], "content": "# delete_instance\n\n```python\ndef delete_instance(endpoint, identifier)\n```\n\nDelete database instance.\n\nArguments:\n    identifier (str): a primary key, system_id, email or username.\n    endpoint (str): endpoint without API base URL (e.g. `analyses`).", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/api.py"}, "isabl_cli/isabl_cli/api.py:get_instances": {"title": "Retrieve instances from a list API endpoint", "summary": "Describes get_instances, a flexible function to fetch objects from list endpoints. It supports optional identifiers and filters, can retrieve all objects when none provided, prints a verbose count if requested, and returns a list of types.SimpleNamespace objects; it raises a UsageError for certain string identifier misuse.", "tags": ["api", "retrieve", "filters", "instances"], "content": "# get_instances\n\n```python\ndef get_instances(endpoint, identifiers=None, verbose=True, **filters)\n```\n\nReturn instances from a list API endpoint.\n\nIf not `identifiers` and not `filters` retrieves all objects in database.\nif `identifiers` and `filters`, identifieres might be filtered.\n\nArguments:\n    endpoint (str): endpoint without API base URL (e.g. `analyses`).\n    identifiers (list): List of identifiers.\n    filters (dict): name, value pairs for API filtering.\n    verbose (bool): print to stderr how many instances will be retrieved.\n\nRaises:\n    click.UsageError: if string identifier and endpoint not in individuals,\n        samples or workdflows.\n\nReturns:\n    list: of types.SimpleNamespace objects loaded with dicts from API.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/api.py"}, "isabl_cli/isabl_cli/api.py:get_experiments": {"title": "Fetch experiments by identifiers or filters", "summary": "A convenience accessor to retrieve experiment records from the API using either identifiers or filter keyword arguments. Intended to simplify calling the generic get_instances function for experiments.", "tags": ["api", "experiments", "retrieve", "cli"], "content": "# get_experiments\n\n```python\ndef get_experiments(identifiers=None, **filters)\n```\n\nGet experiments give identifiers or filters.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/api.py"}, "isabl_cli/isabl_cli/api.py:get_analyses": {"title": "Retrieve analyses via identifiers or filters", "summary": "Provides a simple function to fetch analysis records from the Isabl API by passing identifiers or filters. It offers the same usage pattern as other entity-specific getters to streamline access to analyses.", "tags": ["api", "analyses", "retrieve", "cli"], "content": "# get_analyses\n\n```python\ndef get_analyses(identifiers=None, **filters)\n```\n\nGet analyses give identifiers or filters.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/api.py"}, "isabl_cli/isabl_cli/api.py:get_projects": {"title": "Query projects using identifiers or filters", "summary": "Documents get_projects, a helper to fetch project records from the API using identifiers or filter keyword arguments. It follows the same simple interface as other entity-specific getters to return matching objects.", "tags": ["api", "projects", "retrieve", "cli"], "content": "# get_projects\n\n```python\ndef get_projects(identifiers=None, **filters)\n```\n\nGet projects give identifiers or filters.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/api.py"}, "isabl_cli/isabl_cli/api.py:get_instances_count": {"title": "Return count of objects from list endpoint", "summary": "Explains get_instances_count, a function that returns the integer count of objects matching optional filters at a given list endpoint. You provide the endpoint name and any filter name/value pairs to determine how many objects match the query.", "tags": ["api", "count", "filters", "instances"], "content": "# get_instances_count\n\n```python\ndef get_instances_count(endpoint, **filters)\n```\n\nReturn the count of a list url.\n\nArguments:\n    endpoint (str): endpoint without API base URL (e.g. `analyses`).\n    filters (dict): name, value pairs for API filtering.\n\nReturns:\n    int: count of objects matching the provided filters.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/api.py"}, "isabl_cli/isabl_cli/api.py:get_tree": {"title": "Retrieve the full data tree for an individual", "summary": "Describes get_tree, which fetches all related information for a single individual identified by an identifier. It is meant to return the complete 'tree' of records linked to that individual within the Isabl system.", "tags": ["api", "individual", "tree", "retrieve"], "content": "# get_tree\n\n```python\ndef get_tree(identifier)\n```\n\nGet everything for an individual.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/api.py"}, "isabl_cli/isabl_cli/api.py:get_trees": {"title": "Fetch full data trees for multiple individuals", "summary": "Documents get_trees, which retrieves the complete related records for multiple individuals using identifiers or filters. It provides a bulk version of get_tree to obtain the 'trees' for several individuals in one call.", "tags": ["api", "individuals", "tree", "bulk"], "content": "# get_trees\n\n```python\ndef get_trees(identifiers=None, **filters)\n```\n\nGet everything for multiple individuals.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/api.py"}, "isabl_cli/isabl_cli/api.py:patch_analyses_status": {"title": "Batch update analyses status utility function", "summary": "patch_analyses_status updates the status field for multiple analysis instances in one call. It accepts a list of analysis objects and a status string, asserts the status is one of the allowed values, and returns the list of updated analyses.", "tags": ["analyses", "status", "batch", "api"], "content": "# patch_analyses_status\n\n```python\ndef patch_analyses_status(analyses, status)\n```\n\nPatch the `status` of multiple `analyses`.\n\nArguments:\n    analyses (list): of analyses instances.\n    status (str): status to be updated to.\n\nRaises:\n    AssertionError: if status not in {'SUBMITTED', 'STAGED'}.\n\nReturns:\n    list: of updated analyses.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/api.py"}, "isabl_cli/isabl_cli/api.py:patch_analysis_status": {"title": "Patch single analysis status and results", "summary": "patch_analysis_status updates a single analysis instance (typically after a successful run). It ensures the analysis is owned by an admin user and that the analysis results field is updated, then returns the patched analysis dictionary.", "tags": ["analysis", "results", "admin", "api"], "content": "# patch_analysis_status\n\n```python\ndef patch_analysis_status(analysis, status)\n```\n\nPatch a successful analysis.\n\nMake sure analysis is owned by admin user and that results field is updated.\n\nArguments:\n    analysis (dict): analysis instance.\n    status (dict): analysis status.\n\nReturns:\n    dict: patched analysis instance.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/api.py"}, "isabl_cli/isabl_cli/api.py:send_error_email": {"title": "Send error notification emails via API", "summary": "send_error_email composes and sends an error notification email to a list of recipients. It accepts recipients, subject, and message and returns the HTTP response object from the underlying API request.", "tags": ["email", "notifications", "error-handling", "api"], "content": "# send_error_email\n\n```python\ndef send_error_email(recipients, subject, message)\n```\n\nSend an error message to recipients.\n\nArguments:\n    recipients (list): email recipients.\n    subject (str): email subject.\n    message (str): error message.\n\nReturns:\n    requests.models.Response: api request response.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/api.py"}, "isabl_cli/isabl_cli/api.py:_get_analysis_results": {"title": "Internal helper to fetch or patch results", "summary": "_get_analysis_results is an internal utility for obtaining (and potentially patching) the results field of an analysis. It accepts an analysis instance and a raise_error flag to control whether failures raise exceptions.", "tags": ["internal", "analysis", "results", "error-handling"], "content": "# _get_analysis_results\n\n```python\ndef _get_analysis_results(analysis, raise_error=True)\n```\n\nPatch analysis results.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/api.py"}, "isabl_cli/isabl_cli/api.py:__init__": {"title": "Constructor that retrieves instance by id", "summary": "The __init__ method is implemented so that if the first constructor argument is an integer or string it will use that value to retrieve an existing instance. This provides convenience instantiation by id or identifier.", "tags": ["constructor", "instantiation", "retrieval", "api"], "content": "# __init__\n\n```python\ndef __init__(self, *args, **kwargs)\n```\n\nIf first argument is int or str, use it to retrieve an instance.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/api.py"}, "isabl_cli/isabl_cli/api.py:fromDict": {"title": "Recursive conversion from dicts to IsablDicts", "summary": "fromDict is a class method that recursively transforms standard Python dictionaries into IsablDict (or related) objects. This is useful for normalizing nested API payloads into the richer Isabl typed dicts.", "tags": ["serialization", "dict", "IsablDict", "conversion"], "content": "# fromDict\n\n```python\ndef fromDict(cls, d)\n```\n\nTransform a dictionary into IsablDicts recursively.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/api.py"}, "isabl_cli/isabl_cli/api.py:get": {"title": "Get method aware of custom fields", "summary": "This get implementation first checks whether the requested key corresponds to a custom field before falling back to the default value. It provides custom-field-aware lookup semantics for Isabl dict-like objects.", "tags": ["custom-fields", "accessor", "dict", "api"], "content": "# get\n\n```python\ndef get(self, k, default=None)\n```\n\nCheck first if k is a custom field.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/api.py"}, "isabl_cli/isabl_cli/api.py:pop": {"title": "Pop method honoring custom fields first", "summary": "This pop implementation checks whether the key to remove is a custom field and handles that case before falling back to normal dictionary pop behavior. It provides a safe way to remove values while respecting custom field semantics.", "tags": ["custom-fields", "mutator", "dict", "api"], "content": "# pop\n\n```python\ndef pop(self, k, default=None)\n```\n\nCheck first if k is a custom field.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/api.py"}, "isabl_cli/isabl_cli/api.py:__repr__": {"title": "Improved representation for assembly instances", "summary": "This __repr__ provides a concise, informative string representation for assembly objects to make them easier to inspect in logs and interactive sessions. It replaces the generic object repr with key assembly identifiers.", "tags": ["repr", "assemblies", "debugging", "display"], "content": "# __repr__\n\n```python\ndef __repr__(self)\n```\n\nGet better representation for assemblies.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/api.py"}, "isabl_cli/isabl_cli/api.py:get_fastq": {"title": "Retrieve experiment FASTQ R1 and R2 files", "summary": "Describes the get_fastq method which returns paired FASTQ files for an experiment. The function provides two lists: R1 and R2 FASTQ file paths, and raises a MissingDataError if the number of R1 and R2 files does not match.", "tags": ["api", "fastq", "sequencing", "error-handling"], "content": "# get_fastq\n\n```python\ndef get_fastq(self)\n```\n\nGet experiment fastq R1 and R2 files.\n\nRaises:\n    MissingDataError: if number of R1 and R2 files is not the same.\n\nReturns:\n    tuple: list of R1 fastq, list of R2.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/api.py"}, "isabl_cli/isabl_cli/app.py:AbstractApplication": {"title": "AbstractApplication base class and required methods", "summary": "Defines the AbstractApplication class for Isabl applications and documents the interface methods that subclasses must implement. It lists responsibilities such as building commands, resolving experiments from CLI options, validating inputs/settings, producing results, handling dependencies, and optionally merging project-level analyses.", "tags": ["application", "interface", "extensions", "lifecycle"], "content": "# class AbstractApplication\n\nAn Abstract Isabl application.\n\n## Methods\n\n### get_command\n\n```python\ndef get_command(self, analysis, inputs, settings)\n```\n\nMust return a shell command for the analysis as a string.\n\nArguments:\n    analysis (dict): an analysis object as retrieved from API.\n    inputs (dict): as returned by `get_dependencies`.\n    settings (dict): applications settings.\n\nReturns:\n    str: command\n\n### get_experiments_from_cli_options\n\n```python\ndef get_experiments_from_cli_options(self, **cli_options)\n```\n\nMust return list of target-reference experiment tuples given the parsed options.\n\nArguments:\n    cli_options (dict): parsed command line options.\n\nReturns:\n    list: of (targets, references) tuples.\n\n### get_analysis_results\n\n```python\ndef get_analysis_results(self, analysis)\n```\n\nGet dictionary of analysis results.\n\nThis function is run on completion.\n\nArguments:\n    analysis (dict): succeeded analysis instance.\n\nReturns:\n    dict: a jsonable dictionary.\n\n### get_after_completion_status\n\n```python\ndef get_after_completion_status(self, analysis)\n```\n\nPossible values are FINISHED and IN_PROGRESS.\n\n### validate_settings\n\n```python\ndef validate_settings(self, settings)\n```\n\nValidate settings.\n\nMake sure application settings are valid by raising an AssertionError if\nsomething is properly configured.\n\nArguments:\n    settings (isabl_cli.settings.ApplicationSettings): an application settings\n    object, which is also a Munch-like dictionary.\n\n### validate_experiments\n\n```python\ndef validate_experiments(self, targets, references)\n```\n\nRaise AssertionError if tuple combination isn't valid.\n\nSome of the advantages of metadata-driven applications is that we can prevent\nanalyses that don't make sense, for example running a variant calling\napplication on imaging data.\n\nArguments:\n    targets (list): list of targets dictionaries.\n    references (list): list of references dictionaries.\n\nRaises:\n    AssertionError: if tuple is invalid.\n\n### get_dependencies\n\n```python\ndef get_dependencies(self, targets, references, settings)\n```\n\nGet dictionary of inputs, this function is run before `get_command`.\n\nArguments:\n    targets (list): created analysis instance.\n    references (list): created analysis instance.\n    settings (object): settings namespace.\n\nReturns:\n    tuple: (list of analyses dependencies primary keys, inputs dict).\n\n### get_project_analysis_results\n\n```python\ndef get_project_analysis_results(self, analysis)\n```\n\nGet dictionary of results for a project level analysis.\n\nThis function is run on completion.\n\nArguments:\n    analysis (dict): succeeded analysis instance.\n\nReturns:\n    dict: a jsonable dictionary.\n\n### merge_project_analyses\n\n```python\ndef merge_project_analyses(self, analysis, analyses)\n```\n\nMerge analyses on a project level basis.\n\nIf implemented, a new project level analyses will be created. This\nfunction will only be called if no other analysis of the same\napplication is currently running or submitted.\n\nArguments:\n    analysis (dict): the project level analysis.\n    analyses (list): list of succeeded analyses instances.\n\n### validate_project_analyses\n\n```python\ndef validate_project_analyses(self, project, analyses)\n```\n\nRaise AssertionError if project level analysis logic shouldn't happen.\n\n### get_individual_analysis_results\n\n```python\ndef get_individual_analysis_results(self, analysis)\n```\n\nGet dictionary of results for a individual level analysis.\n\nThis function is run on completion.\n\nArguments:\n    analysis (dict): succeeded analysis instance.\n\nReturns:\n    dict: a jsonable dictionary.\n\n### merge_individual_analyses\n\n```python\ndef merge_individual_analyses(self, analysis, analyses)\n```\n\nMerge analyses on a individual level basis.\n\nIf implemented, a new individual level analyses will be created. This\nfunction will only be called if no other analysis of the same\napplication is currently running or submitted.\n\nArguments:\n    analysis (dict): the individual level analysis.\n    analyses (list): list of succeeded analyses instances.\n\n### validate_individual_analyses\n\n```python\ndef validate_individual_analyses(self, individual, analyses)\n```\n\nRaise AssertionError if individual level analysis logic shouldn't happen.\n\n### submit_merge_analysis\n\n```python\ndef submit_merge_analysis(self, instance)\n```\n\nDirectly call merge logic unless SUBMIT_MERGE_ANALYSIS.\n\nUse setting SUBMIT_MERGE_ANALYSIS to submit the merge work with custom logic.\n\nArguments:\n    instance (obj): a project or individual instance.\n\n### run_project_merge\n\n```python\ndef run_project_merge(self, project)\n```\n\nMerge analyses on a project level basis.\n\nArguments:\n    project (dict): project instance.\n\n### get_project_level_auto_merge_analysis\n\n```python\ndef get_project_level_auto_merge_analysis(self, project)\n```\n\nGet or create project level analysis.\n\nArguments:\n    project (dict): project instance.\n\nReturns:\n    dict: analysis instance.\n\n### run_individual_merge\n\n```python\ndef run_individual_merge(self, individual)\n```\n\nMerge analyses on a individual level basis.\n\nArguments:\n    individual (dict): individual instance.\n\n### get_individual_level_auto_merge_analysis\n\n```python\ndef get_individual_level_auto_merge_analysis(self, individual)\n```\n\nGet or create individual level analysis.\n\nArguments:\n    individual (dict): individual instance.\n\nReturns:\n    dict: analysis instance.\n\n### client_id\n\n```python\ndef client_id(self)\n```\n\nGet current client ID.\n\n### primary_key\n\n```python\ndef primary_key(self)\n```\n\nSpace separated name, version and assembly.\n\n### settings\n\n```python\ndef settings(self)\n```\n\nReturn the application settings.\n\n### application\n\n```python\ndef application(self)\n```\n\nGet application database object.\n\n### individual_level_auto_merge_application\n\n```python\ndef individual_level_auto_merge_application(self)\n```\n\nGet or create an individual level application database object.\n\n### project_level_auto_merge_application\n\n```python\ndef project_level_auto_merge_application(self)\n```\n\nGet or create a project level application database object.\n\n### assembly\n\n```python\ndef assembly(self)\n```\n\nGet assembly database object.\n\n### has_project_auto_merge\n\n```python\ndef has_project_auto_merge(self)\n```\n\nReturn True if project level auto merge logic is defined.\n\n### has_individual_auto_merge\n\n```python\ndef has_individual_auto_merge(self)\n```\n\nReturn True if individual level auto merge logic is defined.\n\n### as_cli_command\n\n```python\ndef as_cli_command(cls)\n```\n\nGet application as click command line interface.\n\n### get_cli_command_name\n\n```python\ndef get_cli_command_name(self)\n```\n\nGet name for isabl_cli command.\n\n### get_experiments_from_default_cli_options\n\n```python\ndef get_experiments_from_default_cli_options(cls, cli_options)\n```\n\nGet experiments from default CLI options.\n\n### run\n\n```python\ndef run(self, tuples, commit, force=False, restart=False, verbose=True, run_args=None, local=False)\n```\n\nRun a list of targets, references tuples.\n\nArguments:\n    restart (bool): set settings.restart = True.\n    force (bool): if true, analyses are wiped before being submitted.\n    local (bool): if true, analyses will be run locally one by one.\n    commit (bool): if true, analyses are started (`force` overwrites).\n    verbose (bool): whether or not verbose output should be printed.\n    tuples (list): list of (targets, references) tuples.\n    run_args (dict): dictionary of extra arguments required to run the app.\n\nReturns:\n    tuple: command_tuples, skipped_tuples, invalid_tuples\n\n### run_analyses\n\n```python\ndef run_analyses(self, analyses, commit, force, restart, local)\n```\n\nRun a list of analyses.\n\nReturns:\n    list: tuple of\n\n### send_analytics\n\n```python\ndef send_analytics(self, command_tuples, skipped_tuples, invalid_tuples, commit, force, restart, submitter)\n```\n\nSend analytics event of analyses ran from cli.\n\n### get_command_script_path\n\n```python\ndef get_command_script_path(self, analysis)\n```\n\nGet path to analysis command script.\n\n### get_command_log_path\n\n```python\ndef get_command_log_path(self, analysis)\n```\n\nGet path to analysis log file.\n\n### get_command_err_path\n\n```python\ndef get_command_err_path(self, analysis)\n```\n\nGet path to analysis err file.\n\n### write_command_script\n\n```python\ndef write_command_script(self, analysis, command)\n```\n\nWrite analysis command to bash script and get path to it.\n\nArguments:\n    analysis (dict): an analysis instance.\n    command (str): command to be run.\n\n### get_patch_status_command\n\n```python\ndef get_patch_status_command(key, status)\n```\n\nReturn a command to patch the `status` of a given analysis `key`.\n\n### _get_dependencies_results\n\n```python\ndef _get_dependencies_results(self, targets, references)\n```\n\nGet dependencies' results from a defined application version.\n\nIt's called when `self.dependencies_results` is an array containing an object:\n    {\n        result (str): Result key `Application.results.result_key`.\n        name (str): Name the result will have in the inputs objects.\n        app (obj): `Application` instance.\n        app_name (str): `Application.name`.\n        app_version (str): `Application.version`. If not defined, use\n            any available. Use `any` if you want to use the latest available.\n        app_assembly (str): `Application.assembly.name`. i.e: GRCh37\n        linked (bool): if False, the analysis is not linked as a dependencie of\n            the analysis. As adding new dependencies to an analysis forces isabl\n            to not recognize existing ones (Default: True).\n    }\n\n### _get_analysis_results_from_patterns\n\n```python\ndef _get_analysis_results_from_patterns(self, analysis, specification)\n```\n\nGet first matching file, if \"pattern\" is in result specification.\n\n### _get_analysis_results\n\n```python\ndef _get_analysis_results(self, analysis, created=False)\n```\n\nGet results dictionary and append head job script, logs and error files.\n\n### get_result\n\n```python\ndef get_result(*args, **kwargs)\n```\n\nGet an application result.\n\n### get_results\n\n```python\ndef get_results(*args, **kwargs)\n```\n\nGet application results.\n\n### patch_application_settings\n\n```python\ndef patch_application_settings(self, client_id=None, **settings)\n```\n\nPatch application settings if necessary.\n\n### get_job_name\n\n```python\ndef get_job_name(analysis)\n```\n\nGet job name given an analysis instance.\n\n### echo_run_summary\n\n```python\ndef echo_run_summary(self, run_tuples, skipped_tuples, invalid_tuples)\n```\n\nEcho errors for error tuples such as `invalid`, `cant_run`.\n\nArguments:\n    invalid_tuples (list): of (tuple, error) tuples.\n    run_tuples (list): of (analysis, status) tuples.\n    skipped_tuples (list): of (analysis, skip reason) tuples.\n\n### get_bedfile\n\n```python\ndef get_bedfile(self, experiment, bedfile_type='targets')\n```\n\nGet targets or baits bedfile for experiment.\n\n### get_bam\n\n```python\ndef get_bam(self, experiment)\n```\n\nGet experiment bam for application assembly.\n\n### get_bams\n\n```python\ndef get_bams(self, experiments)\n```\n\nGet bams for multiple experiments.\n\n### update_experiment_bam_file\n\n```python\ndef update_experiment_bam_file(self, experiment, bam_url, analysis_pk)\n```\n\nUpdate experiment default bam for assembly, ADMIN ONLY.\n\n### validate_bams\n\n```python\ndef validate_bams(self, experiments)\n```\n\nRaise error not all experiments have registered bams.\n\n### validate_bedfiles\n\n```python\ndef validate_bedfiles(self, experiments, bedfile_type='targets')\n```\n\nRaise error not all experiments have registered bedfile.\n\n### get_or_create_analyses\n\n```python\ndef get_or_create_analyses(self, tuples)\n```\n\nGet or create analysis for a application and a list of tuples.\n\nArguments:\n    tuples (list): list of (targets, references, analyses) tuples.\n\nReturns:\n    tuple: list of analyses, invalid tuples [(tuple, error), ...].\n\n### get_existing_analyses\n\n```python\ndef get_existing_analyses(self, tuples)\n```\n\nGet list of existing analyses for a list of `tuples`.\n\nCheck targets and references for an exact match. Check whether all the\nrequested analyses are in `analysis.analyses`.\n\nArguments:\n    tuples (list): (targets, references, analyses, inputs) tuples.\n\nReturns:\n    tuple: list of existing analyses, list of tuples without analysis\n\n### get_individual_level_analyses\n\n```python\ndef get_individual_level_analyses(self, tuples)\n```\n\nGet existing individual level analyses.\n\n### __repr__\n\n```python\ndef __repr__(self)\n```\n\nPrint name, version and assembly.\n\n### validate_is_file\n\n```python\ndef validate_is_file(self, path)\n```\n\nValidate path is file.\n\n### validate_is_dir\n\n```python\ndef validate_is_dir(self, path)\n```\n\nValidate path is directory.\n\n### validate_reference_genome\n\n```python\ndef validate_reference_genome(self, reference)\n```\n\nValidate genome exists and has required indexes.\n\n### validate_has_raw_data\n\n```python\ndef validate_has_raw_data(self, experiments)\n```\n\nValidate experiments have raw data.\n\n### validate_single_data_type\n\n```python\ndef validate_single_data_type(self, experiments)\n```\n\nValidate experiments have only one type of raw data.\n\n### validate_fastq_only\n\n```python\ndef validate_fastq_only(self, experiments)\n```\n\nValidate raw data is only fastq.\n\n### validate_is_pair\n\n```python\ndef validate_is_pair(self, targets, references)\n```\n\nValidate targets, references tuple is a pair.\n\n### validate_one_target\n\n```python\ndef validate_one_target(self, targets)\n```\n\nValidate only one target.\n\n### validate_one_target_no_references\n\n```python\ndef validate_one_target_no_references(self, targets, references)\n```\n\nValidate only one sample is passed targets and none on references.\n\n### validate_at_least_one_target_one_reference\n\n```python\ndef validate_at_least_one_target_one_reference(self, targets, references)\n```\n\nValidate that at least one reference and target are passed.\n\n### validate_targets_not_in_references\n\n```python\ndef validate_targets_not_in_references(self, targets, references)\n```\n\nMake sure targets are not passed as references also.\n\n### validate_methods\n\n```python\ndef validate_methods(self, experiments, methods)\n```\n\nMake sure all experimental methods are those expected.\n\n### validate_pdx_only\n\n```python\ndef validate_pdx_only(self, experiments)\n```\n\nMake sure experiments come from PDX samples.\n\n### validate_dna_only\n\n```python\ndef validate_dna_only(self, experiments)\n```\n\nMake sure experiments are DNA data.\n\n### validate_rna_only\n\n```python\ndef validate_rna_only(self, experiments)\n```\n\nMake sure experiments are RNA data.\n\n### validate_dna_pairs\n\n```python\ndef validate_dna_pairs(self, targets, references)\n```\n\nValidate targets, references tuples for base dna applications.\n\n### validate_same_technique\n\n```python\ndef validate_same_technique(self, targets, references)\n```\n\nValidate targets and references have same bedfile.\n\n### validate_same_platform\n\n```python\ndef validate_same_platform(self, targets, references)\n```\n\nValidate targets and references are sequenced on the same platform.\n\n### validate_species\n\n```python\ndef validate_species(self, experiments)\n```\n\nValidate experiments's species is same as application's setting.\n\n### validate_are_normals\n\n```python\ndef validate_are_normals(self, experiments)\n```\n\nRaise error not all experiments come from NORMAL sample.\n\n### validate_individuals\n\n```python\ndef validate_individuals(self, targets, references)\n```\n\nValidate the individual of the targets and references.\n\nValidate pairs are of the same individual if the pipeline is matched.\nValidate pairs are of the different individuals if the pipeline is unmatched.\n\n### validate_source\n\n```python\ndef validate_source(self, experiments, source)\n```\n\nValidate experiments are from a specific source material.\n\n### notify_project_analyst\n\n```python\ndef notify_project_analyst(self, analysis, subject, message)\n```\n\nSend email notification to project's analysts of projects.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/app.py"}, "isabl_cli/isabl_cli/app.py:get_command": {"title": "Construct shell command for analysis execution", "summary": "Documents the get_command method which must produce the shell command string used to run an analysis. It takes the analysis object, resolved inputs from get_dependencies, and application settings as arguments and must return a command string.", "tags": ["command", "execution", "application-interface"], "content": "# get_command\n\n```python\ndef get_command(self, analysis, inputs, settings)\n```\n\nMust return a shell command for the analysis as a string.\n\nArguments:\n    analysis (dict): an analysis object as retrieved from API.\n    inputs (dict): as returned by `get_dependencies`.\n    settings (dict): applications settings.\n\nReturns:\n    str: command", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/app.py"}, "isabl_cli/isabl_cli/app.py:get_experiments_from_cli_options": {"title": "Map CLI options to target-reference experiment tuples", "summary": "Specifies get_experiments_from_cli_options which translates parsed CLI options into a list of (targets, references) experiment tuples. This method enables applications to determine which experiment pairs to operate on based on user-provided command-line arguments.", "tags": ["cli", "experiments", "parsing", "selection"], "content": "# get_experiments_from_cli_options\n\n```python\ndef get_experiments_from_cli_options(self, **cli_options)\n```\n\nMust return list of target-reference experiment tuples given the parsed options.\n\nArguments:\n    cli_options (dict): parsed command line options.\n\nReturns:\n    list: of (targets, references) tuples.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/app.py"}, "isabl_cli/isabl_cli/app.py:get_analysis_results": {"title": "Produce analysis completion results dictionary", "summary": "Describes get_analysis_results which is called when an analysis succeeds to produce a JSON-serializable dictionary of results. Implementations should return structured result data that can be stored or displayed after job completion.", "tags": ["results", "completion", "api"], "content": "# get_analysis_results\n\n```python\ndef get_analysis_results(self, analysis)\n```\n\nGet dictionary of analysis results.\n\nThis function is run on completion.\n\nArguments:\n    analysis (dict): succeeded analysis instance.\n\nReturns:\n    dict: a jsonable dictionary.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/app.py"}, "isabl_cli/isabl_cli/app.py:get_after_completion_status": {"title": "Determine post-completion analysis status", "summary": "Documents get_after_completion_status which returns the state of an analysis after completion. The possible return values indicated are FINISHED and IN_PROGRESS, allowing applications to mark final or continuing work.", "tags": ["status", "lifecycle", "completion"], "content": "# get_after_completion_status\n\n```python\ndef get_after_completion_status(self, analysis)\n```\n\nPossible values are FINISHED and IN_PROGRESS.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/app.py"}, "isabl_cli/isabl_cli/app.py:validate_settings": {"title": "Validate application settings and configuration correctness", "summary": "Explains validate_settings which should ensure application settings are correctly configured. Implementations must raise an AssertionError when settings are invalid; the settings argument is an ApplicationSettings object behaving like a dictionary.", "tags": ["settings", "validation", "configuration", "error-handling"], "content": "# validate_settings\n\n```python\ndef validate_settings(self, settings)\n```\n\nValidate settings.\n\nMake sure application settings are valid by raising an AssertionError if\nsomething is properly configured.\n\nArguments:\n    settings (isabl_cli.settings.ApplicationSettings): an application settings\n    object, which is also a Munch-like dictionary.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/app.py"}, "isabl_cli/isabl_cli/app.py:validate_experiments": {"title": "Validate target and reference experiment combinations", "summary": "Documents validate_experiments which must assert whether a (targets, references) tuple is valid for an application. This prevents nonsensical analyses (e.g., running variant calling on imaging data) by raising AssertionError for invalid combinations.", "tags": ["validation", "experiments", "metadata"], "content": "# validate_experiments\n\n```python\ndef validate_experiments(self, targets, references)\n```\n\nRaise AssertionError if tuple combination isn't valid.\n\nSome of the advantages of metadata-driven applications is that we can prevent\nanalyses that don't make sense, for example running a variant calling\napplication on imaging data.\n\nArguments:\n    targets (list): list of targets dictionaries.\n    references (list): list of references dictionaries.\n\nRaises:\n    AssertionError: if tuple is invalid.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/app.py"}, "isabl_cli/isabl_cli/app.py:get_dependencies": {"title": "Gather analysis dependencies and inputs dictionary", "summary": "Specifies get_dependencies which runs before get_command to assemble required inputs and any analysis dependencies. It returns a tuple containing a list of dependency primary keys and an inputs dictionary that get_command will consume.", "tags": ["dependencies", "inputs", "preparation", "workflow"], "content": "# get_dependencies\n\n```python\ndef get_dependencies(self, targets, references, settings)\n```\n\nGet dictionary of inputs, this function is run before `get_command`.\n\nArguments:\n    targets (list): created analysis instance.\n    references (list): created analysis instance.\n    settings (object): settings namespace.\n\nReturns:\n    tuple: (list of analyses dependencies primary keys, inputs dict).", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/app.py"}, "isabl_cli/isabl_cli/app.py:get_project_analysis_results": {"title": "Aggregate and return project-level analysis results", "summary": "Describes get_project_analysis_results, a function run on completion of a project-level analysis that should return a JSON-serializable dictionary of aggregated results. This is analogous to per-analysis results but scoped to project-level outputs.", "tags": ["project", "results", "aggregation", "completion"], "content": "# get_project_analysis_results\n\n```python\ndef get_project_analysis_results(self, analysis)\n```\n\nGet dictionary of results for a project level analysis.\n\nThis function is run on completion.\n\nArguments:\n    analysis (dict): succeeded analysis instance.\n\nReturns:\n    dict: a jsonable dictionary.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/app.py"}, "isabl_cli/isabl_cli/app.py:merge_project_analyses": {"title": "Project-level analysis merge handler method", "summary": "Defines the hook to merge multiple analyses at the project level. If implemented, this will create a new project-level analysis from a set of succeeded analyses and is only invoked when no other analysis of the same application is currently running or submitted.", "tags": ["project-level", "merge", "analysis-orchestration", "isabl-cli"], "content": "# merge_project_analyses\n\n```python\ndef merge_project_analyses(self, analysis, analyses)\n```\n\nMerge analyses on a project level basis.\n\nIf implemented, a new project level analyses will be created. This\nfunction will only be called if no other analysis of the same\napplication is currently running or submitted.\n\nArguments:\n    analysis (dict): the project level analysis.\n    analyses (list): list of succeeded analyses instances.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/app.py"}, "isabl_cli/isabl_cli/app.py:validate_project_analyses": {"title": "Validate project-level analysis merge conditions", "summary": "Provides a validation hook to assert whether project-level merge logic should proceed. The function raises an AssertionError when the preconditions for merging project analyses are not met.", "tags": ["validation", "project-level", "assertions", "preconditions"], "content": "# validate_project_analyses\n\n```python\ndef validate_project_analyses(self, project, analyses)\n```\n\nRaise AssertionError if project level analysis logic shouldn't happen.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/app.py"}, "isabl_cli/isabl_cli/app.py:get_individual_analysis_results": {"title": "Extract results for an individual analysis", "summary": "Runs on completion of an individual-level analysis to produce a json-serializable results dictionary. It accepts a succeeded analysis instance and returns a dictionary suitable for storing or downstream use.", "tags": ["individual-level", "results", "completion-hook", "serialization"], "content": "# get_individual_analysis_results\n\n```python\ndef get_individual_analysis_results(self, analysis)\n```\n\nGet dictionary of results for a individual level analysis.\n\nThis function is run on completion.\n\nArguments:\n    analysis (dict): succeeded analysis instance.\n\nReturns:\n    dict: a jsonable dictionary.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/app.py"}, "isabl_cli/isabl_cli/app.p ce_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/commands.py"}, "isabl_cli/isabl_cli/commands.py:get_outdirs": {"title": "Find analysis output directories with pattern matching", "summary": "Describes get_outdirs(pattern, filters, identifiers), which locates analysis output directories and can match files within them using a pattern. This helps users inspect or retrieve results produced by analysis runs across projects and samples.", "tags": ["analyses", "output-directories", "file-search", "cli"], "content": "# get_outdirs\n\n```python\ndef get_outdirs(pattern, filters, identifiers)\n```\n\nGet analyses outdirs, use `pattern` to match files inside the directories.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/commands.py"}, "isabl_cli/isabl_cli/commands.py:get_data": {"title": "Fetch raw experiment data file paths", "summary": "Covers get_data(filters, identifiers, verbose, dtypes), a function to retrieve file paths for raw experimental data. It supports filtering by metadata, selecting specific data types (dtypes), toggling verbose output, and targeting specific identifiers for precise data discovery.", "tags": ["raw-data", "experiments", "file-retrieval", "cli"], "content": "# get_data\n\n```python\ndef get_data(filters, identifiers, verbose, dtypes)\n```\n\nGet file paths for experiments raw data.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/commands.py"}, "isabl_cli/isabl_cli/commands.py:get_bed": {"title": "Retrieve BED file for sequencing technique", "summary": "Explains get_bed(technique, bed_type, assembly), a utility to obtain a BED file appropriate for a given sequencing technique, BED type (e.g., exome targets, blacklists), and genome assembly. It centralizes access to annotation intervals needed by analysis pipelines.", "tags": ["BED", "reference-data", "sequencing", "annotations"], "content": "# get_bed\n\n```python\ndef get_bed(technique, bed_type, assembly)\n```\n\ rage", "file-discovery"], "content": "# get_bams\n\n```python\ndef get_bams(filters, assembly, verbose, identifiers)\n```\n\nGet storage directories, use `pattern` to match files inside dirs.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/commands.py"}, "isabl_cli/isabl_cli/commands.py:rerun_signals": {"title": "Rerun failed signals for selected filters", "summary": "Describes rerun_signals(filters), a command to reschedule or rerun signals that previously failed, scoped by provided filters. This is useful for recovering from transient failures or reprocessing records without manually triggering each signal.", "tags": ["signals", "job-management", "reprocessing", "cli"], "content": "# rerun_signals\n\n```python\ndef rerun_signals(filters)\n```\n\nRerun failed signals.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/commands.py"}, "isabl_cli/isabl_cli/commands.py:run_web_signals": {"title": "Run signals triggered from the web frontend", "summary": "Covers run_web_signals(filters), which executes signals that were triggered via the Isabl web frontend and filtered by provided criteria. This allows CLI-based replay or execution of UI-driven events for debugging or bulk processing.", "tags": ["web", "signals", "frontend", "execution"], "content": "# run_web_signals\n\n```python\ndef run_web_signals(filters)\n```\n\nRun signals triggered from the frontend.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/commands.py"}, "isabl_cli/isabl_cli/commands.py:run_signals": {"title": "Run arbitrary signals on analyses or experiments", "summary": "Describes a CLI helper that runs arbitrary signals on analyses or experiments using import strings. The function accepts an endpoint, a filter set to target resources, and one or more signal identifiers to execute.", "tags": ["signals", "CLI", "automation", "analyses"], "content": "# run_signals\n\n```python\ndef run_signals(endpoint, filters, signals)\n```\n\nRun any arbitrary signal on analyses or experiments using import strings.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/commands.py"}, "isabl_cli/isabl_cli/commands.py:reject_analysis": {"title": "Reject an analysis with a provided reason", "summary": "Explains a CLI function that patches an analysis' status to REJECTED and records a rejection reason. The function takes an analysis key and a textual reason and updates the analysis via the API.", "tags": ["status-management", "analyses", "CLI", "API"], "content": "# reject_analysis\n\n```python\ndef reject_analysis(key, reason)\n```\n\nPatch an analysis status as REJECTED, providing the rejection reason.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/commands.py"}, "isabl_cli/isabl_cli/data.py:raw_data_inspector": {"title": "Inspect path for supported raw data files", "summary": "Provides a utility that determines whether a given filesystem path points to a supported raw data file. It is used to validate input data before ingestion or processing.", "tags": ["raw-data", "validation", "file-formats", "ingestion"], "content": "# raw_data_inspector\n\n```python\ndef raw_data_inspector(path)\n```\n\nDetermine if a path is a supported raw data file.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/data.py"}, "isabl_cli/isabl_cli/data.py:update_experiment_bam_file": {"title": "Update experiment default BAM for assembly", "summary": "Describes a function that updates the default BAM file for an experiment for a specified assembly. It accepts an experiment dict, assembly name, analysis primary key, and bam URL, patches the experiment, and returns the updated experiment object.", "tags": ["BAM", "experiments", "storage", "API"], "content": "# update_experiment_bam_file\n\n```python\ndef update_experiment_bam_file(experiment, assembly_name, analysis_pk, bam_url)\n```\n\nUpdate default bam for a experiment given the assembly.\n\nArguments:\n    experiment (dict): experiment dict.\n    assembly_name (str): assembly name.\n    analysis_pk (int): analysis primary key.\n    bam_url (str): bam url.\n\nReturns:\n    dict: patched experiment instance", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/data.py"}, "isabl_cli/isabl_cli/data.py:symlink_experiment_to_projects": {"title": "Symlink experiment directory into projects", "summary": "Documents a helper that creates filesystem symlinks from an experiment directory into project directories. This utility is intended to expose experiment data within relevant project contexts without copying files.", "tags": ["symlinks", "filesystem", "experiments", "project-management"], "content": "# symlink_experiment_to_projects\n\n```python\ndef symlink_experiment_to_projects(experiment)\n```\n\nCreate symlink from experiment directory and projects directories.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/data.py"}, "isabl_cli/isabl_cli/data.py:symlink_analysis_to_targets": {"title": "Symlink analysis outputs to target directories", "summary": "Describes a utility that creates symbolic links for an analysis, linking its outputs into configured target locations (such as project directories or shared targets). This helps make analysis outputs discoverable without duplicating data.", "tags": ["analyses", "symlinks", "outputs", "filesystem"], "content": "# symlink_analysis_to_targets\n\n```python\ndef symlink_analysis_to_targets(analysis)\n```\n\nCreate symlink from experiment directory and projects directories.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/data.py"}, "isabl_cli/isabl_cli/data.py:trigger_analyses_merge": {"title": "Trigger project-level analyses merge process", "summary": "Explains a helper that submits or triggers a project-level analyses merge when necessary. The function evaluates an analysis and, if conditions are met, initiates a merge process that consolidates analyses at the project scope.", "tags": ["merge", "analyses", "projects", "orchestration"], "content": "# trigger_analyses_merge\n\n```python\ndef trigger_analyses_merge(analysis)\n```\n\nSubmit project level analyses merge if neccessary.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/data.py"}, "isabl_cli/isabl_cli/data.py:trash_analysis_storage": {"title": "Move analysis storage to trash directory", "summary": "Documents a routine that moves an analysis' storage_url into a designated trash directory for cleanup or archival. This provides a safe way to remove or quarantine storage associated with an analysis without immediate deletion.", "tags": ["storage-management", "cleanup", "analyses", "retention"], "content": "# trash_analysis_storage\n\n```python\ndef trash_analysis_storage(analysis)\n```\n\nMove analysis `storage_url` to a trash directory.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/data.py"}, "isabl_cli/isabl_cli/data.py:_make_storage_directory": {"title": "Create hierarchical storage directory path", "summary": "Describes a helper that computes and creates a storage directory path of the form <root>/<base>/<identifier>, with an optional hashed hierarchy using the last four digits of an integer identifier. The function accepts root, base, identifier, and a use_hash flag and returns the full path to the instance's data directory.", "tags": ["storage-paths", "filesystem-utils", "hashing", "directories"], "content": "# _make_storage_directory\n\n```python\ndef _make_storage_directory(root, base, identifier, use_hash=False)\n```\n\nGet and create path to a data directory.\n\nThe path is set to:\n\n    <root>/<base>/<identifier>\n\nIf `use_hash`, identifier must be integer and path is build using the\nfour last digits of the identifier. Say identifiers is 12345, then path is:\n\n    <root>/<base>/23/45/12345\n\nArguments:\n    base (str): instance's API base.\n    identifier (str): instance's primary key.\n    root (str): root directory.\n    use_hash (bool): hash integer identifier for directories.\n\nReturns:\n    str: path to instance's data directory.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/data.py"}, "isabl_cli/isabl_cli/data.py:get_storage_url": {"title": "Create storage directory and return patched instance", "summary": "Explains a utility that creates the storage directory for an instance (optionally hashed) and returns the patched instance via the API. The function takes an endpoint, an identifier, and a use_hash flag to compute and provision the storage URL.", "tags": ["storage", "API-integration", "directories", "utilities"], "content": "# get_storage_url\n\n```python\ndef get_storage_url(endpoint, identifier, use_hash=False)\n```\n\nMake storage directory and return patched instance.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/data.py"}, "isabl_cli/isabl_cli/data.py:update_storage_url": {"title": "Update storage URL and create storage directory", "summary": "Utility function that ensures an instance has an on-disk storage directory and patches the instance's storage_url via the API. It accepts an endpoint and identifier (with optional hashing) and returns the updated/patched instance after creating the storage location.", "tags": ["storage", "filesystem", "API", "instances"], "content": "# update_storage_url\n\n```python\ndef update_storage_url(endpoint, identifier, use_hash=False, **data)\n```\n\nMake storage directory and return patched instance.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/data.py"}, "isabl_cli/isabl_cli/data.py:LocalReferenceDataImporter": {"title": "Local reference data importer for assemblies", "summary": "Class that implements an import engine to register reference resources (reference_data) for assemblies or techniques. The key method import_data copies or symlinks data from a local source into Isabl storage, updates the model (assemblies or techniques) with a data_id and description, and returns the patched instance; a CLI wrapper is exposed via as_cli_command.", "tags": ["reference-data", "assemblies", "import", "CLI"], "content": "# class LocalReferenceDataImporter\n\nAn import engine for assemblies' reference_data.\n\n## Methods\n\n### import_data\n\n```python\ndef import_data(cls, identifier, data_src, data_id, symlink, description, sub_dir=None, model='assemblies')\n```\n\nRegister reference resources for a given assembly.\n\nArguments:\n    identifier (str): name of assembly or technique.\n    model (str): either `techniques` or `assemblies`.\n    data_src (str): path to reference data.\n    data_id (str): identifier that will be used for reference data.\n    symlink (str): symlink instead of move.\n    description (str): reference data description.\n    sub_dir (str): target sub dir for the resource, default is data_id.\n\nReturns:\n    dict: updated assembly instance as retrieved from API.\n\n### as_cli_command\n\n```python\ndef as_cli_command(cls)\n```\n\nGet reference data importer as click command line interface.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/data.py"}, "isabl_cli/isabl_cli/data.py:LocalReferenceGenomeImporter": {"title": "Local reference genome importer command-line interface", "summary": "A focused import engine class for loading a single assembly reference genome into Isabl. It exposes an as_cli_command method so the import process can be invoked from the command line, simplifying registration of genome resources into the platform.", "tags": ["reference-genome", "assemblies", "import", "CLI"], "content": "# class LocalReferenceGenomeImporter\n\nAn import engine for an assembly reference genome.\n\n## Methods\n\n### as_cli_command\n\n```python\ndef as_cli_command(cls)\n```\n\nGet reference data importer as click command line interface.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/data.py"}, "isabl_cli/isabl_cli/data.py:LocalBedImporter": {"title": "Technique BED file processing and import engine", "summary": "Importer class for technique-specific BED files that provides utilities to process (sort, bgzip, tabix) BED files and register them in a technique's storage directory. The import_bedfiles method accepts paths to targets and baits, assembly and species metadata, and a description, updating the technique record via the API; a CLI entrypoint is also provided.", "tags": ["BED", "indexing", "techniques", "import"], "content": "# class LocalBedImporter\n\nAn import engine for Technique BED files.\n\n## Methods\n\n### process_bedfile\n\n```python\ndef process_bedfile(path)\n```\n\nSort, tabix and gzip a bedfile.\n\n### import_bedfiles\n\n```python\ndef import_bedfiles(cls, technique, targets_path, baits_path, assembly, species, description=None)\n```\n\nRegister input_bed_path in technique's storage dir and update `data`.\n\nArguments:\n    technique (str): technique slug.\n    targets_path (str): path to targets bedfile.\n    baits_path (str): path to baits bedfile.\n    assembly (str): name of reference genome for bedfile.\n    species (str): name of genome species.\n    description (str): a description of the BED files.\n\nReturns:\n    dict: updated technique instance as retrieved from API.\n\n### as_cli_command\n\n```python\ndef as_cli_command(cls)\n```\n\nGet bed importer as click command line interface.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/data.py"}, "isabl_cli/isabl_cli/data.py:LocalDataImporter": {"title": "Local data importer for experiment raw files", "summary": "Comprehensive engine to import raw experiment data from local directories into Isabl, supporting recursive discovery, file-type inspectors, and per-file annotations. It can copy/move/symlink files, perform ownership and readability checks, match files to experiments using regex/grouping rules, and update experiment storage_url, storage_usage, and raw_data in the API; errors are raised for ambiguous or conflicting matches.", "tags": ["data-import", "experiments", "file-matching", "ownership"], "content": "# class LocalDataImporter\n\nA Data import engine for experiments.\n\nAttributes:\n    RAW_DATA_INSPECTORS (list): list of functions which argument is a path and\n        are tasked to return the data type of supported formats.\n\n## Methods\n\n### annotate_file_data\n\n```python\ndef annotate_file_data(self, experiment, file_data, file_type, src, dst)\n```\n\nOverwrite this method to provide custom file_data annotations.\n\n### import_data\n\n```python\ndef import_data(self, directories, symlink=False, commit=False, key=lambda x: x['system_id'], files_data=None, dtypes=None, iexact=False, ignore_ownership=False, copy=False, **filters)\n```\n\nImport raw data for multiple experiments.\n\nExperiments's `storage_url`, `storage_usage`, `raw_data` are\nupdated.\n\nArguments:\n    directories (list): list of directories to be recursively explored.\n    copy (bool): if True files are copied intead of moved.\n    symlink (bool): if True symlink instead of moving.\n    commit (bool): if True perform import operation.\n    key (function): given a experiment dict returns id to match.\n    filters (dict): key value pairs to use as API query params.\n    dtypes (list): data types that should be matched (e.g. BAM, PNG. etc.).\n    iexact (bool): case insensitive match of identifiers.\n    ignore_ownership (bool): raise error if files not owned by admin user.\n    files_data (dict): keys are files basenames and values are\n        dicts with extra annotations such as PL, LB, or any other,\n        see also annotate_file_data.\n\nRaises:\n    click.UsageError: if `key` returns the same identifier for multiple\n        experiments. If a experiment matches both fastq and bam files.\n        if cant determine read 1 or read 2 from matched fastq files.\n\nReturns:\n    tuple: list of experiments for which data has been matched and a\n        summary of the operation.\n\n### check_ownership\n\n```python\ndef check_ownership(cache)\n```\n\nMake sure files matched are owned by current user.\n\n### check_are_readable\n\n```python\ndef check_are_readable(cache)\n```\n\nMake sure files matched can be accessed and read.\n\n### match_path\n\n```python\ndef match_path(self, path, pattern)\n```\n\nMatch `path` with `pattern` and update cache if fastq or bam.\n\n### import_files\n\n```python\ndef import_files(self, instance, files, files_data, symlink, copy)\n```\n\nMove/link files into instance's `storage_url` and update database.\n\nArguments:\n    instance (dict): experiment instance.\n    files (dict): list of files to be imported.\n    copy (bool): if True files are copied intead of moved.\n    symlink (dict): whether to symlink or move the data.\n    files_data (dict): keys are files basenames and values are\n        dicts with extra annotations such as PL, LB, or any other.\n\nRaises:\n    click.UsageError: if multiple data formats are found.\n\nReturns:\n    dict: patched experiment instance.\n\n### get_regex_pattern\n\n```python\ndef get_regex_pattern(group_name, identifier, iexact=False)\n```\n\nGet regex pattern for `identifier` group as `group_name`.\n\nThis pattern treats dashes, underscores and dots equally.\n\nArguments:\n    group_name (str): regex pattern group name.\n    identifier (str): identifier to be matched by regex.\n    iexact (bool): use case insensitive match.\n\nReturns:\n    str: a regex pattern.\n\n### get_summary\n\n```python\ndef get_summary(cache)\n```\n\nGet a summary of the matched, skipped, and missing files.\n\n### as_cli_command\n\n```python\ndef as_cli_command(cls)\n```\n\nGet data importer as a click command line interface.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/data.py"}, "isabl_cli/isabl_cli/data.py:echo_src_dst": {"title": "Print source-to-destination message helper", "summary": "Small utility that prints a standardized message describing a source and destination pair (e.g., when moving or copying files). It takes a message template, source path, and destination path and echoes the operation to the user/console.", "tags": ["logging", "CLI", "utils"], "content": "# echo_src_dst\n\n```python\ndef echo_src_dst(msg, src, dst)\n```\n\nPrint a src to dst msg.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/data.py"}, "isabl_cli/isabl_cli/data.py:symlink": {"title": "Create filesystem symbolic link utility", "summary": "Utility function that creates a symbolic link from a source path to a destination path on the filesystem. It is used by importers when the symlink option is requested instead of copying or moving data.", "tags": ["filesystem", "symlink", "utils"], "content": "# symlink\n\n```python\ndef symlink(src, dst)\n```\n\nCreate symlink from `src` to `dst`.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/data.py"}, "isabl_cli/isabl_cli/data.py:move": {"title": "Move or rename files utility function", "summary": "Simple utility to rename or move a file or directory from a source path to a destination path. This function is typically used by import routines when moving data into an instance's storage_url.", "tags": ["filesystem", "move", "utils"], "content": "# move\n\n```python\ndef move(src, dst)\n```\n\nRename `src` to `dst`.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/data.py"}, "isabl_cli/isabl_cli/data.py:copy": {"title": "Copy files between paths utility function", "summary": "Utility function that copies files or directories from a source to a destination. Used by importers when the copy option is selected instead of moving or symlinking data into Isabl-managed storage.", "tags": ["filesystem", "copy", "utils"], "content": "# copy\n\n```python\ndef copy(src, dst)\n```\n\nCopy files from `src` to `dst`.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/data.py"}, "isabl_cli/isabl_cli/data.py:import_data": {"title": "Bulk import raw sequencing data for experiments", "summary": "import_data recursively scans directories to match and import raw files into multiple experiments, updating each experiment's storage_url, storage_usage, and raw_data. It supports options to copy or symlink files, case-insensitive matching, filtering by data type, attaching per-file annotations, and dry-run versus commit modes.", "tags": ["import", "raw-data", "experiments", "file-matching"], "content": "# import_data\n\n```python\ndef import_data(self, directories, symlink=False, commit=False, key=lambda x: x['system_id'], files_data=None, dtypes=None, iexact=False, ignore_ownership=False, copy=False, **filters)\n```\n\nImport raw data for multiple experiments.\n\nExperiments's `storage_url`, `storage_usage`, `raw_data` are\nupdated.\n\nArguments:\n    directories (list): list of directories to be recursively explored.\n    copy (bool): if True files are copied intead of moved.\n    symlink (bool): if True symlink instead of moving.\n    commit (bool): if True perform import operation.\n    key (function): given a experiment dict returns id to match.\n    filters (dict): key value pairs to use as API query params.\n    dtypes (list): data types that should be matched (e.g. BAM, PNG. etc.).\n    iexact (bool): case insensitive match of identifiers.\n    ignore_ownership (bool): raise error if files not owned by admin user.\n    files_data (dict): keys are files basenames and values are\n        dicts with extra annotations such as PL, LB, or any other,\n        see also annotate_file_data.\n\nRaises:\n    click.UsageError: if `key` returns the same identifier for multiple\n        experiments. If a experiment matches both fastq and bam files.\n        if cant determine read 1 or read 2 from matched fastq files.\n\nReturns:\n    tuple: list of experiments for which data has been matched and a\n        summary of the operation.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/data.py"}, "isabl_cli/isabl_cli/data.py:as_cli_command": {"title": "Build a Click command for the importer class", "summary": "Another reference to as_cli_command showing the mechanism to convert a data importer class into a Click-based command. It encapsulates CLI wiring so the importer can be invoked with consistent command-line semantics and options.", "tags": ["cli", "click", "tooling"], "content": "# as_cli_command\n\n```python\ndef as_cli_command(cls)\n```\n\nGet data importer as a click command line interface.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/data.py"}, "isabl_cli/isabl_cli/data.py:process_bedfile": {"title": "Sort, compress, and index BED files", "summary": "process_bedfile(path) prepares a BED file for use by sorting it, compressing with bgzip, and creating a tabix index. This ensures the BED is in an efficient, queryable format suitable for downstream tools and storage.", "tags": ["BED", "tabix", "bgzip", "preprocessing"], "content": "# process_bedfile\n\n```python\ndef process_bedfile(path)\n```\n\nSort, tabix and gzip a bedfile.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/data.py"}, "isabl_cli/isabl_cli/data.py:import_bedfiles": {"title": "Register and import BED files into technique storage", "summary": "import_bedfiles registers targets and baits BED files into a technique's storage directory and updates the technique's data metadata via the API. It accepts assembly, species, and an optional description and returns the updated technique record.", "tags": ["BED", "technique", "storage", "registration"], "content": "# import_bedfiles\n\n```python\ndef import_bedfiles(cls, technique, targets_path, baits_path, assembly, species, description=None)\n```\n\nRegister input_bed_path in technique's storage dir and update `data`.\n\nArguments:\n    technique (str): technique slug.\n    targets_path (str
