tions in [`SUBMIT_CONFIGURATION`](https://app.gitbook.com/@isabl/s/docs/~/edit/drafts/-Lo6bCi7iKfY_zd4B8U1/isabl-settings#isabl-cli-settings):\n\nConfiguration Name\n\nType\n\nDescription\n\n`get_requirements`\n\nImport String\n\nAn import string to a function that will determine LSF requirements as a function of the experimental methods, see below.\n\n`extra_args`\n\nString\n\nDefault `qsub` , `bsub`, or `sbatch` args to be used across all submissions.\n\n`throttle_by`\n\nInteger\n\nThe total number of analyses that are allowed to run at the same time (default is 50).\n\nThe method `get_requirements` must take the application and a list of targets' technique methods (which are submitted together in the same job array):\n\n#### [](https://docs.isabl.io/writing-applications#other-schedulers)\n\nOther Schedulers\n\nYou can implement [`SUBMIT_ANALYSES`](https://docs.isabl.io/isabl-settings#isabl-cli-settings)functions for other schedulers, the function must take a list of tuples, each tuple being an analysis and the analysis head job script.\n\n### [](https://docs.isabl.io/writing-applications#applications-run-by-multiple-users)\n\nApplications Run by Multiple Users\n\nIsabl applications can be run by multiple users in the same unix group. However, if applications are run by users different than the [`ADMIN_USER`](https://docs.isabl.io/isabl-settings#isabl-cli-settings)and are not [re-runnable](https://docs.isabl.io/writing-applications#re-runnable-applications), then analyses will be set to `FINISHED` instead of `SUCCEEDED`. `isabl process-finished` can be run by the [`ADMIN_USER`](https://docs.isabl.io/isabl-settings#isabl-cli-settings)to copy and own the results and set the permissions to _read-only_ whilst updating analyses status to `SUCCEEDED`. We recommend you add the following cron task in the [`ADMIN_USER`](https://docs.isabl.io/isabl-settings#isabl-cli-settings)profile using `crontab -e`:\n\n### [](https://docs.isabl.io/writing-applications#running-applications-from-python)\n\nRunning Applications from Python\n\nApps can programmatically be triggered from python using the `run` method:\n\n**Tip:** this is useful when creating [operational automations](https://docs.isabl.io/operational-automations)!\n\n## [](https://docs.isabl.io/writing-applications#application-results)\n\nApplication Results\n\nYou can provide an specification your application results using the `application_results` dictionary. Each key is a result _id_ and the value is a dictionary with specs of the result:\n\nBy default, all applications come with 3 default settings `command_script`, `command_log`, and `command_err`. These point to the standard output, standard error, and analysis head job command, respectively.\n\nResults can be paths to files, strings (e.g. MD5s), numbers, and any other serializable value. Here is a full list of the different specifications a result can have:\n\n*     `frontend_type` Defines [how the result should be displayed](https://docs.isabl.io/writing-applications#frontend-result-types) in the frontend. \n*     `description` Information about the result (required) \n*     `verbose_name` Name displayed for the result in the results list (required) \n*     `optional`If `False`and result is missing, an alert will be shown online (optional) \n*     `external_link` URL to a resource that may explain about the result (optional) \n*     `pattern` A glob pattern to match recursively a filename within the analysis folder. (optional) \n*     `exclude` Any string to exclude that falls `pattern`. (optional) \n\nBy default, analysis results are protected upon completion (i.e. permissions are set to read only). If you want your application to be re-runnable indefinitely, set `application_protect_results = False`.\n\n### [](https://docs.isabl.io/writing-applications#frontend-result-types)\n\nFrontend Result Types\n\nSpecifying the result `frontend_type` is meant to define how to render it through Isabl Web. When set to `None` the result will still be available in the analysis, but it won't be shown in the frontend.\n\nHere is a full list of the result types that are supported for rendering in Isabl Web:\n\nFrontend Type\n\nDescription\n\n`text-file`\n\nIt's shown as a raw file, and its content is streamed as the user requests it.\n\n`tsv-file`\n\nIt can be shown as raw text or tabulated for easier inspection (i.e. VCF, TSV).\n\n`string`,`number`\n\nIt's shown as a string and can't be downloaded.\n\n`image`\n\nPreviews are displayed in a gallery in the _analysis_ view.\n\n`html`, `pdf`\n\nRendered as html in an `iframe`.\n\n`igv_bam[:index]`\n\nCan be streamed to visualized in an embedded IGV viewer. If another result called `bai` is the BAM index, you can set it to`igv_bam:bai`.\n\n`None`\n\nFor non-previewable files, that are either large, compressed or it's format is not supported. i.e. fastq, .RData objects, .pkl models, etc.\n\nIf a desired data type is not supported, please consider contributing to Isabl Web to add it. See [Contributing Guide](https://docs.isabl.io/contributing-guide)\n\n### [](https://docs.isabl.io/writing-applications#re-runnable-applications)\n\nRe-runnable Applications\n\nBy default, analysis results are protected upon completion (i.e. permissions are set to read only). If you want your application to be re-runnable indefinitely, set:\n\n### [](https://docs.isabl.io/writing-applications#databasing-analysis-results)\n\nDatabasing Analysis Results\n\nWhen `application_results` is defined, you must implement `get_analysis_results`. This method must return a serializable dictionary of results and its only run after the analysis has been completed successfully. For our example it can be something like:\n\nWhen using the properties, `pattern` in the results' definition for the `application_results`, the `get_analysis_results`method can be simplified as isabl will match the filename using the `pattern`and `exclude`fields by walking recursively the analysis' output directory.\n\nFor instance, this previous app needs only the `count`result to be defined, as `input` and `output`can be automatically matched, hence it can be simplified as:\n\nIn cases, where all `application_results` are filenames with `pattern`, the `get_analysis_results` is not even needed.\n\n### [](https://docs.isabl.io/writing-applications#project-and-individual-level-auto-merge)\n\nProject and Individual Level Auto-merge\n\nIsabl applications can produce auto-merge analyses at a _project_ and _individual_ level. For example, you may want to merge variants whenever new results are available for a given project, or update quality control reports when a new sample is added to an individual. A newly versioned analysis will be created for each type of auto-merge and your role is to take a list of succeeded analysis and implement the merge logic.\n\nThe first argument in `merge_project_analyses`, is the project level `analysis`, which is unique per project and application. The second argument is a list of all completed `analyses` of this application for a given project. Your role is to merge `analyses` output into the project level `analysis` directory. We need to define similar methods for the **Individual** level auto merge. Lets say that our project-level merge logic is the same for individuals, then we can simply do:\n\nIf at any arbitrary time you want to test the auto-merge logic, use any of these two commands:\n\nPlease note that merged output will always be stored in the same analysis for a given project or individual and application. Furthermore, you can validate analyses before running the merge operation by implementing `validate_project_analyses`, and `validate_individual_analyses`.\n\n#### [](https://docs.isabl.io/writing-applications#submitting-merge-analysis-to-a-compute-architecture)\n\nSubmitting Merge Analysis to A Compute Architecture\n\nMerge operations are triggered automatically when the last analysis that is meant to be merged finish running. By default, the merge operation will be conducted right after the analysis is patched to `SUCCEEDED`. However, you can define how merge analyses are submitted using Isabl CLI setting [`SUBMIT_MERGE_ANALYSIS`](https://docs.isabl.io/isabl-settings#isabl-cli-settings). For example in `LSF`:\n\nHere is an example for `SGE`:\n\n## [](https://docs.isabl.io/writing-applications#optional-functionality)\n\nOptional Functionality\n\nThis section lists additional optional functionality supported by Isabl applications. Particularly, dependencies on other applications, after completion analyses status, and unique analyses per individual.\n\n### [](https://docs.isabl.io/writing-applications#analyses-inputs-and-dependencies-on-other-applications)\n\n Analyses Inputs and Dependencies on Other Applications\n\nApplication _inputs_ are analysis-specific settings (_settings_ are the same for all analyses, yet _inputs_ are potentially different for each analysis). Inputs can be formally defined using `application_inputs`, inputs set to `NotImplemented` are considered required and must be resolved using `get_dependencies`:\n\nThe main objective of `application_inputs` and `get_dependencies`is to retrieve results and analyses that should be linked to the newly created analysis. Linked analyses are accessible from the analysis detail frontend view.\n\n### [](https://docs.isabl.io/writing-applications#get-after-completion-status)\n\nGet After Completion Status\n\nIn certain cases you don't want your analyses to be marked as `SUCCEEDED` after completion, as you may want to flag them for manual review or leave them to know that you need to run an extra step on them. For these cases, you may want to set the _after-completion_ status to `IN_PROGRESS`:\n\n### [](https://docs.isabl.io/writing-applications#unique-analysis-per-individual)\n\nUnique Analysis Per Individual\n\nIt is possible to create applications that are unique at the individual level. To do so set `unique_analysis_per_individual = True`. A good example of a unique per individual application could be a patient centric report that aggregates results across all samples. If you are interested on how analyses for these applications are created, give a look at `AbstractApplication.get_individual_level_analyses.`\n\nIndividual Level Auto-Merge and Unique Analyses Per Individual are different concepts. Applications that require a unique analysis per individual **don't**support individual level auto-merge.\n\n### [](https://docs.isabl.io/writing-applications#get-notified-when-analyses-fail)\n\nGet Notified When Analyses Fail\n\nYou can configure Isabl API to periodically check if any analysis has failed and send you email notifications. To do so, head to the admin site at `/admin/django_celery_beat/periodictask/add/` and in _Task (registered)_ select `isabl_api.tasks.report_status_change_task`, then create a 1 hour interval, and provide the following Keyword arguments `{\"status\": \"FAILED\", \"seconds\": 3600}` (i.e. _every hour check how many analyses failed in the past hour_):\n\n![Image 6](https://docs.isabl.io/~gitbook/image?url=https%3A%2F%2F627844163-files.gitbook.io%2F%7E%2Ffiles%2Fv0%2Fb%2Fgitbook-legacy-files%2Fo%2Fassets%252F-LgZ3I0-6juLK-X9gb1Z%252F-LqNDvIwzpqBuVcljkPI%252F-LqNEqiXFED-W83LOa60%252Fimage.png%3Falt%3Dmedia%26token%3Db404fea8-091a-4720-95d3-d39ade60ff31&width=768&dpr=3&quality=100&sign=d4a3c5be&sv=2)\n\nEvery hour check how many analyses failed in the past hour.\n\n## [](https://docs.isabl.io/writing-applications#testing-applications)\n\nTesting Applications\n\nOur goal is to make it extremely easy to test your applications. Ideal apps can be tested locally, with fake/dummy data using _factory-created_ database instances. [Isabl CLI](https://github.com/isabl-io/cli) and [Cookiecutter Apps](https://github.com/isabl-io/cookiecutter-apps) come with a range of utilities to help you test your applications.\n\n### [](https://docs.isabl.io/writing-applications#useful-pytest-fixtures)\n\nUseful Pytest Fixtures\n\nIf you created your project using [Cookiecutter Apps](https://github.com/isabl-io/cookiecutter-apps), the following `pytest` fixtures are available to you:\n\nName\n\nDescription\n\n`commit`\n\nEnables you to run `pytest` using a `--commit` flag, this flag can [later](https://docs.isabl.io/writing-applications#application-test-example) be used to actually commit the application.\n\n`datadir`\n\nPath to the dummy data directory. Your tests directory comes with a `data` folder, which can be populated with dummy, small files - useful to run your apps.\n\n`tmpdir`\n\nThis is like the regular pytest [`tmpdir`](http://doc.pytest.org/en/latest/tmpdir.html) yet it comes with some perks. First, it sets the current [`DATA_STORAGE_DIRECTORY`](https://docs.isabl.io/isabl-settings#isabl-cli-settings) to a temporary directory. Second, it comes with `tmpdir.docker`, a method to create executable scripts to docker containers and with specific `entrypoints`. For example `tmpdir.docker(\"ubuntu\", \"echo\")` creates an executable script that calls `echo` using an Ubuntu image.\n\nLook at the [test example](https://app.gitbook.com/@isabl/s/docs/~/edit/drafts/-Lo6bCi7iKfY_zd4B8U1/writing-applications#application-test-example) to learn how use these fixtures.\n\n### [](https://docs.isabl.io/writing-applications#creating-fake-data-and-metadata)\n\nCreating Fake Data and Metadata\n\nIsabl CLI comes with a full set of factories that facilitate the creation of fake metadata. Here is an example of how to create two experiments for the same sample:\n\nWe recommend limiting use of these factories to development instances of Isabl API. By default, `ISABL_API_URL` is set to [http://0.0.0.0:8000/api/v1/](http://0.0.0.0:8000/api/v1/).\n\nBeing able to actually run the applications (i.e. passing `--commit`) during testing might be something valuable to you. In the case of Next Generation Sequencing, for example, you could create fake BAMs and really small reference genomes (few KBs) to test variant calling applications.\n\n### [](https://docs.isabl.io/writing-applications#application-test-example)\n\nApplication Test Example\n\nHere is a comprehensive example to test our `HelloWorldApp`, projects created [Cookiecutter Apps](https://github.com/isabl-io/cookiecutter-apps) will include this test:\n\n[The actual test](https://github.com/isabl-io/example_apps/blob/master/tests/test_hello_world.py) is much more comprehensive. It creates two experiments per individual and validates that [auto-merge](https://docs.isabl.io/writing-applications#project-and-individual-level-auto-merge) was actually conducted, that the application is [re-runnable](https://docs.isabl.io/writing-applications#re-runnable-applications), and that the [command line configuration](https://docs.isabl.io/writing-applications#command-line-configuration) works well.\n\n[Previous Retrieving Data](https://docs.isabl.io/retrieve-data)[Next Operational Automations](https://docs.isabl.io/operational-automations)\n\nLast updated 1 year ago\n\nWas this helpful?\n\n*   [Introduction](https://docs.isabl.io/writing-applications#introduction)\n*   [How Does an Application Look Like?](https://docs.isabl.io/writing-applications#how-does-an-application-look-like)\n*   [Analyses and Results](https://docs.isabl.io/writing-applications#analyses-and-results)\n*   [Getting Started with Isabl Applications](https://docs.isabl.io/writing-applications#getting-started-with-isabl-applications)\n*   [Registering Applications](https://docs.isabl.io/writing-applications#registering-applications)\n*   [Creating Applications](https://docs.isabl.io/writing-applications#creating-applications)\n*   [Versioning Applications](https://docs.isabl.io/writing-applications#versioning-applications)\n*   [Application Settings](https://docs.isabl.io/writing-applications#application-settings)\n*   [Validate Application Settings](https://docs.isabl.io/writing-applications#validate-application-settings)\n*   [Running Applicati ns#testing-applications)\n*   [Useful Pytest Fixtures](https://docs.isabl.io/writing-applications#useful-pytest-fixtures)\n*   [Creating Fake Data and Metadata](https://docs.isabl.io/writing-applications#creating-fake-data-and-metadata)\n*   [Application Test Example](https://docs.isabl.io/writing-applications#application-test-example)\n\nWas this helpful?\n\nCopy`isabl apps hello-world --filters projects 102`\n\nCopy\n```\n# first make sure you have cookiecutter installed\npip install cookiecutter\n\n# now lets bootstrap your project\ncookiecutter https://github.com/isabl-io/cookiecutter-apps\n\n# finally install you project in a new virtual environment\ncd <project-name> && pip install -r requirements.txt\n```\n\nCopy\n```\n\"INSTALLED_APPLICATIONS\": [\n    \"example_apps.apps.HelloWorldApp\",\n]\n```\n\nCopy\n```\nclass HelloWorldApp(AbstractApplication):\n\n    NAME = \"Hello World\"\n    VERSION = \"1.0.0\"\n```\n\nCopy\n```\nclass HelloWorldApp(AbstractApplication):\n\n    NAME = \"Hello World\"\n    VERSION = \"1.0.0\"\n    ASSEMBLY = \"GRCh37\"\n    SPECIES = \"HUMAN\"\n```\n\nCopy\n```\nclass HelloWorldApp(AbstractApplication):\n    \n    application_description = \"An App to show case different Isabl functionalities.\"\n    application_url = \"https://docs.isabl.io/writing-applications\"\n```\n\nCopy\n```\nclass HelloWorldApp(AbstractApplication):\n\n    application_import_strings = {\"sym_link\"}\n    application_settings = {\n        \"echo_path\": \"echo\",\n        \"default_message\": \"Hello World\",\n        \"sym_link\": \"isabl_cli.utils.force_symlink\"\n    }\n```\n\nCopy\n```\n> HelloWorldApp().application.settings\n{\n   # settings as a function of Isabl CLI client's primary key\n   1: {\"echo_path\": \"/usr/local/bin/echo\"}  \n}\n```\n\nCopy\n```\nHelloWorldApp().patch_application_settings(\n    client_id=1,\n    echo_path=\"/usr/bin/echo\"\n)\n```\n\nCopy\n```\nfrom shutil import which\n\nclass HelloWorldApp(AbstractApplication):\n\n    def :\n        assert len(targets) == 1, \"only one target experiment per analysis\"\n        assert targets[0].raw_data, \"target experiment has no linked raw data\"\n        self.validate_dna_only(targets)  # multiple validators are readily available\n```\n\nCopy\n```\nfrom os.path import join\nimport click\n\nclass HelloWorldApp(AbstractApplication):\n    \n    cli_options = [options.TARGETS, click.option(\"--message\")]\n    \n    def get_command(self, analysis, inputs, settings):\n        echo = settings.echo_path\n        target = analysis.targets[0]\n        message = settings.run_args.message or settings.default_message\n        output_file = join(analysis.storage_url, \"output.txt\")\n        input_file = join(analysis.storage_url, \"input.txt\")\n        settings.sym_link(target.raw_data[0].file_url, input_file)\n        return (\n            f\"bash -c '{echo} Sample: {target.sample.identifier} > {output_file}' && \"\n            f\"bash -c '{echo} Message: {message} >> {output_file}' && \"\n            f\"bash -c '{echo} Data: >> {output_file}' && \"\n            f\"bash -c 'cat {input_file} >> {output_file}' \"\n        )\n```\n\nCopy\n```\nfrom os.path import join, exists\nfrom os import remove\n\nclass HelloWorldApp(AbstractApplication):\n    cli_options = [options.TARGETS]\n\n    def get_command(self, analysis, inputs, settings):\n        if settings.restart:\n            to_rm_path = join(analysis.storage_url, \"run.lock\")\n            if exists(to_rm_path):\n                remove(to_rm_path)\n        \n        return \"echo 'Hello World!'\"\n```\n\nCopy\n```\n// IBM's LSF\n\"SUBMIT_ANALYSES\": \"isabl_cli.batch_systems.lsf.submit_lsf\",\n\n// Sun Grid Engine\n\"SUBMIT_ANALYSES\": \"isabl_cli.batch_systems.sge.submit_sge\",\n\n// Slurm\n\"SUBMIT_ANALYSES\": \"isabl_cli.batch_systems.slurm.submit_slurm\",\n```\n\nCopy\n```\ndef get_lsf_requirements(app, targets_methods):\n    if isinstance(app, apps.HelloWorldApp):\n        memory = 10 if \"WG\" in targets_methods else 1\n        return f\"-n {1} -R 'rusage[mem={memory}]'\"\n```\n\ncrontab -e\n\nCopy\n```\n# Change analyses permissions and updates them to SUCCEEDED.\n*/30 * * * * source ~/.bash_profile &> /dev/null; isabl process-finished &>> ~/moving.log\n```\n\nCopy\n```\nHelloWorldApp().run(\n    tuples=[([target_experiment], [])],\n    run_args=dict(message=\"custom message\"),\n    commit=True,\n)\n```\n\nCopy\n```\nclass HelloWorldApp(AbstractApplication):\n\n    application_results = {\n        \"input\": {\n            \"frontend_type\": \"text-file\",\n            \"description\": \"Symlink to experiment raw data.\",\n            \"verbose_name\": \"Hello World Input\",\n            \"external_link\": \"https://en.wikipedia.org/wiki/Symbolic_link\",\n            \"pattern\": \"input.txt\",\n        },\n        \"output\": {\n            \"frontend_type\": \"text-file\",\n            \"description\": \"Sample id, hello world message, and content of raw data.\",\n            \"verbose_name\": \"Hello World Result\",\n            \"external_link\": \"https://hello.world/\",\n            \"pattern\": \"output.txt\",\n        },\n        \"count\": {\n            \"frontend_type\": \"number\",\n            \"description\": \"Count of characters in output file.\",\n            \"verbose_name\": \"Characters Count\",\n        },\n    }\n```\n\nCopy\n```\nclass HelloWorldApp(AbstractApplication):\n\n    application_protect_results = False\n```\n\nCopy\n```\nclass HelloWorldApp(AbstractApplication):\n\n    def get_analysis_results(self, analysis):\n        output = join(analysis.storage_url, \"output.txt\")\n\n        with open(output) as f:\n            count = sum(len(i) for i in f)\n\n        return {\n            \"input\": join(analysis.storage_url, \"input.txt\"),\n            \"output\": output,\n            \"count\": count\n        }\n```\n\nCopy\n```\nclass HelloWorldApp(AbstractApplication):\n\n    def get_analysis_results(self, analysis):\n        results = super().get_analysis_results(self, analysis)\n        \n        with open(results[\"output\"]) as f:\n            results[\"count\"] = sum(len(i) for i in f)\n        \n        return results\n```\n\nCopy\n```\nclass HelloWorldApp(AbstractApplication):\n\n    application_project_level_results = {\n        \"merged\": {\n            \"frontend_type\": \"text-file\",\n            \"description\": \"Merged output files.\",\n            \"verbose_name\": \"Merged Output Files\",\n        },\n        \"count\": {\n            \"frontend_type\": \"number\",\n            \"description\": \"Count of characters for merged output.\",\n            \"verbose_name\": \"Merged Outth put Characters Count\",\n        },\n    }\n    \n    def merge_project_analyses(self, analysis, analyses):\n        with open(join(analysis.storage_url, \"merged.txt\"), \"w\") as f:\n            for i in analyses:\n                with open(i.results.output) as output:\n                    f.write(output.read())\n\n    def get_project_analysis_results(self, analysis):\n        merged = join(analysis.storage_url, \"merged.txt\")\n\n        with open(merged) as f:\n            count = sum(len(i) for i in f)\n\n        return {\"merged\": merged, \"count\": count}\n```\n\nCopy\n```\nclass HelloWorldApp(AbstractApplication):\n\n    # reuse the project merge logic at the individual level\n    application_individual_level_results = application_project_level_results\n    merge_individual_analyses = merge_project_analyses\n    get_individual_analysis_results = get_project_analysis_results\n```\n\nCopy\n```\n# for project level auto merge\nisabl merge-project-analyses --project <project id> --application <application id>\n\n# for individual level automerge\nisabl merge-individual-analyses --individual <individual id> --application <application id>\n```\n\nCopy\n```\nimport subprocess\n\ndef submit_merge_analysis_to_lsf(instance, application, command):\n    \"\"\"Submit project merge to LSF.\"\"\"\n    command = [\"bsub\", \"-n\", \"1\", \"-W\", \"40000\", \"-M\", \"32\"] + command.split()\n    subprocess.check_call(command)\n    print(\"Submited merge analysis using: \" + \" \".join(command))\n```\n\nCopy\n```\nimport subprocess\n\ndef submit_merge_analysis_to_sge(instance, application, command):\n    \"\"\"Submit project merge to SGE.\"\"\"\n    command = f\"qsub -l h_vmem=[32G] << EOF\\n{command}\\nEOF\\n\"\n    subprocess.check_call(command, shell=True)\n    print(f\"Submited project level merge with: {command}\")\n```\n\nCopy\n```\nfrom isabl_cli import utils\n\nclass HelloWorldApp(AbstractApplication):\n  \n    application_inputs = {\"previously_generated_result\": NotImplemented}\n\n    # get dictionary of inputs this function is run before get_command.\n    # must return a tuple: (list of analyses dependencies primary keys, inputs dict)\n    def get_dependencies(self, targets, references, settings):\n        result, analysis_key = utils.get_result(  # return result value and key of analysis that generated it\n            experiment=targets[0],                # get result for the first target experiment\n            application_key=123,                  # primary key of previous app in database\n            result_key=\"a_result_name\",           # name of result in the app definition\n        )\n\n        return [analysis_key], {\"previously_generated_result\": result}\n```\n\nCopy\n```\nclass HelloWorldApp(AbstractApplication):\n    def get_after_completion_status(self, analysis):\n        return \"IN_PROGRESS\"\n```\n\nCopy\n```\nfrom isabl_cli import api\nfrom isabl_cli import factories\n\nmeta_data = factories.ExperimentFactory()\nmeta_data[\"sample\"][\"individual\"][\"species\"] = \"HUMAN\"\nexperiment = api.create_instance(\"experiments\", **meta_data)\nassert experiment.pk > 0, \"failed to create database instance\"\n```\n\nCopy\n```\ndef test_hello_world_app(tmpdir, datadir, commit):\n    # path to hello_world test data\n    hello_world_datadir = join(datadir, \"hello_world\")\n    raw_data = [\n        dict(\n            file_url=join(hello_world_datadir, \"test.txt\"),\n            file_data=dict(extra=\"annotations\"),\n            file_type=\"FASTQ_R1\",\n        ),\n    ]\n\n    # overwrite default configuration for the default client\n    meta_data = factories.ExperimentFactory(raw_data=raw_data)\n    meta_data[\"sample\"][\"individual\"][\"species\"] = \"HUMAN\"\n    meta_data[\"storage_url\"] = hello_world_datadir\n    experiment = api.create_instance(\"experiments\", identifier=\"a\", **meta_data)\n\n    # create files if you may test with real data at some point\n    app = HelloWorldApp()\n    app.application.settings.default_client = {\n        \"default_message\": \"Hello from Elephant Island.\",\n        \"echo_path\": tmpdir.docker(\"ubuntu\", \"echo\")\n    }\n\n    # run application and make sure results are reported\n    utils.assert_run(\n        application=app,\n        tuples=[([experiment], [])],\n        commit=commit,\n        results=[\"output\", \"count\", \"input\"],\n    )\n```", "source_url": "https://docs.isabl.io/writing-applications"}, "isabl_api/isabl_api/models/aliquot.py:model:Aliquot": {"title": "Aliquot Model: Managing Sample Aliquots", "summary": "Django model representing sample aliquots used in Isabl. It inherits from BaseBioModel, includes a foreign key to the Sample model, and enforces uniqueness of (sample, identifier) to uniquely identify aliquots.", "tags": ["django-model", "aliquot", "sample-management", "metadata"], "content": "# Model: Aliquot\n\nInherits from: BaseBioModel\n\nModel used to manage sample aliquots.\n\n## Fields\n\n- `sample`: models.ForeignKey(to='isabl_api.Sample', on_delete=models.PROTECT, verbose_name='Source sample', blank=False, null=True)\n\n## Meta\n\nunique_together = ('sample', 'identifier')\nindex_together = ('sample', 'identifier')", "source_url": "https://github.com/papaemmelab/isabl_api/blob/master/isabl_api/models/aliquot.py"}, "isabl_api/isabl_api/models/analysis.py:model:Analysis": {"title": "Analysis Model: Tracking Application Runs and Results", "summary": "Defines the Analysis model used to represent instances of Applications run on sequencing objects. It includes links to projects or individuals, relationships to other analyses, targets/references, application type, status lifecycle timestamps, runtime/wait metrics, results as JSON, and permissions for downloading results.", "tags": ["analysis", "model", "results", "status"], "content": "# Model: Analysis\n\nInherits from: BaseModel\n\nAn Analysis is an instance of an Application.\n\n## Fields\n\n- `project_level_analysis`: models.ForeignKey(null=True, blank=True, on_delete=models.PROTECT, to='isabl_api.Project', help_text='Foreign key to Project if instance i...)\n- `individual_level_analysis`: models.ForeignKey(null=True, blank=True, on_delete=models.PROTECT, to='isabl_api.Individual', help_text='Foreign key to Individual if indi...)\n- `analyses`: models.ManyToManyField(blank=True, help_text='Other analyses linked as dependency or reference.', related_name='analyses', to='self', verbose_n...)\n- `references`: models.ManyToManyField(blank=True, help_text='Sequencing objects used as references.', related_name='analyses_as_reference', to=Experiment, ver...)\n- `targets`: models.ManyToManyField(blank=True, help_text='Sequencing objects used as a targets.', related_name='analyses_as_target', to=Experiment, verbose...)\n- `application`: models.ForeignKey(blank=True, default=None, help_text='Type of analysis.', null=True, on_delete=models.PROTECT, to=Application, verbose_na...)\n- `previous_status`: models.CharField(blank=True, default=None, editable=False, help_text='Analysis previous status.', max_length=100, null=True, verbose_name...)\n- `status`: models.CharField(blank=True, db_index=True, default='CREATED', help_text='Analysis current status.', max_length=100, null=True, verbose_n...)\n- `ran_by`: models.ForeignKey(related_name='ran_ els/analysis.py"}, "isabl_api/isabl_api/models/application.py:model:Application": {"title": "Application Model: Registering Analytical Tools", "summary": "Describes the Application model for registering analysis tools in Isabl, including fields for name, version, linked genome assembly, application_class (executor), configuration (settings), and results specification. Uniqueness is enforced for name/version/assembly and a slug is maintained for instances.", "tags": ["application", "model", "configuration", "tools"], "content": "# Model: Application\n\nInherits from: BaseModel\n\nAn class to store unique application objects.\n\n## Fields\n\n- `assembly`: models.ForeignKey(null=True, blank=True, on_delete=models.PROTECT, to='isabl_api.Assembly', help_text='Genome assembly linked to applicati...)\n- `name`: models.CharField(verbose_name='Application Name', max_length=100, null=False)\n- `version`: models.CharField(verbose_name='Application Version', max_length=100, null=True, blank=False)\n- `description`: models.TextField(verbose_name='Application Description', null=True, blank=True)\n- `url`: models.CharField(verbose_name='Application URL', max_length=300, null=True, blank=False)\n- `application_class`: models.CharField(verbose_name='Application Class', help_text='Class used to execute the application.', max_length=100, null=True, blank=F...)\n- `settings`: JSONField(blank=True, null=True, default=dict, verbose_name='Application configuration.')\n- `results`: JSONField(blank=True, null=True, default=dict, verbose_name='Results specification.')\n- `slug`: models.SlugField(editable=False, null=True, unique=False, verbose_name='Instance Slug', max_length=500)\n\n## Meta\n\nunique_together = ('name', 'version', 'assembly')\nindex_together = ('name', 'version', 'assembly')\n\n## Methods\n\n### get_readonly_fields\n\n```python\ndef get_readonly_fields(cls, *extra)\n```\n### __str__\n\n```python\ndef __str__(self)\n```\n\nDisplay name, version and assembly.", "source_url": ect was created.', verbose_name='Created Date')\n- `modified`: models.DateTimeField(auto_now=True, help_text='Last date when object was updated.', verbose_name='Modified Date')\n- `created_by`: models.ForeignKey(to=settings.AUTH_USER_MODEL, to_field='username', on_delete=models.SET_NULL, verbose_name='Created By', help_text='User ...)\n\n## Meta\n\nabstract = True\n\n## Methods\n\n### model_name\n\n```python\ndef model_name(self)\n```\n\nReturn model's name.\n### model_plural_name\n\n```python\ndef model_plural_name(self)\n```\n\nReturn model's plural name.\n### model_plural_slug\n\n```python\ndef model_plural_slug(self)\n```\n\nReturn a slug of model's plural name.\n### get_create_fields\n\n```python\ndef get_create_fields(cls, *extra)\n```\n\nGet API create fields.\n### get_update_fields\n\n```python\ndef get_update_fields(cls, *extra)\n```\n\nGet API update fields.\n### get_readonly_fields\n\n```python\ndef get_readonly_fields(cls, *extra)\n```\n\nGet API read only fields.\n### get_search_fields\n\n```python\ndef get_search_fields(cls, *extra)\n```\n\nGet API search fields.\n### get_serializer_fields\n\n```python\ndef get_serializer_fields(cls)\n```\n\nReturn get_create_fields() + get_readonly_fields().\n### get_absolute_url\n\n```python\ndef get_absolute_url(self)\n```\n\nGet detail API URL.", "source_url": "https://github.com/papaemmelab/isabl_api/blob/master/isabl_api/models/base.py"}, "isabl_api/isabl_api/models/base.py:model:BaseModel": {"title": "BaseModel: Shared Fields and Utilities for Models", "summary": "Abstract BaseModel that extends TimeStampedModel with common fields like notes, storage_url, storage_usage, custom_fields, uuid, and a free-form data JSON. It also supplies methods for readonly/create/update/search field lists, optimized queryset construction, and a clean hook.", "tags": ["base-model", "metadata", "storage", "django"], "content": "# Model: BaseModel\n\nInherits from: TimeStampedModel\n\nBase abstract model.\n\n## Fields\n\n- `notes`: models.TextField(blank=True, null=True, verbose_name='Notes', help_text='Free text field to keep notes on object.')\n- `storage_url`: models.CharField(null=True, blank=True, verbose_name='Storage URL', help_text='Address to the storage bucket.', max_length=1000)\n- `storage_usage`: models.BigIntegerField(blank=True, default=0, verbose_name='Storage Usage', help_text='Storage usage in bytes', null=True)\n- `custom_fields`: JSONField(blank=True, default=dict, verbose_name='Custom Fields', help_text='JSON field used to store custom fields.')\n- `uuid`: models.UUIDField(default=uuid.uuid4, editable=False, help_text='Universally Unique Identifier.', verbose_name='Universally Unique Identif...)\n- `data`: JSONField(blank=True, default=dict, verbose_name='Unstructured Data Field', help_text='JSON field used to store unstructured data....)\n\n## Meta\n\nabstract = True\n\n## Methods\n\n### get_readonly_fields\n\n```python\ndef get_readonly_fields(cls, *extra)\n```\n### get_create_fields\n\n```python\ndef get_create_fields(cls, *extra)\n```\n### get_update_fields\n\n```python\ndef get_update_fields(cls, *extra)\n```\n### get_search_fields\n\n```python\ndef get_search_fields(cls, *extra)\n```\n### get_optimized_queryset\n\n```python\ndef get_optimized_queryset(cls, queryset=None, include=None, exclude=None)\n```\n\nOptimize queries using select and prefetch related fields.\n### clean\n\n```python\ndef clean(self)\n```", "source_url": "https://github.com/papaemmelab/isabl_api/blob/master/isabl_api/models/base.py"}, "isabl_api/isabl_api/models/base.py:model:BaseSlugModel": {"title": "Abstract model providing unique slug field", "summary": "An abstract Django model that provides a single slug field for derived models. It defines convenience methods like __str__, get_readonly_fields, and get_search_fields to standardize how slugged models are represented and searched.", "tags": ["django-model", "slug", "abstract", "isabl-core"], "content": "# Model: BaseSlugModel\n\nInherits from: BaseModel\n\nSimple model with a slug field.\n\n## Fields\n\n- `slug`: models.SlugField(editable=False, null=True, unique=True, verbose_name='Instance Slug', max_length=500)\n\n## Meta\n\nabstract = True\n\n## Methods\n\n### __str__\n\n```python\ndef __str__(self)\n```\n\nMake sure submission engine finds object.\n### get_readonly_fields\n\n```python\ndef get_readonly_fields(cls, *extra)\n```\n### get_search_fields\n\n```python\ndef get_search_fields(cls, *extra)\n```", "source_url": "https://github.com/papaemmelab/isabl_api/blob/master/isabl_api/models/base.py"}, "isabl_api/isabl_api/models/base.py:model:BaseBioModel": {"title": "Abstract biological base model for entities", "summary": "An abstract base class for biological entities (Individual, Sample, Experiment) that centralizes common fields like identifier, system_id and submission. It implements utilities for child relationships, search/create/readonly field lists, and auto-creates a system_id on first save while avoiding force_insert issues.", "tags": ["bio-model", "system_id", "inheritance", "samples"], "content": "# Model: BaseBioModel\n\nInherits from: BaseModel\n\nBase sample model.\n\nAn abstract class for Individual, Sample and Experiment models.\n\n## Fields\n\n- `identifier`: models.CharField(blank=True, max_length=100, null=True, help_text='Instance Identifier.', verbose_name='Identifier')\n- `system_id`: db.CharNullField(blank=True, db_index=True, default=None, editable=False, max_length=100, null=True, verbose_name='System ID')\n- `submission`: models.ForeignKey(blank=True, null=True, on_delete=models.PROTECT, to='isabl_api.Submission', help_text='Primary key of submission if crea...)\n\n## Meta\n\nabstract = True\n\n## Methods\n\n### __str__\n\n```python\ndef __str__(self)\n```\n\nSet `system_id` as the default string representation.\n### get_create_fields\n\n```python\ndef get_create_fields(cls, *extra)\n```\n### get_search_fields\n\n```python\ndef get_search_fields(cls, *extra)\n```\n### get_readonly_fields\n\n```python\ndef get_readonly_fields(cls, *extra)\n```\n### get_child_model\n\n```python\ndef get_child_model(cls)\n```\n\nGet the child model.\n\nif Individual, return Sample elif ``Sample`` return Experiment\nelse return `None.\n### children\n\n```python\ndef children(self)\n```\n\nChildren objects.\n### save\n\n```python\ndef save(self, **kwargs)\n```\n\nCreate system id on first save.\n\n`force_insert` is set to `False` in order to avoid error while `create`\nsee http://stackoverflow.com/questions/9940674.", "source_url": "https://github.com/papaemmelab/isabl_api/blob/master/isabl_api/models/base.py"}, "isabl_api/isabl_api/models/base.py:model:CustomField": {"title": "CustomField model for extensible metadata fields", "summary": "Model that registers user-defined custom fields for supported models. It stores target model name, field_name (validated for format), optional verbose_name, and a configuration JSON blob; uniqueness is enforced per model+field_name and a clean() method validates entries.", "tags": ["custom-fields", "JSONField", "validation", "metadata"], "content": "# Model: CustomField\n\nInherits from: TimeStampedModel\n\n## Fields\n\n- `model`: models.CharField(max_length=100, help_text='Model e.g. `isabl_api.Individual`. It must support custom fields.', validators=[validators.va...)\n- `field_name`: models.CharField(max_length=100, help_text='Only lower case and under scores (e.g. field_name).', validators=[RegexValidator(regex='^(\\\\_...)\n- `verbose_name`: models.CharField(max_length=200, help_text='Verbose name for field.', null=True, blank=True, default=None)\n- `configuration`: JSONField(blank=True, default=dict, null=True, verbose_name='Custom Field Configuration')\n\n## Meta\n\nunique_together = ('model', 'field_name')\n\n## Methods\n\n### __str__\n\n```python\ndef __str__(self)\n```\n\nShow model and field name.\n### clean\n\n```python\ndef clean(self)\n```", "source_url": "https://github.com/papaemmelab/isabl_api/blob/master/isabl_api/models/base.py"}, "isabl_api/isabl_api/models/center.py:model:Center": {"title": "Center model tracking sample generating centers", "summary": "A simple model for tracking centers (institutions) where data are generated. It inherits BaseSlugModel and stores name and acronym with a uniqueness constraint on the pair and an index on the slug.", "tags": ["center", "institution", "slug", "metadata"], "content": "# Model: Center\n\nInherits from: BaseSlugModel\n\nSimple model to track centers.\n\n## Fields\n\n- `name`: models.CharField(editable=True, max_length=100, null=True, help_text='Center name without acronym.', verbose_name='Center Name')\n- `acronym`: models.CharField(blank=False, editable=True, help_text='Abbreviation formed from the initial letters (e.g. NASA ).', max_length=10, null=...)\n\n## Meta\n\nunique_together = ('name', 'acronym')\nindexes = [models.Index(fields=['slug'])]", "source_url": "https://github.com/papaemmelab/isabl_api/blob/master/isabl_api/models/center.py"}, "isabl_api/isabl_api/models/client.py:model:Client": {"title": "Client settings model with JSON preferences", "summary": "Model for storing client-specific unstructured settings using a JSONField and a slug identifier. It is timestamped and includes a clean() method for validation of the slug or settings as needed.", "tags": ["client", "settings", "JSONField", "configuration"], "content": "# Model: Client\n\nInherits from: TimeStampedModel\n\nA simple class to clients settings.\n\n## Fields\n\n- `settings`: JSONField(blank=True, default=dict, verbose_name='Unstructured Preferences Field', help_text='JSON field used to store unstructure...)\n- `slug`: models.SlugField(editable=True, null=True, unique=True, verbose_name='Client Slug', max_length=100)\n\n## Methods\n\n### clean\n\n```python\ndef clean(self)\n```", "source_url": "https://github.com/papaemmelab/isabl_api/blob/master/isabl_api/models/client.py"}, "isabl_api/isabl_api/models/disease.py:model:Disease": {"title": "Disease model for tracking disease metadata", "summary": "A lightweight model for tracking diseases that stores a disease name and an acronym. It inherits BaseSlugModel, enforces uniqueness between name and acronym, and adds an index on the slug for quick lookups.", "tags": ["disease", "metadata", "slug", "controlled-terms"], "content": "# Model: Disease\n\nInherits from: BaseSlugModel\n\nSimple model to track diseases.\n\n## Fields\n\n- `name`: models.CharField(max_length=1000, help_text='Disease name without acronym.', null=True)\n- `acronym`: models.CharField(blank=False, help_text='Abbreviation formed from the initial letters (e.g. MDS ).', max_length=20, null=False, verbose_n...)\n\n## Meta\n\nunique_together = ('name', 'acronym')\nindexes = [models.Index(fields=['slug'])]", "source_url": "https://github.com/papaemmelab/isabl_api/blob/master/isabl_api/models/disease.py"}, "isabl_api/isabl_api/models/experiment.py:model:Experiment": {"title": "Experiment model managing experimental data objects", "summary": "Model for representing experimental data, linking Sample/Aliquot, Technique, Platform, Center and Projects. It includes JSON fields for raw_data, results and bam_files, enforces uniqueness over sample/aliquot/technique/identifier, and provides helper methods for obtaining the related individual, optimizing querysets, analytics retrieval, and caching analytics metadata.", "tags": ["experiment", "raw_data", "results", "query-optimization"], "content": "# Model: Experiment\n\nInherits from: BaseBioModel\n\nModel to manage experimental data objects.\n\n## Fields\n\n- `aliquot`: models.ForeignKey(to='isabl_api.Aliquot', on_delete=models.PROTECT, verbose_name='Sample aliquot', blank=True, null=True)\n- `sample`: models.ForeignKey(to='isabl_api.Sample', on_delete=models.PROTECT, verbose_name='Sample', blank=False, null=True)\n- `technique`: models.ForeignKey(null=True, blank=False, on_delete=models.PROTECT, to='isabl_api.Technique', help_text='Sequencing technique (e.g. DNA|WG...)\n- `projects`: models.ManyToManyField(to=Project, blank=True, db_index=True, help_text='Sequencing Projects where this data will be studied.', verbose_name='S...)\n- `center`: models.ForeignKey(null=True, blank=False, on_delete=models.PROTECT, to='isabl_api.Center', help_text='Center where the data was generated ...)\n- `platform`: models.ForeignKey(null=True, blank=False, on_delete=models.PROTECT, to='isabl_api.Platform', verbose_name='Generating Platform', help_text...)\n- `raw_data`: JSONField(blank=True, null=True, default=None, verbose_name='List of raw data, each element is a dictionary.')\n- `results`: JSONField(blank=True, null=True, default=list, verbose_name='List of results for this experiment.')\n- `bam_files`: JSONField(blank=True, null=True, default=dict, verbose_name='Dictionary of default bams as a function of the Assembly')\n\n## Meta\n\nunique_together = ('sample', 'aliquot', 'technique', 'identifier')\nindex_together = ('sample', 'aliquot', 'technique', 'identifier')\n\n## Methods\n\n### individual\n\n```python\ndef individual(self)\n```\n\nIndividual object.\n### get_optimized_queryset\n\n```python\ndef get_optimized_queryset(cls, queryset=None, include=None, exclude=None)\n```\n\nOptimize queries using select and prefetch related fields.\n### analytics\n\n```python\ndef analytics(self)\n```\n\nAnalytics object.\n### cache_analytics\n\n```python\ndef cache_analytics(self)\n```\n\nCache metadata from samples and individuals to speed up searches.", "source_url": "https://github.com/papaemmelab/isabl_api/blob/master/isabl_api/models/experiment.py"}, "isabl_api/isabl_api/models/group.py:model:Group": {"title": "Group model tracking organizational groups or teams", "summary": "A minimal model to represent groups/teams with name and acronym fields that inherits BaseSlugModel. The model enforces uniqueness of the name/acronym pair and indexes the slug for efficient lookups.", "tags": ["group", "teams", "metadata", "slug"], "content": "# Model: Group\n\nInherits from: BaseSlugModel\n\nSimple model to track groups.\n\n## Fields\n\n- `name`: models.CharField(max_length=100, help_text='Group name without acronym.', null=True)\n- `acronym`: models.CharField(blank=False, help_text='Abbreviation formed from the initial letters (e.g. PEDS).', max_length=20, null=False, verbose_n...)\n\n## Meta\n\nunique_together = ('name', 'acronym')\nindexes = [models.Index(fields=['slug'])]", "source_url": "https://github.com/papaemmelab/isabl_api/blob/master/isabl_api/models/group.py"}, "isabl_api/isabl_api/models/individual.py:model:Individual": {"title": "Individual model representing organisms or patients", "summary": "Top-level biological entity model used to represent organisms (patients, mice, etc.) that includes fields like center, species, gender, and birth_year. It inherits BaseBioModel, enforces uniqueness on species/center/identifier, indexes those fields, and documents PHI handling and an example to change primary key sequence start.", "tags": ["individual", "patient", "species", "identifiers"], "content": "# Model: Individual\n\nInherits from: BaseBioModel\n\nModel used to manage individual organisms.\n\nTop model in the data generation process. This class usually\nrefers to patients, mice and other kind of organisms listed in SPECIES.\n\nTo start the primary key at a given value run:\n\n    python manage.py dbshell\n    alter sequence individuals_individual_id_seq restart with 100000;\n\n## Fields\n\n- `center`: models.ForeignKey(null=True, on_delete=models.PROTECT, to='isabl_api.Center', verbose_name='Center', help_text='Institution where the indi...)\n- `species`: models.CharField(max_length=100, verbose_name='Species', null=False, blank=False)\n- `gender`: models.CharField(max_length=100, null=True, verbose_name='Gender', default='UNKNOWN')\n- `birth_year`: models.PositiveSmallIntegerField(blank=True, default=None, help_text='Date of birth is not stored given that is PHI.', null=True, validators=[MaxValueVal...)\n\n## Meta\n\nunique_together = ('species', 'center', 'identifier')\nindexes = [models.Index(fields=['species', 'center', 'identifier'])]", "source_url": "https://github.com/papaemmelab/isabl_api/blob/master/isabl_api/models/individual.py"}, "isabl_api/isabl_api/models/platform.py:model:Platform": {"title": "Platform model for experimental sequencing platforms", "summary": "Model for describing experimental platforms via manufacturer, system and version fields. It inherits BaseSlugModel and enforces uniqueness across the manufacturer/system/version triplet while indexing those fields for efficient lookups.", "tags": ["platform", "sequencing", "manufacturer", "metadata"], "content": "# Model: Platform\n\nInherits from: BaseSlugModel\n\nSimple model to track experimental platforms.\n\n## Fields\n\n- `manufacturer`: models.CharField(blank=False, verbose_name='Platform Manufacturer', help_text='Platform manufacturer (e.g. ILLUMINA).', max_length=100)\n- `system`: models.CharField(blank=False, verbose_name='Platform System', help_text='Platform system (e.g. HISEQ).', max_length=100)\n- `version`: models.CharField(blank=False, verbose_name='Platform Version', help_text='Platform version (e.g. 2500)', max_length=100)\n\n## Meta\n\nunique_together = ('manufacturer', 'system', 'version')\nindex_together = ('manufacturer', 'system', 'version')", "source_url": "https://github.com/papaemmelab/isabl_api/blob/master/isabl_api/models/platform.py"}, "isabl_api/isabl_api/models/preferences.py:model:Preferences": {"title": "User preferences model for Isabl API", "summary": "Defines a simple TimeStampedModel used to store per-user preferences. Key fields include a OneToOne created_by reference to the user and an unstructured JSONField called preferences. The model exposes helper methods for checking superuser status and retrieving permissions and groups.", "tags": ["preferences", "django-model", "user-settings", "jsonfield"], "content": "# Model: Preferences\n\nInherits from: TimeStampedModel\n\nA simple class to track user preferences.\n\n## Fields\n\n- `created_by`: models.OneToOneField(to=settings.AUTH_USER_MODEL, to_field='username', on_delete=models.SET_NULL, verbose_name='Created By', help_text='User ...)\n- `preferences`: JSONField(blank=True, default=dict, verbose_name='Unstructured Preferences Field', help_text='JSON field used to store unstructure...)\n\n## Meta\n\nverbose_name_plural = 'preferences'\n\n## Methods\n\n### is_superuser\n\n```python\ndef is_superuser(self)\n```\n### permissions\n\n```python\ndef permissions(self)\n```\n### groups\n\n```python\ndef groups(self)\n```", "source_url": "https://github.com/papaemmelab/isabl_api/blob/master/isabl_api/models/preferences.py"}, "isabl_api/isabl_api/models/project.py:model:Project": {"title": "Project model for managing studies", "summary": "Describes the Project model used to manage study metadata and access in Isabl. It includes descriptive fields (title, description), contact emails (principal_investigator, owner, analyst, coordinator), organizational links (group), and a JSONField to manage sharing settings. The model also defines a custom permission allowing users to see all projects.", "tags": ["projects", "django-model", "permissions", "sharing"], "content": "# Model: Project\n\nInherits from: BaseModel\n\nModel used to manage Projects.\n\n## Fields\n\n- `description`: models.CharField(verbose_name='Project Description', max_length=1000, null=True)\n- `principal_investigator`: models.EmailField(verbose_name='Principal Investigator Email', help_text='Laboratory head or principal investigator.', validators=[EmailVa...)\n- `owner`: models.EmailField(verbose_name='Project Owner Email', help_text='Person who deals with the nitty-gritty of the project.', validators=[Emai...)\n- `analyst`: models.EmailField(verbose_name='Data Analyst Email', help_text='Person responsible for the data analysis.', validators=[EmailValidator()],...)\n- `coordinator`: models.EmailField(verbose_name='Project Coordinator Email', help_text='Project manager or coordinator', validators=[EmailValidator()], nul...)\n- `title`: models.CharField(verbose_name='Project Title', max_length=100, db_index=True, null=True)\n- `short_title`: models.CharField(verbose_name='Project Short Title', max_length=30, validators=[validate_unicode_slug, MinLengthValidator(10)], db_index=...)\n- `group`: models.ForeignKey(null=True, blank=True, default=None, on_delete=models.PROTECT, to='isabl_api.Group', verbose_name='Group', help_text='In...)\n- `sharing`: JSONField(blank=True, null=True, default=default_sharing, verbose_name='Field used to manage sharing permissions.')\n\n## Meta\n\npermissions = [('can_see_all_projects', 'Can see all projects')]", "source_url": "https://github.com/papaemmelab/isabl_api/blob/master/isabl_api/models/project.py"}, "isabl_api/isabl_api/models/sample.py:model:Sample": {"title": "Sample model for biological sample management", "summary": "Defines the Sample model (inherits BaseBioModel) used to record biospecimen information. Important fields include a foreign key to Individual, optional disease link, a required category, and collection_days with validation. The model enforces uniqueness and indexing across (individual, category, identifier) to avoid duplicate sample records.", "tags": ["samples", "biospecimen", "constraints", "django-model"], "content": "# Model: Sample\n\nInherits from: BaseBioModel\n\nModel used to manage samples.\n\n## Fields\n\n- `individual`: models.ForeignKey(on_delete=models.PROTECT, to=Individual, verbose_name='Individual')\n- `disease`: models.ForeignKey(null=True, on_delete=models.PROTECT, to='isabl_api.Disease', verbose_name='Disease')\n- `category`: models.CharField(name='category', db_index=True, max_length=100, null=False, blank=False, verbose_name='Category', help_text='This field ...)\n- `collection_days`: models.PositiveIntegerField(blank=True, default=None, null=True, validators=[MaxValueValidator(70000)], verbose_name='Days of Collection', help_text...)\n\n## Meta\n\nunique_together = ('individual', 'category', 'identifier')\nindex_together = ('individual', 'category', 'identifier')", "source_url": "https://github.com/papaemmelab/isabl_api/blob/master/isabl_api/models/sample.py"}, "isabl_api/isabl_api/models/signal.py:model:Signal": {"title": "Automation signal tracking model and fields", "summary": "A compact BaseSlugModel used to track automation signals in Isabl. It records an import_string, the target_endpoint (schema/type), and target_id (instance identifier), and enforces uniqueness across these three fields. The model includes an index on slug and exposes a failure_traceback method to inspect signal errors.", "tags": ["automation", "signals", "tracking", "django-model"], "content": "# Model: Signal\n\nInherits from: BaseSlugModel\n\nSimple model to track automation signals.\n\n## Fields\n\n- `import_string`: models.CharField(editable=True, max_length=1000, null=True, help_text='Signal import string.', verbose_name='Import String')\n- `target_endpoint`: models.CharField(blank=False, help_text='Database schema the signal is related to.', max_length=100, null=False, verbose_name='Related En...)\n- `target_id`: models.PositiveIntegerField(blank=False, null=False, help_text='Related instance identifier.', verbose_name='Target Instance Identifier')\n\n## Meta\n\nunique_together = ('import_string', 'target_endpoint', 'target_id')\nindexes = [models.Index(fields=['slug'])]\n\n## Methods\n\n### failure_traceback\n\n```python\ndef failure_traceback(self)\n```", "source_url": "https://github.com/papaemmelab/isabl_api/blob/master/isabl_api/models/signal.py"}, "isabl_api/isabl_api/models/submission.py:model:Submission": {"title": "Bulk submission model for Excel-based imports", "summary": "Model designed to support bulk creation of instances from an uploaded Excel submission form. It tracks a short description, processed timestamp, associated projects (ManyToMany), result file path, and the uploaded submission_form which is validated. The model is intended to record both the input form and the outcomes of processing.", "tags": ["submissions", "bulk-import", "filefields", "validators"], "content": "# Model: Submission\n\nInherits from: BaseModel\n\nModel used to bulk create instances with an Excel form.\n\n## Fields\n\n- `description`: models.CharField(help_text='A description of samples created for future reference.', max_length=140, null=True, verbose_name='Description...)\n- `processed`: models.DateTimeField(blank=True, null=True, help_text='Date when submission was processed.', verbose_name='Processed Date')\n- `projects`: models.ManyToManyField(blank=False, to=Project, help_text='Created Sequencing Experiments will be added to projects.', verbose_name='Projects L...)\n- `result`: models.FileField(blank=True, null=True, upload_to='submissions/results/%Y/%m', verbose_name='Submission Result File')\n- `submission_form`: models.FileField(blank=True, null=True, upload_to='submissions/forms/%Y/%m', validators=[submission_validator], verbose_name='Submission ...)", "source_url": "https://github.com/papaemmelab/isabl_api/blob/master/isabl_api/models/submission.py"}, "isabl_api/isabl_api/models/technique.py:model:Technique": {"title": "Sequencing Technique model with reference data", "summary": "Represents sequencing or experimental techniques as a BaseSlugModel with method, name, and category fields. It also contains a reference_data JSONField for attaching reference assets or metadata. The model enforces uniqueness on (method, name) and indexes the pair for efficient lookup.", "tags": ["technique", "sequencing", "reference-assets", "django-model"], "content": "# Model: Technique\n\nInherits from: BaseSlugModel\n\nSequencing technique model.\n\n## Fields\n\n- `method`: models.CharField(max_length=100, null=False, blank=False, help_text='Experimental technique method', verbose_name='Experimental Technique...)\n- `name`: CharNullField(blank=True, max_length=100, null=True, help_text='Experimental technique name', verbose_name='Experimental Technique Nam...)\n- `category`: models.CharField(max_length=100, null=False, blank=False, help_text='Experimental technique category (e.g. DNA)', verbose_name='Analyte')\n- `reference_data`: JSONField(blank=True, default=dict, help_text='Dictionary of reference assets.', verbose_name='Reference Data')\n\n## Meta\n\nunique_together = ('method', 'name')\nindex_together = ('method', 'name')", "source_url": "https://github.com/papaemmelab/isabl_api/blob/master/isabl_api/models/technique.py"}, "isabl_api/isabl_api/serializers.py:serializer:ProjectSharingSerializer": {"title": "Serializer for project sharing permissions and flags", "summary": "A DRF serializer that models project sharing settings. It exposes can_read and can_share as lists of email addresses and an is_public boolean indicating whether the project and its results are publicly accessible. The serializer enforces email field types for entries in the user lists.", "tags": ["serializers", "project-sharing", "permissions", "api"], "content": "# Serializer: ProjectSharingSerializer\n\nInherits from: serializers.Serializer\n\n## Declared Fields\n\n- `can_read`: serializers.ListField(help_text='Emails of users who can access the project.', default=list, child=serializers.EmailField())\n- `can_share`: serializers.ListField(help_text='Emails of users who can share the project.', default=list, child=serializers.EmailField())\n- `is_public`: serializers.BooleanField(help_text='Whether this project and its results can be accessed by anyone.', default=False)", "source_url": "https://github.com/papaemmelab/isabl_api/blob/master/isabl_api/serializers.py"}, "isabl_api/isabl_api/serializers.py:serializer:ProcessSubmissionSerializer": {"title": "Serializer to control submission processing commit", "summary": "A minimal serializer that controls whether processing of a submission should commit the produced actions. It exposes a single boolean field commit with a default of False. This is intended to allow dry-run versus commit control when processing uploaded submission forms.", "tags": ["serializers", "submissions", "commit", "api"], "content": "# Serializer: ProcessSubmissionSerializer\n\nInherits from: serializers.Serializer\n\n## Declared Fields\n\n- `commit`: serializers.BooleanField(help_text='Whether to commit actions produced by `submission_form`.', default=False)", "source_url": "https://github.com/papaemmelab/isabl_api/blob/master/isabl_api/serializers.py"}, "isabl_api/isabl_api/serializers.py:serializer:AnalysesBulkUpdateSerializer": {"title": "Bulk update serializer for analysis status and runner", "summary": "Serializer used to update multiple analysis records in bulk. It requires a status choice (STAGED or SUBMITTED), a list of analysis ids, and the ran_by field to capture the Linux user who executed the analyses. This standardizes the payload for bulk state transitions and audit information.", "tags": ["analyses", "bulk-update", "serializers", "workflow"], "content": "# Serializer: AnalysesBulkUpdateSerializer\n\nInherits from: serializers.Serializer\n\n## Declared Fields\n\n- `status`: serializers.ChoiceField(choices=['STAGED', 'SUBMITTED'], required=True)\n- `ids`: serializers.ListField(help_text='A list of analyses keys.', required=True)\n- `ran_by`: serializers.CharField(help_text='Linux user who ran the analysis.', required=True)", "source_url": "https://github.com/papaemmelab/isabl_api/blob/master/isabl_api/serializers.py"}, "isabl_api/isabl_api/serializers.py:serializer:ValidatorSerializer": {"title": "Serializer to register and configure Django validators", "summary": "Serializer that accepts a validator class (restricted to django.core.validators via a custom validator) and a dictionary of keyword arguments to configure it. Its Meta declares a validators list that references a builder function for the validator. This enables API-driven registration or configuration of Django validators.", "tags": ["validators", "serializers", "django", "validation"], "content": "# Serializer: ValidatorSerializer\n\nInherits from: serializers.Serializer\n\n## Meta\n\n```python\nvalidators = [validators._build_validator]\n```\n\n## Declared Fields\n\n- `validator_class`: serializers.CharField(validators=[validators.validate_valid_validator], help_text='Only from `django.core.validators`.')\n- `validator_kwargs`: serializers.DictField(help_text='Validator key word arguments.', allow_null=True, default=dict)", "source_url": "https://github.com/papaemmelab/isabl_api/blob/master/isabl_api/serializers.py"}, "isabl_api/isabl_api/serializers.py:serializer:CustomFieldConfigurationSerializer": {"title": "Serializer for configuring custom model fields", "summary": "Defines the schema and validation for custom field configurations exposed via the API. Covers options like whether the field is used in submissions, the DRF field class to use, keyword arguments passed to the field, and custom validators applied to the field configuration.", "tags": ["serializers", "custom_fields", "validation", "API"], "content": "# Serializer: CustomFieldConfigurationSerializer\n\nInherits from: serializers.Serializer\n\n## Meta\n\n```python\nvalidators = [validators._build_field]\n```\n\n## Declared Fields\n\n- `exclude_from_submissions`: serializers.NullBooleanField(default=False, help_text='Only applies to Individual, Sample, and Experiment custom fields.Please note that you must spec...\n- `field_class`: serializers.CharField(default='CharField', validators=[validators.validate_is_field_class], help_text='Only from `rest_framework.serializers`.')\n- `field_kwargs`: serializers.DictField(help_text='Field key word arguments.', allow_null=True, default=dict)\n- `validators`: ValidatorSerializer(help_text='List of validators that should be used for field.', allow_null=True, default=list, many=True)", "source_url": "https://github.com/papaemmelab/isabl_api/blob/master/isabl_api/serializers.py"}, "isabl_api/isabl_api/serializers.py:serializer:RawDataSerializer": {"title": "Serializer for raw input file metadata", "summary": "Represents raw data files in API requests and responses, including the file URL, declared file type, auxiliary file metadata (e.g., PU, LB, PL for FASTQ), and optional checksum information. It standardizes how raw inputs are described so downstream processing can locate and verify files.", "tags": ["raw_data", "file_metadata", "checksums", "serializers"], "content": "# Serializer: RawDataSerializer\n\nInherits from: serializers.Serializer\n\n## Declared Fields\n\n- `file_url`: serializers.CharField(help_text='File URL.')\n- `file_type`: serializers.ChoiceField(choices=lazy_choices('raw_data_formats'), help_text='File data type.')\n- `file_data`: serializers.DictField(help_text='Extra data such as `PU`, `LB`, or `PL` in fastq case.', allow_null=True, default=dict)\n- `hash_value`: serializers.CharField(allow_null=True, default=None, help_text='Hash key that identifies the file.')\n- `hash_method`: serializers.CharField(allow_null=True, default=None, help_text='Method used to produce the `hash_value`, e.g. MD5.')", "source_url": "https://github.com/papaemmelab/isabl_api/blob/master/isabl_api/serializers.py"}, "isabl_api/isabl_api/serializers.py:serializer:ReferenceDataSerializer": {"title": "Serializer for reference data entries and URLs", "summary": "Provides a minimal serializer for reference data objects: a URL and an optional description. It standardizes how reference resources (e.g., genome FASTA, annotation files) are supplied in API payloads.", "tags": ["reference_data", "metadata", "serializers"], "content": "# Serializer: ReferenceDataSerializer\n\nInherits from: serializers.Serializer\n\n## Declared Fields\n\n- `url`: serializers.CharField(help_text='Reference data URL.')\n- `description`: serializers.CharField(help_text='Reference data description.', allow_null=True, default=None, allow_blank=True)", "source_url": "https://github.com/papaemmelab/isabl_api/blob/master/isabl_api/serializers.py"}, "isabl_api/isabl_api/serializers.py:serializer:BamsSerializer": {"title": "Serializer linking BAM files to analyses", "summary": "Describes BAM file resources via a URL and the primary key of the analysis that produced them. This serializer ties file locations to provenance by referencing the generating analysis record.", "tags": ["bams", "provenance", "file_links", "serializers"], "content": "# Serializer: BamsSerializer\n\nInherits from: serializers.Serializer\n\n## Declared Fields\n\n- `url`: serializers.CharField(help_text='Bamfile URL.')\n- `analysis`: serializers.IntegerField(help_text='Primary key of the analysis that generated the bamfile.')", "source_url": "https://github.com/papaemmelab/isabl_api/blob/master/isabl_api/serializers.py"}, "isabl_api/isabl_api/serializers.py:serializer:ResultSerializer": {"title": "Serializer for analysis result metadata and UI hints", "summary": "Encodes result metadata consumed by both backend and frontend, including presentation type, verbose name, description, external links, optional flags, display logo/hiding options, ordering, and arbitrary JSON data. It is used to declare renderable results and control frontend rendering behavior.", "tags": ["results", "frontend_integration", "metadata", "serializers"], "content": "# Serializer: ResultSerializer\n\nInherits from: serializers.Serializer\n\n## Declared Fields\n\n- `frontend_type`: serializers.CharField(help_text='See renderable results in the front end documentation.', allow_null=True, default=None)\n- `verbose_name`: serializers.CharField(help_text='Result verbose name.', allow_null=True, default=None)\n- `description`: serializers.CharField(help_text='Result description.', allow_null=True, default=None)\n- `external_link`: serializers.URLField(help_text='An external link related to the result', allow_null=True, default=None)\n- `optional`: serializers.NullBooleanField(help_text='Is result optional.')\n- `logo`: serializers.CharField(help_text='Logo to display in frontend chip.', allow_null=True, default=None)\n- `hide_chip`: serializers.NullBooleanField(help_text='Hide Chip Result in Frontend.')\n- `order`: serializers.IntegerField(required=False, help_text='To customize order shown in Frontend.')\n- `data`: serializers.JSONField(binary=False, required=False)", "source_url": "https://github.com/papaemmelab/isabl_api/blob/master/isabl_api/serializers.py"}, "isabl_api/isabl_api/serializers.py:serializer:ModelSerializer": {"title": "Base model serializer with Isabl query fields", "summary": "A base serializer combining IsablQueryFieldsMixin with DRF's ModelSerializer to provide common query-related fields and behavior. Declares a pk field (optional) and is used as a foundation for model-specific serializers in the codebase.", "tags": ["base_serializer", "models", "IsablQueryFieldsMixin", "pk_handling"], "content": "# Serializer: ModelSerializer\n\nInherits from: IsablQueryFieldsMixin, serializers.ModelSerializer\n\nBottom up serializers.\n\n## Declared Fields\n\n- `pk`: serializers.IntegerField(required=False)", "source_url": "https://github.com/papaemmelab/isabl_api/blob/master/isabl_api/serializers.py"}, "isabl_api/isabl_api/serializers.py:serializer:TagSerializer": {"title": "Serializer for Tag objects and name management", "summary": "Implements a Tag serializer based on the base ModelSerializer, exposing the tag name and primary key. The Meta disables default validators on some fields to allow name updates and custom validation behavior.", "tags": ["tags", "metadata", "serializers", "validation"], "content": "# Serializer: TagSerializer\n\nInherits from: ModelSerializer\n\n## Meta\n\n```python\nmodel = Tag\nfields = ['name', 'pk']\nextra_kwargs = {'name': {'read_only': False, 'validators': []}, 'pk': {'validators': []}}\n```", "source_url": "https://github.com/papaemmelab/isabl_api/blob/master/isabl_api/serializers.py"}, "isabl_api/isabl_api/serializers.py:serializer:UserSerializer": {"title": "Serializer exposing core user profile fields", "summary": "Provides a concise user serializer exposing first and last name, username, email, and primary key. It is intended for user listings and simple profile interactions within Isabl's API.", "tags": ["users", "profiles", "serializers", "authentication"], "content": "# Serializer: UserSerializer\n\nInherits from: ModelSerializer\n\n## Meta\n\n```python\nmodel = User\nfields = ['first_name', 'last_name', 'username', 'email', 'pk']\n```", "source_url": "https://github.com/papaemmelab/isabl_api/blob/master/isabl_api/serializers.py"}, "isabl_api/isabl_api/serializers.py:serializer:PreferencesSerializer": {"title": "Serializer for user preferences and permissions", "summary": "Represents a user's preferences object along with group membership, permission lists, and a boolean is_superuser flag. Preferences are handled as JSON, while permissions and groups are lists \u2014 this serializer is used to read and update user-specific settings and access data.", "tags": ["preferences", "permissions", "groups", "serializers"], "content": "# Serializer: PreferencesSerializer\n\nInherits from: ModelSerializer\n\n## Meta\n\n```python\nmodel = models.Preferences\nfields = ['preferences', 'permissions', 'groups', 'is_superuser']\n```\n\n## Declared Fields\n\n- `is_superuser`: serializers.BooleanField()\n- `permissions`: serializers.ListField()\n- `groups`: serializers.ListField()\n- `preferences`: serializers.JSONField(binary=False, required=False, read_only=False, default=dict)", "source_url": "https://github.com/papaemmelab/isabl_api/blob/master/isabl_api/serializers.py"}, "isabl_api/isabl_api/serializers.py:serializer:CustomUserDetailsSerializer": {"title": "Extended user details serializer including preferences", "summary": "Extends the base UserDetailsSerializer to include the user's preferences and basic profile fields. The serializer marks email as read-only and embeds PreferencesSerializer for the preferences attribute to present consolidated user information.", "tags": ["user_details", "preferences", "authentication", "serializers"], "content": "# Serializer: CustomUserDetailsSerializer\n\nInherits from: UserDetailsSerializer\n\n## Meta\n\n```python\nmodel = User\nfields = ('pk', 'username', 'email', 'first_name', 'last_name', 'preferences')\nread_only_fields = ('email',)\n```\n\n## Declared Fields\n\n- `preferences`: PreferencesSerializer(read_only=True)", "source_url": "https://github.com/papaemmelab/isabl_api/blob/master/isabl_api/serializers.py"}, "isabl_api/isabl_api/serializers.py:serializer:CustomRegisterSerializer": {"title": "CustomRegisterSerializer adding first and last names", "summary": "Defines a registration serializer that extends RegisterSerializer by adding first_name and last_name fields. Both fields are CharFields with max_length 100 and no extra validators declared. This serializer is intended to capture basic user identity during registration flows.", "tags": ["authentication", "registration", "serializers"], "content": "# Serializer: CustomRegisterSerializer\n\nInherits from: RegisterSerializer\n\n## Declared Fields\n\n- `first_name`: serializers.CharField(validators=[], max_length=100)\n- `last_name`: serializers.CharField(validators=[], max_length=100)", "source_url": "https://github.com/papaemmelab/isabl_api/blob/master/isabl_api/serializers.py"}, "isabl_api/isabl_api/serializers.py:serializer:PasswordResetSerializer": {"title": "Password reset serializer with email field", "summary": "A simple serializer for initiating password resets. It declares an email EmailField and references a password_reset_form_class (PasswordResetForm) used to handle validation/processing. The serializer inherits directly from serializers.Serializer rather than a model serializer.", "tags": ["authentication", "password-reset", "forms"], "content": "# Serializer: PasswordResetSerializer\n\nInherits from: serializers.Serializer\n\n## Declared Fields\n\n- `email`: serializers.EmailField()\n- `password_reset_form_class`: PasswordResetForm", "source_url": "https://github.com/papaemmelab/isabl_api/blob/master/isabl_api/serializers.py"}, "isabl_api/isabl_api/serializers.py:serializer:IsablSerializer": {"title": "Base Isabl model serializer with common fields", "summary": "Base ModelSerializer used across Isabl API resources that standardizes common fields and behavior. Declared fields include tags (TagSerializer, allow_null), data (JSONField), custom_fields (CustomFieldsField), and created_by (SlugRelatedField defaulting to current user). The Meta model is left as None and concrete serializers set their model and fields.", "tags": ["base-serializer", "custom-fields", "tags"], "content": "# Serializer: IsablSerializer\n\nInherits from: ModelSerializer\n\n## Meta\n\n```python\nmodel = None\n```\n\n## Declared Fields\n\n- `tags`: TagSerializer(many=True, validators=[], allow_null=True, default=None)\n- `data`: serializers.JSONField(binary=False, required=False, read_only=False)\n- `custom_fields`: CustomFieldsField(required=False, default=dict, allow_null=True)\n- `created_by`: serializers.SlugRelatedField(allow_null=True, slug_field='username', default=serializers.CurrentUserDefault(), queryset=User.objects.all())", "source_url": "https://github.com/papaemmelab/isabl_api/blob/master/isabl_api/serializers.py"}, "isabl_api/isabl_api/serializers.py:serializer:ClientSerializer": {"title": "Client serializer including slug and settings", "summary": "Serializer for Client model that inherits from IsablSerializer and pulls its fields from models.Client.get_serializer_fields(). It explicitly declares a slug SlugField (unique identifier help_text) and a settings JSONField with a default empty dict. The Meta sets model to models.Client and uses model-driven field definitions.", "tags": ["client", "configuration", "serializers"], "content": "# Serializer: ClientSerializer\n\nInherits from: IsablSerializer\n\n## Meta\n\n```python\nmodel = models.Client\nfields = models.Client.get_serializer_fields()\n```\n\n## Declared Fields\n\n- `slug`: serializers.SlugField(validators=[], help_text='Uniquely identify this client instance.')\n- `settings`: serializers.JSONField(binary=False, required=False, read_only=False, default=dict)", "source_url": "https://github.com/papaemmelab/isabl_api/blob/master/isabl_api/serializers.py"}, "isabl_api/isabl_api/serializers.py:serializer:CustomFieldSerializer": {"title": "Custom field serializer with configuration nested", "summary": "Serializer for CustomField model extending IsablSerializer and exposing model-defined fields plus a non-model nested configuration serializer. The Meta declares read_only_fields and fields via model helper methods and lists 'configuration' as a non-model serializer. The declared configuration field uses CustomFieldConfigurationSerializer.", "tags": ["custom-fields", "configuration", "nested-serializers"], "content": "# Serializer: CustomFieldSerializer\n\nInherits from: IsablSerializer\n\n## Meta\n\n```python\nmodel = models.CustomField\nread_only_fields = models.CustomField.get_readonly_fields()\nfields = models.CustomField.get_serializer_fields()\nnon_model_serializers = ['configuration']\n```\n\n## Declared Fields\n\n- `configuration`: CustomFieldConfigurationSerializer()", "source_url": "https://github.com/papaemmelab/isabl_api/blob/master/isabl_api/serializers.py"}, "isabl_api/isabl_api/serializers.py:serializer:AssemblySerializer": {"title": "Assembly serializer with species and reference data", "summary": "Serializer for Assembly model that includes assembly-specific fields and a non-model reference_data field. Meta pulls read-only fields and serializer fields from the model and declares 'reference_data' as a non-model serializer. Declared fields include name, species (ChoiceField using lazy_choices('species')), and reference_data as a DictField of reference assets.", "tags": ["assemblies", "reference-data", "species"], "content": "# Serializer: AssemblySerializer\n\nInherits from: IsablSerializer\n\n## Meta\n\n```python\nmodel = models.Assembly\nread_only_fields = models.Assembly.get_readonly_fields()\nfields = models.Assembly.get_serializer_fields()\nnon_model_serializers = ['reference_data']\n```\n\n## Declared Fields\n\n- `name`: serializers.CharField(validators=[], max_length=100)\n- `reference_data`: serializers.DictField(default=dict, allow_null=True, help_text='Assembly reference assets, each element is a dictionary.', child=ReferenceDataSerializ...\n- `species`: serializers.ChoiceField(choices=lazy_choices('species'), help_text='Assembly species.')", "source_url": "https://github.com/papaemmelab/isabl_api/blob/master/isabl_api/serializers.py"}, "isabl_api/isabl_api/serializers.py:serializer:PlatformSerializer": {"title": "Platform serializer delegating to model fields", "summary": "Serializer for the Platform model that inherits common IsablSerializer behavior and obtains its read-only and serializable fields from models.Platform helper methods. No additional custom fields are declared in the serializer file itself. The Meta configuration centralizes field selection to the model.", "tags": ["platform", "model-driven", "serializers"], "content": "# Serializer: PlatformSerializer\n\nInherits from: IsablSerializer\n\n## Meta\n\n```python\nmodel = models.Platform\nread_only_fields = models.Platform.get_readonly_fields()\nfields = models.Platform.get_serializer_fields()\n```", "source_url": "https://github.com/papaemmelab/isabl_api/blob/master/isabl_api/serializers.py"}, "isabl_api/isabl_api/serializers.py:serializer:CenterSerializer": {"title": "Center serializer mapping model-defined fields", "summary": "CenterSerializer maps the Center model into API representations by inheriting IsablSerializer and using model-provided field lists. The serializer does not declare extra fields itself; Meta uses models.Center.get_serializer_fields() and get_readonly_fields() to conf
