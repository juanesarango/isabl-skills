): path to targets bedfile.\n    baits_path (str): path to baits bedfile.\n    assembly (str): name of reference genome for bedfile.\n    species (str): name of genome species.\n    description (str): a description of the BED files.\n\nReturns:\n    dict: updated technique instance as retrieved from API.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/data.py"}, "isabl_cli/isabl_cli/data.py:annotate_file_data": {"title": "Customize file metadata annotations during import", "summary": "annotate_file_data is an overrideable method intended to add or modify annotations on file metadata prior to import. Implementations can inject library (LB), platform (PL), or other sample/file-level attributes to be stored with raw data.", "tags": ["metadata", "annotation", "import", "customization"], "content": "# annotate_file_data\n\n```python\ndef annotate_file_data(self, experiment, file_data, file_type, src, dst)\n```\n\nOverwrite this method to provide custom file_data annotations.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/data.py"}, "isabl_cli/isabl_cli/data.py:check_ownership": {"title": "Verify matched file ownership before importing", "summary": "check_ownership validates that the files identified for import are owned by the current user. This pre-import check prevents importing files with incorrect ownership and enforces operational security or policy constraints.", "tags": ["ownership", "validation", "security", "import"], "content": "# check_ownership\n\n```python\ndef check_ownership(cache)\n```\n\nMake sure files matched are owned by current user.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/data.py"}, "isabl_cli/isabl_cli/data.py:check_are_readable": {"title": "Confirm matched files are readable and accessible", "summary": "check_are_readable ensures that every file selected for import can be accessed and read by the process. It performs I/O permission checks to catch unreadable files before attempting to move, copy, or link them into Isabl storage.", "tags": ["permissions", "readability", "validation", "import"], "content": "# check_are_readable\n\n```python\ndef check_are_readable(cache)\n```\n\nMake sure files matched can be accessed and read.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/data.py"}, "isabl_cli/isabl_cli/data.py:match_path": {"title": "Match filesystem paths to sample identifiers and types", "summary": "match_path compares a file system path against a matching pattern and updates an internal cache when the file appears to be a FASTQ or BAM. This routine is used to detect file types, pair reads, and associate files with experiment identifiers during import.", "tags": ["pattern-matching", "file-identification", "FASTQ", "BAM"], "content": "# match_path\n\n```python\ndef match_path(self, path, pattern)\n```\n\nMatch `path` with `pattern` and update cache if fastq or bam.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/data.py"}, "isabl_cli/isabl_cli/data.py:import_files": {"title": "Import files into instance storage and database", "summary": "Describes the import_files routine that moves, copies, or symlinks files into an experiment instance's storage_url and updates the database record. Covers arguments for instance metadata, file lists, file annotations, and behavior when copying versus moving, and notes an error condition when multiple data formats are detected.", "tags": ["data-import", "file-management", "storage", "cli"], "content": "# import_files\n\n```python\ndef import_files(self, instance, files, files_data, symlink, copy)\n```\n\nMove/link files into instance's `storage_url` and update database.\n\nArguments:\n    instance (dict): experiment instance.\n    files (dict): list of files to be imported.\n    copy (bool): if True files are copied intead of moved.\n    symlink (dict): whether to symlink or move the data.\n    files_data (dict): keys are files basenames and values are\n        dicts with extra annotations such as PL, LB, or any other.\n\nRaises:\n    click.UsageError: if multiple data formats are found.\n\nReturns:\n    dict: patched experiment instance.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/data.py"}, "isabl_cli/isabl_cli/data.py:get_regex_pattern": {"title": "Generate regex pattern for flexible identifier matching", "summary": "Explains get_regex_pattern which builds a regex string that matches an identifier as a named capture group while treating dashes, underscores, and dots equivalently. The function also supports case-insensitive matching via an optional flag and returns the pattern as a string.", "tags": ["regex", "parsing", "identifiers"], "content": "# get_regex_pattern\n\n```python\ndef get_regex_pattern(group_name, identifier, iexact=False)\n```\n\nGet regex pattern for `identifier` group as `group_name`.\n\nThis pattern treats dashes, underscores and dots equally.\n\nArguments:\n    group_name (str): regex pattern group name.\n    identifier (str): identifier to be matched by regex.\n    iexact (bool): use case insensitive match.\n\nReturns:\n    str: a regex pattern.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/data.py"}, "isabl_cli/isabl_cli/data.py:get_summary": {"title": "Produce summary of an import operation", "summary": "Returns a summary of a data import operation given the list of files, the experiment record, whether the run was committed, and which files were matched. This function formats the result of an import attempt to help users review what was imported and what remains.", "tags": ["import-summary", "reporting", "cli"], "content": "# get_summary\n\n```python\ndef get_summary(files, experiment, commit, matched)\n```\n\nReturn summary of the import operation.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/data.py"}, "isabl_cli/isabl_cli/data.py:import_data_from_yaml": {"title": "Import dataset definitions from a local YAML file", "summary": "Documents import_data_from_yaml which loads data definitions from a local YAML file and imports the files into Isabl. It supports options to symlink or copy, commit versus dry-run, attach per-file metadata (files_data), ignore ownership checks, and apply filters for selecting records to import.", "tags": ["yaml", "data-import", "automation", "cli"], "content": "# import_data_from_yaml\n\n```python\ndef import_data_from_yaml(self, symlink=False, copy=False, commit=False, files_data=None, ignore_ownership=False, **filters)\n```\n\nImport data from local YAML file.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/data.py"}, "isabl_cli/isabl_cli/data.py:cmd": {"title": "Register technique targets and baits BED files", "summary": "Explains a cmd that registers target and bait BED files into a technique's data directory. Incoming BEDs are compressed and tabixed (both gzipped and uncompressed kept), and the instance's storage_url, storage_usage, and reference_data fields are updated accordingly.", "tags": ["targets-baits", "bed-files", "tabix", "reference-data"], "content": "# cmd\n\n```python\ndef cmd(technique, assembly, targets_path, baits_path, description, species)\n```\n\nRegister targets and baits BED files in a technique's data directory.\n\nIncoming BED files will be compressed and tabixed. Both gzipped and\nuncompressed versions are kept. Instance's storage_url, storage_usage,\nand reference_data fields are updated.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/data.py"}, "isabl_cli/isabl_cli/exceptions.py:PackageBaseException": {"title": "Base exception class for isabl_cli package", "summary": "Defines the foundational exception type for the isabl_cli package that other custom exceptions inherit from. Serves as a single catch-all base to distinguish package-raised errors from other exceptions in client code.", "tags": ["exceptions", "error-handling", "isabl_cli"], "content": "# class PackageBaseException\n\nA base exception for isabl_cli.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/exceptions.py"}, "isabl_cli/isabl_cli/exceptions.py:ValidationError": {"title": "Validation error for input and configuration checks", "summary": "Represents errors raised when a validation step fails (e.g., incorrect inputs or parameter validation). Use this exception type to indicate user- or config-related validation problems that should be corrected before re-running operations.", "tags": ["validation", "exceptions", "input-checks"], "content": "# class ValidationError\n\nA class to raise when a validation error occurs.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/exceptions.py"}, "isabl_cli/isabl_cli/exceptions.py:MissingRequirementError": {"title": "Missing requirement error for unmet dependencies", "summary": "Indicates that a required dependency, tool, or resource is missing and prevents an operation from proceeding. This exception communicates unmet prerequisites so callers or users can install or enable the missing requirement.", "tags": ["dependencies", "exceptions", "requirements"], "content": "# class MissingRequirementError\n\nA class to raise when a requirement is missing.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/exceptions.py"}, "isabl_cli/isabl_cli/exceptions.py:MissingOutputError": {"title": "Error for expected but absent output files", "summary": "Raised when a process should have produced an output file but the file is missing. Use this error to flag pipeline or job failures where outputs are absent despite successful run steps.", "tags": ["outputs", "exceptions", "pipeline-failure"], "content": "# class MissingOutputError\n\nA class to raise when a file that should exist is missing.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/exceptions.py"}, "isabl_cli/isabl_cli/exceptions.py:ConfigurationError": {"title": "Configuration error for improper setup or values", "summary": "Used to indicate that the system is improperly configured or configuration values are invalid. This exception signals configuration issues that must be corrected before normal operation can continue.", "tags": ["configuration", "exceptions", "setup"], "content": "# class ConfigurationError\n\nA class to raise when is not properly configured.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/exceptions.py"}, "isabl_cli/isabl_cli/exceptions.py:ImplementationError": {"title": "Implementation error for unimplemented functionality", "summary": "Signals that a required behavior or function is not implemented or incorrectly implemented. This exception is intended for developer-facing errors where code paths are missing or incomplete.", "tags": ["implementation", "exceptions", "developer"], "content": "# class ImplementationError\n\nA class to raise when is not properly implemented.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/exceptions.py"}, "isabl_cli/isabl_cli/exceptions.py:CantBeRunError": {"title": "Runtime error when application cannot be executed", "summary": "Raised when an application or command cannot be run at all, typically due to fatal preconditions or environment issues. Use it to make clear that execution was impossible rather than merely failing during runtime.", "tags": ["runtime", "exceptions", "execution"], "content": "# class CantBeRunError\n\nA class to raise when a application just cannot be run.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/exceptions.py"}, "isabl_cli/isabl_cli/exceptions.py:MissingDataError": {"title": "Missing data error for absent required inputs", "summary": "Used when required input data is missing and prevents further processing. This exception highlights data availability issues that need resolution before pipelines or commands can continue.", "tags": ["data-availability", "exceptions", "inputs"], "content": "# class MissingDataError\n\nA class to raise when data is missing.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/exceptions.py"}, "isabl_cli/isabl_cli/exceptions.py:AutomationError": {"title": "AutomationError exception for failed automations", "summary": "Defines AutomationError, a specific exception raised when automated tasks or workflows fail. It is intended to signal automation-related failures so callers can catch and handle automation-specific errors separately from generic exceptions.", "tags": ["errors", "automation", "exceptions"], "content": "# class AutomationError\n\nA class to raise when automations fail.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/exceptions.py"}, "isabl_cli/isabl_cli/factories.py:projects": {"title": "Lazy projects() factory method for project lists", "summary": "A lazy accessor method that returns a list of projects when called. It is designed to defer loading until needed, reducing upfront computation or IO, and likely used by CLI commands or higher-level APIs to enumerate projects.", "tags": ["factories", "projects", "lazy-loading"], "content": "# projects\n\n```python\ndef projects(self)\n```\n\nLazy method to return list of projects.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/factories.py"}, "isabl_cli/isabl_cli/options.py:get_analyses_filters_option": {"title": "Build analyses filters option for CLI", "summary": "Helper to construct analysis filter options for the CLI, accepting optional application_classes and other default filter values. It centralizes default filter behavior so commands can present and apply consistent analysis selection criteria.", "tags": ["cli", "options", "analyses", "filters"], "content": "# get_analyses_filters_option\n\n```python\ndef get_analyses_filters_option(application_classes=None, **defaults)\n```\n\nGet analyses filters with `defaults`.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/options.py"}, "isabl_cli/isabl_cli/options.py:get_dependency_analyses_option": {"title": "Construct dependency analyses option for CLI", "summary": "Produces a dependency-analysis option given dependency specifications and extra filters. It supports resolving dependencies by application primary key or by name (optionally with version), enabling commands to gather analyses that satisfy dependency requirements.", "tags": ["cli", "dependencies", "analyses"], "content": "# get_dependency_analyses_option\n\n```python\ndef get_dependency_analyses_option(dependencies_results, **extra_filters)\n```\n\nGet dependencies from specified app pk or name [with version].", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/options.py"}, "isabl_cli/isabl_cli/settings.py:import_valid_applications": {"title": "Import and validate application strings from settings", "summary": "Loads and imports application classes listed in client settings, validating that configured application strings can be imported successfully. It ensures that configured applications are available at runtime and converts string references to actual imported types or raises meaningful errors.", "tags": ["settings", "import", "applications", "validation"], "content": "# import_valid_applications\n\n```python\ndef import_valid_applications(val, setting_name)\n```\n\nImport all valid applications strings specified on the client settings.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/settings.py"}, "isabl_cli/isabl_cli/settings.py:perform_import": {"title": "Perform_import utility to import configured objects", "summary": "Utility function that performs one or more imports based on the provided value and setting name. It wraps import logic and error handling so higher-level settings loaders can import modules, classes, or lists of import strings consistently.", "tags": ["import", "utilities", "settings"], "content": "# perform_import\n\n```python\ndef perform_import(val, setting_name)\n```\n\nPerform the necessary import or imports.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/settings.py"}, "isabl_cli/isabl_cli/settings.py:import_from_string": {"title": "Import a class or module from a string path", "summary": "Attempts to import a class or module given its dotted-string representation (e.g., 'module.ClassName'). It provides a reusable import helper that reports clear errors for mis-specified import strings and is used by other settings import utilities.", "tags": ["import", "reflection", "utilities"], "content": "# import_from_string\n\n```python\ndef import_from_string(val, setting_name=None)\n```\n\nAttempt to import a class from a string representation.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/settings.py"}, "isabl_cli/isabl_cli/settings.py:UserSettings": {"title": "UserSettings manager for per-user configuration files", "summary": "A class that manages user-specific configuration stored in a JSON file at settings_path. It exposes attribute-style access (__getattr__/__setattr__), read/write helpers (_read/_write), and a __repr__ to display current user configurations, encapsulating persistence details for CLI clients.", "tags": ["user-settings", "configuration", "persistence", "json"], "content": "# class UserSettings\n\nA class used to manage user specific configurations.\n\n## Methods\n\n### __repr__\n\n```python\ndef __repr__(self)\n```\n\nShow all configurations in `settings_path`.\n\n### __setattr__\n\n```python\ndef __setattr__(self, name, value)\n```\n\nWrite attribute to `settings_path`.\n\n### __getattr__\n\n```python\ndef __getattr__(self, name)\n```\n\nGet attribute from `settings_path`.\n\n### _read\n\n```python\ndef _read(self)\n```\n\nRead settings.json.\n\n### _write\n\n```python\ndef _write(self, name, value)\n```\n\nWrite key, value to settings.json.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/settings.py"}, "isabl_cli/isabl_cli/settings.py:BaseSettings": {"title": "BaseSettings wrapper supporting defaults and imports", "summary": "Wrapper class (inspired by drf-yasg) that initializes with defaults, optional import string lists, and path strings, and exposes combined settings via __getattr__. It returns a merged settings dictionary and falls back to defaults when an attribute is not present in user settings.", "tags": ["settings-management", "defaults", "configuration", "drf-yasg"], "content": "# class BaseSettings\n\nObtained from drf-yasg/rest_framework.\n\n## Methods\n\n### __init__\n\n```python\ndef __init__(self, defaults, import_strings=None, path_strings=None)\n```\n\nSee: https://github.com/axnsan12/drf-yasg/.\n\n### _settings\n\n```python\ndef _settings(self)\n```\n\nReturn dictionary system with settings.\n\n### __getattr__\n\n```python\ndef __getattr__(self, attr)\n```\n\nCheck if present in user settings or fall back to defaults.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/settings.py"}, "isabl_cli/isabl_cli/settings.py:get_application_settings": {"title": "Build application settings dictionary from defaults", "summary": "Combines provided defaults, current settings, reference data, and import_strings into a coherent application settings dot-dictionary. This helper centralizes how application-level settings are assembled so downstream code can consume a predictable configuration structure.", "tags": ["application-settings", "configuration", "merging", "import_strings"], "content": "# get_application_settings\n\n```python\ndef get_application_settings(defaults, settings, reference_data, import_strings)\n```\n\nBuild settings dot dict given defaults.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/settings.py"}, "isabl_cli/isabl_cli/settings.py:__repr__": {"title": "Settings object __repr__ shows stored configurations", "summary": "Implements the __repr__ method for the settings object to display all configurations found in the configured settings_path. Useful for quickly inspecting the effective settings from the CLI or during debugging.", "tags": ["settings", "repr", "debugging", "cli"], "content": "# __repr__\n\n```python\ndef __repr__(self)\n```\n\nShow all configurations in `settings_path`.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/settings.py"}, "isabl_cli/isabl_cli/settings.py:__setattr__": {"title": "Persisting settings attributes to settings_path file", "summary": "Overrides __setattr__ to persist attribute assignments into the configured settings_path. Assigning attributes on the settings object writes the key/value into the underlying settings store (settings.json).", "tags": ["settings", "persistence", "write", "cli"], "content": "# __setattr__\n\n```python\ndef __setattr__(self, name, value)\n```\n\nWrite attribute to `settings_path`.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/settings.py"}, "isabl_cli/isabl_cli/settings.py:__getattr__": {"title": "Attribute lookup with user override and defaults fallback", "summary": "A variant of __getattr__ that first checks for the attribute in user-provided settings, and if not found falls back to the default values. This implements the override semantics where users can override system defaults via persisted settings.", "tags": ["settings", "getattr", "defaults", "override"], "content": "# __getattr__\n\n```python\ndef __getattr__(self, attr)\n```\n\nCheck if present in user settings or fall back to defaults.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/settings.py"}, "isabl_cli/isabl_cli/settings.py:_read": {"title": "Read settings.json file into memory", "summary": "Defines a _read method that loads the settings.json file from the configured settings path. The method returns the parsed settings so the settings object can use current persisted values.", "tags": ["settings", "io", "json", "persistence"], "content": "# _read\n\n```python\ndef _read(self)\n```\n\nRead settings.json.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/settings.py"}, "isabl_cli/isabl_cli/settings.py:_write": {"title": "Write key-value pairs to settings.json file", "summary": "Implements a _write method that stores a single key/value into the settings.json file at the configured settings path. This function is used by attribute setters to persist configuration changes to disk.", "tags": ["settings", "write", "json", "persistence"], "content": "# _write\n\n```python\ndef _write(self, name, value)\n```\n\nWrite key, value to settings.json.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/settings.py"}, "isabl_cli/isabl_cli/settings.py:__init__": {"title": "Settings object constructor and defaults initialization", "summary": "Constructor initializes the settings wrapper with defaults and optional import_strings/path_strings behaviors. It follows an approach similar to drf-yasg, allowing for default values and special handling of import or path strings when building the final settings object.", "tags": ["settings", "constructor", "defaults", "drf-yasg"], "content": "# __init__\n\n```python\ndef __init__(self, defaults, import_strings=None, path_strings=None)\n```\n\nSee: https://github.com/axnsan12/drf-yasg/.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/settings.py"}, "isabl_cli/isabl_cli/settings.py:_settings": {"title": "Return system-wide settings as dictionary", "summary": "_settings() builds and returns a dictionary of system settings used by the CLI and other components. The function provides a single place to gather application-level configuration values into a Python dict for consumption across the codebase.", "tags": ["settings", "configuration", "cli", "globals"], "content": "# _settings\n\n```python\ndef _settings(self)\n```\n\nReturn dictionary system with settings.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/settings.py"}, "isabl_cli/isabl_cli/settings.py:is_admin_user": {"title": "Check if current user has admin privileges", "summary": "Defines is_admin_user to return True when the currently authenticated username matches the configured ADMIN_USER. This helper is used to gate admin-only CLI actions or privileged operations within the Isabl CLI.", "tags": ["auth", "admin", "permissions", "cli"], "content": "# is_admin_user\n\n```python\ndef is_admin_user(self)\n```\n\nReturn True if current user is ADMIN_USER.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/settings.py"}, "isabl_cli/isabl_cli/settings.py:api_username": {"title": "Retrieve current API username from database", "summary": "Provides api_username method to fetch the current username from the database (the active API user). This accessor centralizes how the CLI determines the identity used for API interactions.", "tags": ["auth", "username", "database", "api"], "content": "# api_username\n\n```python\ndef api_username(self)\n```\n\nGet current username from database.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/settings.py"}, "isabl_cli/isabl_cli/settings.py:client": {"title": "Get client configuration from database function", "summary": "Describes the client() helper which retrieves the API/client configuration from the database for the CLI. This function centralizes access to client-related settings so other CLI components can use consistent connection parameters.", "tags": ["settings", "client", "configuration", "database"], "content": "# client\n\n```python\ndef client(self)\n```\n\nGet client configuration from database.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/settings.py"}, "isabl_cli/isabl_cli/signals.py:resume_analysis_signal": {"title": "Signal to resume paused or failed analyses", "summary": "resume_analysis_signal(analysis) emits a signal to resume execution of an existing analysis that was paused or failed. It is used by the web layer or orchestration code to request re-scheduling without wiping existing outputs.", "tags": ["signals", "analysis", "orchestration", "execution"], "content": "# resume_analysis_signal\n\n```python\ndef resume_analysis_signal(analysis)\n```\n\nSignal to resume analysis execution.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/signals.py"}, "isabl_cli/isabl_cli/signals.py:force_analysis_signal": {"title": "Signal to wipe analysis and restart execution", "summary": "force_analysis_signal(analysis) triggers a hard restart of an analysis by wiping its state and requesting a fresh execution. This signal is intended for cases where outputs or state are corrupted and a full re-run is required.", "tags": ["signals", "force", "analysis", "restart"], "content": "# force_analysis_signal\n\n```python\ndef force_analysis_signal(analysis)\n```\n\nSignal to wipe analysis and restart.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/signals.py"}, "isabl_cli/isabl_cli/signals.py:run_web_signals": {"title": "Trigger analysis execution signals from web interface", "summary": "run_web_signals(analysis, restart=False, force=False) centralizes logic for emitting the appropriate execution-related signals based on provided flags. Depending on restart and force booleans it will call resume or force workflows so the web UI or API can request different types of re-runs.", "tags": ["web", "signals", "execution", "orchestration"], "content": "# run_web_signals\n\n```python\ndef run_web_signals(analysis, restart=False, force=False)\n```\n\nSignal to trigger analyses executions.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/signals.py"}, "isabl_cli/isabl_cli/utils.py:makedirs": {"title": "Make directories while ignoring umask settings", "summary": "makedirs(path, exist_ok=True, mode=511) is a utility wrapper to create directories while ignoring the process umask so the requested mode is honored. It supports an exist_ok flag and accepts a numeric mode (default 511, i.e. 0o777) to control created permissions.", "tags": ["filesystem", "utils", "permissions", "io"], "content": "# makedirs\n\n```python\ndef makedirs(path, exist_ok=True, mode=511)\n```\n\nMake dirs ignoring umask.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/utils.py"}, "isabl_cli/isabl_cli/utils.py:get_results": {"title": "Retrieve matched analysis results from experiments", "summary": "get_results(...) searches an experiment object for results matching a result_key and optional application, target, reference, or analysis constraints. It supports filtering by application pk, name, version, and assembly, allows status filtering, and returns a list of (result_value, analysis_pk) tuples; use result_key='storage_url' to get output directories.", "tags": ["results", "experiments", "filtering", "analysis"], "content": "# get_results\n\n```python\ndef get_results(experiment, result_key, application_key=None, application_name=None, application_version=None, application_assembly=None, targets=None, references=None, analyses=None, status='SUCCEEDED', raise_error=True)\n```\n\nMatch results from a experiment object.\n\nIf targets, references or analyses are provided the analysis result must\nmatch these list of samples and dependencies. Match can be done by app pk, by app\nname, or by app name and cversion.\n\nPass `result_key='storage_url'` to get the output directory.\n\nArguments:\n    experiment (dict): experiment object for which result will be retrieved.\n    result_key (dict): name of the result.\n    application_key (int): key of the application that generated the result.\n    application_name (str): name of the application that generated the result.\n    application_version (str): version of the application that generated the result.\n    application_assembly (str): assembly name of the app. i.e: GRCh37.\n    targets (list): target experiments dicts that must match.\n    references (dict): reference experiments dicts that must match.\n    analyses (dict): analyses dicts that must match.\n    status (str): expected analysis status. For multiple, string with `/`.\n\nReturns:\n    list: of tuples (result_value, analysis primary key).", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/utils.py"}, "isabl_cli/isabl_cli/utils.py:get_result": {"title": "Get a single validated analysis result tuple", "summary": "get_result(...) is a convenience wrapper around get_results that returns a single (result_value, analysis_pk) tuple and provides clearer error messages including application_name and application_assembly. It reuses the same filtering/signature as get_results but enforces a single-match expectation and better user-facing errors.", "tags": ["results", "helpers", "error-handling", "api"], "content": "# get_result\n\n```python\ndef get_result(*args, **kwargs)\n```\n\nSee get_results for full signature.\n\nArguments:\n    args (list): see get_results.\n    kwargs (dict): see get_results.\n    application_name (str): app name to display a more explicit error.\n    application_assembly (str): app assembly name to display better error.\n\nReturns:\n    tuple: result value, analysis pk that produced the result", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/utils.py"}, "isabl_cli/isabl_cli/utils.py:traverse_dict": {"title": "Traverse nested dictionary by list of keys", "summary": "traverse_dict(dictionary, keys, serialize=False) walks through a nested dictionary following the provided list of keys to return the nested value. If serialize is True it forces the return to a string, converting nested dict values to JSON, otherwise it returns the raw Python object.", "tags": ["utils", "dict", "traversal", "serialization"], "content": "# traverse_dict\n\n```python\ndef traverse_dict(dictionary, keys, serialize=False)\n```\n\nTraverse a `dictionary` using a list of `keys`.\n\nArguments:\n    dictionary (dict): dict to be traversed.\n    keys (list): keys to be explored.\n    serialize (bool): force to string, if value is dict use json.dumps.\n\nReturns:\n    str: if `serialize` is True.\n    object: if `serialize` is false.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/utils.py"}, "isabl_cli/isabl_cli/utils.py:apply_decorators": {"title": "Apply a list of decorators to callable", "summary": "apply_decorators(decorators) is a small utility that composes and applies a list of decorators to a target callable. It automates wrapping a function with multiple decorators in the correct order and references a common StackOverflow pattern for implementation.", "tags": ["python", "decorators", "utils", "functional"], "content": "# apply_decorators\n\n```python\ndef apply_decorators(decorators)\n```\n\nApply a list of decorators to callable.\n\nSee: http://stackoverflow.com/questions/4122815", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/utils.py"}, "isabl_cli/isabl_cli/utils.py:get_rsync_command": {"title": "Generate rsync command string for directory transfer", "summary": "Describes a helper that builds an rsync command string to move or synchronize a source directory to a destination path. The function accepts src, dst and an optional chmod argument (default 'a-w') and returns the constructed command string for execution by the CLI.", "tags": ["rsync", "transfer", "cli", "filesystem"], "content": "# get_rsync_command\n\n```python\ndef get_rsync_command(src, dst, chmod='a-w')\n```\n\nGet str for commant to move `src` directory to `dst`.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/utils.py"}, "isabl_cli/isabl_cli/utils.py:check_rsync_version": {"title": "Detect outdated rsync lacking append-verify option", "summary": "Explains a utility that parses rsync version output to determine if the installed rsync supports the --append-verify option. This check is used to detect older rsync installations that may not safely support certain resume/append behaviors.", "tags": ["rsync", "compatibility", "validation", "cli"], "content": "# check_rsync_version\n\n```python\ndef check_rsync_version(version_stdout)\n```\n\nCheck for outdated rsync lacking the --append-verify.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/utils.py"}, "isabl_cli/isabl_cli/utils.py:get_tree_size": {"title": "Compute total directory size in bytes", "summary": "Documents a utility that recursively computes the total size of a directory tree and returns the result in bytes. It accepts a path and an optional follow_symlinks flag (default False) to control whether symlinked files are included in the calculation.", "tags": ["filesystem", "disk-usage", "utilities"], "content": "# get_tree_size\n\n```python\ndef get_tree_size(path, follow_symlinks=False)\n```\n\nReturn total size of directory in bytes.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/utils.py"}, "isabl_cli/isabl_cli/utils.py:force_link": {"title": "Create or replace hard link between paths", "summary": "Describes a helper that forcefully creates a hard link from src to dst. The utility ensures the link is created even if a destination exists (typically by removing or replacing it) and surfaces relevant filesystem errors.", "tags": ["filesystem", "links", "utilities", "atomic-ops"], "content": "# force_link\n\n```python\ndef force_link(src, dst)\n```\n\nForce a link between src and dst.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/utils.py"}, "isabl_cli/isabl_cli/utils.py:force_symlink": {"title": "Create or replace symbolic link between paths", "summary": "Documents a utility that forcefully creates a symbolic link pointing from dst to src, replacing any existing destination. This helper simplifies safe symlink creation in scripts by handling pre-existing files or links and raising on fatal errors.", "tags": ["symlink", "filesystem", "utilities", "cli"], "content": "# force_symlink\n\n```python\ndef force_symlink(src, dst)\n```\n\nForce a symlink between src and dst.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/utils.py"}, "isabl_cli/isabl_cli/utils.py:tar_dir": {"title": "Compress directory into tar archive at output path", "summary": "Provides a utility to create a tar archive of a source directory at a specified output path. The function encapsulates archiving logic used by the CLI to bundle directories for storage or transfer.", "tags": ["tar", "archiving", "compression", "utilities"], "content": "# tar_dir\n\n```python\ndef tar_dir(output_path, source_dir)\n```\n\nCompress a `source_dir` in `output_path`.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/utils.py"}, "isabl_cli/isabl_cli/utils.py:check_admin": {"title": "Enforce admin user permissions for CLI actions", "summary": "Describes a permission-check helper that raises a PermissionError if the current user is not the configured system admin (system_settings.ADMIN_USER). An optional message parameter can customize the raised error message for clearer diagnostics in CLI commands.", "tags": ["permissions", "admin", "security", "utilities"], "content": "# check_admin\n\n```python\ndef check_admin(msg=None)\n```\n\nRaise `PermissionError` if user is not `system_settings.ADMIN_USER`.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/utils.py"}, "isabl_cli/isabl_cli/utils.py:echo_add_commit_message": {"title": "Print advisory about --commit flag usage", "summary": "Documents a small helper that echoes a message advising about the use of the --commit flag in CLI commands. It is intended to standardize and centralize the informational text shown to users when committing changes via the CLI.", "tags": ["cli", "messaging", "usability", "flags"], "content": "# echo_add_commit_message\n\n```python\ndef echo_add_commit_message()\n```\n\nEcho add `--commit` flag message.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/utils.py"}, "isabl_cli/isabl_cli/utils.py:echo_title": {"title": "Print colored blinking title text to console", "summary": "Explains a utility to print a title string to the console with optional color and blinking effect. The function accepts a title, a color (default 'cyan'), and a blink boolean to style CLI output consistently across commands.", "tags": ["cli", "ui", "formatting", "logging"], "content": "# echo_title\n\n```python\ndef echo_title(title, color='cyan', blink=False)\n```\n\nEcho a title.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/utils.py"}, "isabl_cli/isabl_cli/utils.py:find_owner": {"title": "Determine filesystem owner of a directory", "summary": "Describes a helper that returns the owner of a file or directory. The function inspects filesystem metadata to resolve the owning user (typically by uid -> username lookup) and is useful for permission checks or reporting in the CLI.", "tags": ["ownership", "filesystem", "utilities", "permissions"], "content": "# find_owner\n\n```python\ndef find_owner(filename)\n```\n\nFind directory owner.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/utils.py"}, "isabl_cli/isabl_cli/utils.py:assert_same_owner": {"title": "Ensure filesystem path owned by current user", "summary": "Small utility that validates a filesystem path is owned by the same user (owner) as the process. Use it to guard operations that require files or directories to be owned by the invoking user to avoid permission or security issues.", "tags": ["file-permissions", "security", "cli-utils", "filesystem"], "content": "# assert_same_owner\n\n```python\ndef assert_same_owner(path)\n```\n\nValidate that a path is owned by the same user.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/utils.py"}, "isabl_cli/isabl_cli/utils.py:called_from": {"title": "Print caller location for debugging traces", "summary": "Utility to print where the current function was called from, with configurable stack depth and verbosity. It is useful for debugging or logging to trace call sites during CLI execution or while troubleshooting code paths.", "tags": ["debugging", "stacktrace", "logging", "cli-utils"], "content": "# called_from\n\n```python\ndef called_from(depth=1, verbose=True)\n```\n\nPrint where the current function was called from.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/utils.py"}, "isabl_cli/isabl_cli/utils.py:send_analytics": {"title": "Send analytics for CLI commands (decorator)", "summary": "Helper that can be used either as a method or as a decorator on click group commands to send analytics events. It integrates telemetry into CLI commands so usage and events can be tracked after command execution.", "tags": ["analytics", "telemetry", "click", "cli"], "content": "# send_analytics\n\n```python\ndef send_analytics(command)\n```\n\nCan be used as method or decorator of click group commands to send analytics.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/utils.py"}, "isabl_cli/isabl_cli/utils.py:first_matching_file": {"title": "Find first file matching pattern recursively", "summary": "Searches a directory recursively and returns the first file matching a glob pattern, with options to exclude substrings, sort by newest first, and allow no-match as optional. Raises errors for invalid directories or when no match is found unless optional=True.", "tags": ["file-search", "glob", "filesystem", "utilities"], "content": "# first_matching_file\n\n```python\ndef first_matching_file(directory, pattern, exclude=None, sort_by_newest=True, optional=False)\n```\n\nRecursively search within a directory for the first file that matches the pattern.\nArgs:\n    directory (str): the directory to search within.\n    pattern (str): a glob pattern (e.g., '*.txt') to match filenames.\n    exclude (str, optional): files containing this substring will be skipped.\n    sort_by_newest (bool, optional): sort by file's creation time, newer to older.\n    optional (bool): ok if none is found.\n\nReturns:\n    str: the path to the first matching file as a string.\n\nRaises:\n    NotADirectoryError: If `directory` is not a valid directory.\n    FileNotFoundError: If no matching file is found.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/utils.py"}, "isabl_cli/isabl_cli/utils.py:wrapper": {"title": "CLI command wrapper to send tracking events", "summary": "A wrapper function for CLI command contexts that sends a tracking/analytics event after the command finishes. It is intended to be used with click command invocations so telemetry is emitted post-execution.", "tags": ["analytics", "click", "command-hooks", "cli-utils"], "content": "# wrapper\n\n```python\ndef wrapper(ctx, *args, **kwargs)\n```\n\nSend track event after the command is executed.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/utils.py"}, "isabl_cli/isabl_cli/validators.py:validate_patterns_are_files": {"title": "Validate file patterns exist and non-empty", "summary": "Validator that checks a list of filename patterns (globs) match existing files and optionally ensures matched files are non-zero size. Returns True when all patterns resolve to existing files (and non-empty when check_size=True).", "tags": ["validators", "file-glob", "input-validation", "cli"], "content": "# validate_patterns_are_files\n\n```python\ndef validate_patterns_are_files(patterns, check_size=True)\n```\n\nCheck that a list of `patterns` are valid files.\n\nArguments:\n    patterns (list): a list of patterns to be check.\n    check_size (bool): check size is not zero for all files matched.\n\nReturns:\n    bool: True if all patterns match existing files.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/validators.py"}, "isabl_cli/isabl_cli/validators.py:validate_patterns_are_dirs": {"title": "Validate directory patterns exist", "summary": "Checks that a list of directory patterns resolves to existing directories. It returns True when all provided patterns match directories, and is intended for validating directory-type CLI inputs before further processing.", "tags": ["validators", "directories", "input-validation", "cli"], "content": "# validate_patterns_are_dirs\n\n```python\ndef validate_patterns_are_dirs(patterns)\n```\n\nCheck that a list of `patterns` are valid dirs.\n\nArguments:\n    patterns (list): a list of directory patterns.\n\nReturns:\n    bool: True if all patterns match existing directories.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/validators.py"}, "isabl_cli/isabl_cli/validators.py:validate_pairs": {"title": "Validate and retrieve experiment pairs", "summary": "Utility to validate 'pairs' input and retrieve the corresponding experiments. It is used to ensure pair specifications map to existing experiment records before downstream processing or analysis.", "tags": ["pairs", "experiments", "validators", "metadata"], "content": "# validate_pairs\n\n```python\ndef validate_pairs(pairs)\n```\n\nGet experiments for pairs.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/validators.py"}, "isabl_cli/isabl_cli/validators.py:validate_pairs_from_file": {"title": "Parse and validate sample pairs from TSV file", "summary": "A click-style validator that reads a TSV file from a given path and returns pair definitions. Designed as a CLI callback (ctx, _, path) to load and validate pair lists provided via files before running commands.", "tags": ["file-parsing", "tsv", "validators", "cli"], "content": "# validate_pairs_from_file\n\n```python\ndef validate_pairs_from_file(ctx, _, path)\n```\n\nReturn pairs from tsv file.", "source_url": "https://github.com/papaemmelab/isabl_cli/blob/main/isabl_cli/validators.py"}, "docs/index": {"title": "Isabl documentation home and feature overview", "summary": "The main documentation landing page for Isabl, introducing the platform and linking to key sections such as Quick Start, data model, importing/retrieving data, application development, deployment, and contributing. It outlines Isabl's purpose as a plug-and-play framework for managing patient-centric multimodal data and points to further resources.", "tags": ["documentation", "overview", "quick-start", "platform"], "content": "# Home | Isabl Docs\n\n[![Image 1](https://docs.isabl.io/~gitbook/image?url=https%3A%2F%2F627844163-files.gitbook.io%2F%7E%2Ffiles%2Fv0%2Fb%2Fgitbook-legacy-files%2Fo%2Fspaces%252F-LgZ3I0-6juLK-X9gb1Z%252Favatar.png%3Fgeneration%3D1559694644494728%26alt%3Dmedia&width=32&dpr=3&quality=100&sign=40226d3&sv=2)![Image 2](https://docs.isabl.io/~gitbook/image?url=https%3A%2F%2F627844163-files.gitbook.io%2F%7E%2Ffiles%2Fv0%2Fb%2Fgitbook-legacy-files%2Fo%2Fspaces%252F-LgZ3I0-6juLK-X9gb1Z%252Favatar.png%3Fgeneration%3D1559694644494728%26alt%3Dmedia&width=32&dpr=3&quality=100&sign=40226d3&sv=2) Isabl Docs](https://docs.isabl.io/)\n\n\u2318Ctrl k\n\n[![Image 3](https://docs.isabl.io/~gitbook/image?url=https%3A%2F%2F627844163-files.gitbook.io%2F%7E%2Ffiles%2Fv0%2Fb%2Fgitbook-legacy-files%2Fo%2Fspaces%252F-LgZ3I0-6juLK-X9gb1Z%252Favatar.png%3Fgeneration%3D1559694644494728%26alt%3Dmedia&width=32&dpr=3&quality=100&sign=40226d3&sv=2)![Image 4](https://docs.isabl.io/~gitbook/image?url=https%3A%2F%2F627844163-files.gitbook.io%2F%7E%2Ffiles%2Fv0%2Fb%2Fgitbook-legacy-files%2Fo%2Fspaces%252F-LgZ3I0-6juLK-X9gb1Z%252Favatar.png%3Fgeneration%3D1559694644494728%26alt%3Dmedia&width=32&dpr=3&quality=100&sign=40226d3&sv=2) Isabl Docs](https://docs.isabl.io/)\n\n*   [Home](https://docs.isabl.io/)\n*   [Quick Start](https://docs.isabl.io/quick-start)\n*   [Registering Metadata](https://docs.isabl.io/data-model)\n*   [Importing Data](https://docs.isabl.io/import-data)\n*   [Retrieving Data](https://docs.isabl.io/retrieve-data)\n*   [Writing Applications](https://docs.isabl.io/writing-applications)\n*   [Operational Automations](https://docs.isabl.io/operational-automations)\n*   [Project Privacy](https://docs.isabl.io/project-privacy)\n*   [Isabl Settings](https://docs.isabl.io/isabl-settings)\n*   [Production Deployment](https://docs.isabl.io/production-deployment)\n*   [Maintenance](https://docs.isabl.io/maintenance)\n*   [Batch Systems](https://docs.isabl.io/batch-systems)\n*   [Contributing Guide](https://docs.isabl.io/contributing-guide)\n*   [Other CLI commands](https://docs.isabl.io/other-cli-commands)\n*   [Bonus tips](https://docs.isabl.io/bonus-tips)\n\n[Powered by GitBook](https://www.gitbook.com/?utm_source=content&utm_medium=trademark&utm_campaign=-LgZ3I0-6juLK-X9gb1Z)\n\nOn this page\n\nCopy\n\n# Home\n\nIsabl is a platform for the integration, management, and processing of individual-centric multimodal data. Welcome to the Isabl Documentation!\n\nIsabl is a plug-and-play data science framework designed to support the processing of multimodal patient-centric data. Have questions? Ask [here](https://gitter.im/isabl-io/community).\n\nIsabl has been developed by the [Elli Papaemmanuil's Lab](https://www.mskcc.org/research-areas/labs/elli-papaemmanuil).\n\n[Quick Start](https://docs.isabl.io/quick-start)\n## [](https://docs.isabl.io/#features)\n\nFeatures\n\n*     \n\n\ud83d\udc7e **Backend, Data Model and RESTful API**\n\n    *     Metadata version control \n    *     Fully featured and brisk RESTful API with extensive swagger documentation \n    *     Comprehensive permissions controls and user groups \n    *     \n\nPatient centric relational model with support for:\n\n        *     _Individuals_, _samples_, _experiments_ and _cohorts_ \n        *     _Assembly_ aware bioinformatics _applications_ and _analyses_ \n        *     Choice models such as _diseases_, _centers_ and more \n        *     **Custom fields** for all schemas! \n\n*     \n\n\ud83e\udd16 **Command Line Interface and Software Development Kit**\n\n    *     Digital Assets Management (Permissions, Storage, Tracking) \n    *     Automated execution and tracking of bioinformatics applications \n    *     Project and patient level results auto-merge \n    *     Operational automations on data import and analyses status change \n    *     Dynamic retrieval of data and results using versatile queries \n    *     Fully featured SDK for post-processing analyses \n\n*     \n\n\ud83d\ude80 **Web Application**\n\n    *     User Interface to browse and manage the operations metadata \n    *     Analyses tracking and results visualization \n    *     Flexibility to edit and customize models \n    *     Batch creation of metadata by excel file submission \n    *     Single Page Application that provides a crispy user experience \n    *     Possibility to integrate third-party services like JIRA \n\n*     \n\n\u2705 **Plug-n-play and reliable codebase**\n\n    *     Docker-compose is the only dependency for the web application and the backend \n    *     The Command Line Interface is a portable pip installable package \n    *     Continuously Integrated with +98 % coverage across all codebase \n    *     isabl is upgradable, no need to fork out from codebase \n\n## [](https://docs.isabl.io/#who-is-using-isabl)\n\nWho is using Isabl\n\n*     [Elli Papaemmanuil's lab](https://www.mskcc.org/research-areas/labs/elli-papaemmanuil). \n*     The [Department of Pediatrics](https://www.mskcc.org/blog/one-one-how-msk-using-precision-medicine-tailor-treatment-children-cancer) at Memorial Sloan Kettering. \n*     [Sohrab Shah's lab](https://www.mskcc.org/profile/sohrab-shah). \n*     The [Microbiome Program](https://www.mskcc.org/research-areas/labs/jonathan-peled) at Memorial Sloan Kettering. \n*     The [Single-Cell Analytics Service (SAIL)](https://www.mskcc.org/research/ski/innovation-labs/single-cell-analytics-innovation-lab-sail) at Memorial Sloan Kettering. \n*     [Cristina Curtis' Lab](https://med.stanford.edu/curtislab.html) at Stanford Medicine. \n\n... And many other groups at Weill Cornell, California State University, University of Oviedo (Spain), are currently testing it as a potential fit!\n\n## [](https://docs.isabl.io/#infrastructure)\n\nInfrastructure\n\nIsabl is a modular infrastructure with four main components: (1) an individual-centric and extensible relational database (Isabl-db); (2) a comprehensive RESTful API (Isabl-api) used to support integration with data processing environments and enterprise systems (e.g. clinical databases, visualization platforms); (3) a Command Line Client (CLI; Isabl-cli) used to manage digital assets and deploy bioinformatics applications; (4) a front end single page web application (Isabl-web) with system wide queries enabled.\n\n![Image 5](https://docs.isabl.io/~gitbook/image?url=https%3A%2F%2Fdocs.google.com%2Fdrawings%2Fd%2Fe%2F2PACX-1vQnO2UBtPAGuUqobgfAH2GFbvuE5aCAzrYpxa_nBb8tigeT-GdfAkurTnOpzrpa_QDxBH-nrQ-lnxEk%2Fpub%3Fw%3D998%26h%3D712&width=768&dpr=3&quality=100&sign=abc1a911&sv=2)\n\nIsabl is composed of a patient centric relational model, a web-based metadata architecture, and a command line client.\n\nRESTful API capabilities are documented with Swagger ([https://swagger.io](https://swagger.io/)) and Redoc ([https://github.com/Rebilly/ReDoc](https://github.com/Rebilly/ReDoc)) following OpenAPI specifications ([https://www.openapis.org](https://www.openapis.org/)). Importantly, Isabl's metadata infrastructure is decoupled and agnostic of compute and data storage environments (e.g. local, cluster, cloud). This functionality separates dependencies and fosters interoperability across compute environments.\n\n![Image 6](https://docs.isabl.io/~gitbook/image?url=https%3A%2F%2Fdocs.google.com%2Fdrawings%2Fd%2Fe%2F2PACX-1vTLYVgPubPSlSgyUahpZ3fOT-p9lmrMet5qCl1klS2VzEnFIE4zLW0WK3cDZaCgAmwcsa3Ta-J9ujdG%2Fpub%3Fw%3D889%26h%3D667&width=768&dpr=3&quality=100&sign=9f4223fe&sv=2)\n\n## [](https://docs.isabl.io/#data-model)\n\nData Model\n\n**I**sabl's relational model maps workflows for data provenance, processing, and governance. Metadata is captured across the following thematic categories: (1) project, individual and sample level attributes; (2) raw data properties including experimental technique, technology, and related parameters (e.g. read length); (3) analytical workflows to include a complete audit trail of versioned algorithms, related execution parameters, reference files, analyses status tracking, and results deposition; (4) data governance information for management of system and data access across stakeholders.\n\n![Image 7](https://docs.isabl.io/~gitbook/image?url=https%3A%2F%2Fdocs.google.com%2Fdrawings%2Fd%2Fe%2F2PACX-1vTG3QBMOtwM5DhpFG07iQFj0SA0J7CE4e8Xd3ZJcpJy24EiDu9HbGomqslNFgqV3rauJ-z_VU-SY-ja%2Fpub%3Fw%3D1305%26h%3D791&width=768&dpr=3&quality=100&sign=5dd8f90&sv=2)\n\n## [](https://docs.isabl.io/#why-isabl)\n\nWhy Isabl\n\nIsabl ensures that all bioinformatics operations follow the DATA reproducibility checklist (Documentation, Automation, Traceability, and Autonomy), whilst guarantees that assets are managed according to the FAIR principles (Findable, Interoperable, Accessible, Reusable).\n\n![Image 8](https://docs.isabl.io/~gitbook/image?url=https%3A%2F%2Fdocs.google.com%2Fdrawings%2Fd%2Fe%2F2PACX-1vRCagXfy-ubxEHKL3GOSTTEGE1g9hWk1Ic0yTx3tWsBJHWSIfO5Y2Hcu0wTeBtb3mA1DeEXKw4c1fBd%2Fpub%3Fw%3D1216%26h%3D810&width=768&dpr=3&quality=100&sign=736da4f1&sv=2)\n\nHere are some reasons why you may want to use Isabl:\n\n*     You don't have a +10 engineers group but do have hundreds of samples \n*     You'll rather not have your data managed by postdocs, PhD students \n*     Crosslink samples from different cohorts \n*     Answer new questions using existing data \n*     Full log and audit trail of your informatics operations \n*     Automatically merge results as new samples are added to big cohorts \n*     You want to have programmatic access to the entire data capital \n*     Seamlessly run reproducible pipelines across your projects \n\n## [](https://docs.isabl.io/#similar-projects)\n\nSimilar projects\n\n*     [The Genome Modeling System](https://github.com/genome/gms)_Genome Institute at Washington University platform._ \n*     [SeqWare](https://seqware.github.io/)_analyze massive genomics datasets._ \n*     [QuickNGS](http://bifacility.uni-koeln.de/quickngs/web/)_efficient high-throughput data analysis of Next-Generation Sequencing data._ \n*     [HTS-flow](https://github.com/arnaudceol/htsflow)_a framework for the management and analysis of NGS data._ \n\n## [](https://docs.isabl.io/#what-isabl-is-not)\n\nWhat Isabl is not\n\n*     Isabl is not a _Workflow Management System_ such as [toil](https://github.com/DataBiosphere/toil), [bpipe](https://github.com/ssadedin/bpipe), instead Isabl facilitates automated deployment and databasing of data processing pipelines. \n*     Isabl is not a _Platform as a Service (PAAS)_ provider such as [DNA nexus](https://www.dnanexus.com/), [Seven Bridges](https://www.sevenbridges.com/) or [Fire Cloud](https://software.broadinstitute.org/firecloud/), instead an information system that could potentially feed in metadata and data to these services. \n*     Isabl differs from _Server Workbenches_ such as [Galaxy](https://usegalaxy.org/) or Pegasus, instead of being configuration friendly, Isabl is designed to conduct systematic analyses automatically and in a standardized way with as little human input as possible. \n*     Isabl is not a _Workflow Language_, instead the Bioinformatics Applications in `isabl` only define meta-data driven validation and logic to build commands to trigger pipelines written in any language. \n\n[Next Quick Start](https://docs.isabl.io/quick-start)\n\nLast updated 1 year ago\n\nWas this helpful?\n\n*   [Features](https://docs.isabl.io/#features)\n*   [Who is using Isabl](https://docs.isabl.io/#who-is-using-isabl)\n*   [Infrastructure](https://docs.isabl.io/#infrastructure)\n*   [Data Model](https://docs.isabl.io/#data-model)\n*   [Why Isabl](https://docs.isabl.io/#why-isabl)\n*   [Similar projects](https://docs.isabl.io/#similar-projects)\n*   [What Isabl is not](https://docs.isabl.io/#what-isabl-is-not)\n\nWas this helpful?", "source_url": "https://docs.isabl.io/"}, "docs/batch-systems": {"title": "Using Batch Systems for Scalable Job Submission", "summary": "Describes how Isabl submits jobs to common cluster batch systems and the import strings to use from isabl_cli. The page lists supported systems (LSF, Slurm, SGE), points to their submit_* import strings, and references vendor documentation for resource and queue configuration. It also explains that submissions are customizable through Isabl settings and batch system hooks.", "tags": ["batch-systems", "job-scheduling", "slurm", "lsf", "sge"], "content": "# Batch Systems | Isabl Docs\n\n[![Image 1](https://docs.isabl.io/~gitbook/image?url=https%3A%2F%2F627844163-files.gitbook.io%2F%7E%2Ffiles%2Fv0%2Fb%2Fgitbook-legacy-files%2Fo%2Fspaces%252F-LgZ3I0-6juLK-X9gb1Z%252Favatar.png%3Fgeneration%3D1559694644494728%26alt%3Dmedia&width=32&dpr=3&quality=100&sign=40226d3&sv=2)![Image 2](https://docs.isabl.io/~gitbook/image?url=https%3A%2F%2F627844163-files.gitbook.io%2F%7E%2Ffiles%2Fv0%2Fb%2Fgitbook-legacy-files%2Fo%2Fspaces%252F-LgZ3I0-6juLK-X9gb1Z%252Favatar.png%3Fgeneration%3D1559694644494728%26alt%3Dmedia&width=32&dpr=3&quality=100&sign=40226d3&sv=2) Isabl Docs](https://docs.isabl.io/)\n\n\u2318Ctrl k\n\n[![Image 3](https://docs.isabl.io/~gitbook/image?url=https%3A%2F%2F627844163-files.gitbook.io%2F%7E%2Ffiles%2Fv0%2Fb%2Fgitbook-legacy-files%2Fo%2Fspaces%252F-LgZ3I0-6juLK-X9gb1Z%252Favatar.png%3Fgeneration%3D1559694644494728%26alt%3Dmedia&width=32&dpr=3&quality=100&sign=40226d3&sv=2)![Image 4](https://docs.isabl.io/~gitbook/image?url=https%3A%2F%2F627844163-files.gitbook.io%2F%7E%2Ffiles%2Fv0%2Fb%2Fgitbook-legacy-files%2Fo%2Fspaces%252F-LgZ3I0-6juLK-X9gb1Z%252Favatar.png%3Fgeneration%3D1559694644494728%26alt%3Dmedia&width=32&dpr=3&quality=100&sign=40226d3&sv=2) Isabl Docs](https://docs.isabl.io/)\n\n*   [Home](https://docs.isabl.io/)\n*   [Quick Start](https://docs.isabl.io/quick-start)\n*   [Registering Metadata](https://docs.isabl.io/data-model)\n*   [Importing Data](https://docs.isabl.io/import-data)\n*   [Retrieving Data](https://docs.isabl.io/retrieve-data)\n*   [Writing Applications](https://docs.isabl.io/writing-applications)\n*   [Operational Automations](https://docs.isabl.io/operational-automations)\n*   [Project Privacy](https://docs.isabl.io/project-privacy)\n*   [Isabl Settings](https://docs.isabl.io/isabl-settings)\n*   [Production Deployment](https://docs.isabl.io/production-deployment)\n*   [Maintenance](https://docs.isabl.io/maintenance)\n*   [Batch Systems](https://docs.isabl.io/batch-systems)\n*   [Contributing Guide](https://docs.isabl.io/contributing-guide)\n*   [Other CLI commands](https://docs.isabl.io/other-cli-commands)\n*   [Bonus tips](https://docs.isabl.io/bonus-tips)\n\n[Powered by GitBook](https://www.gitbook.com/?utm_source=content&utm_medium=trademark&utm_campaign=-LgZ3I0-6juLK-X9gb1Z)\n\nOn this page\n\nCopy\n\n# Batch Systems\n\n\ud83e\udeb5 How to use different known batch systems for scalable job execution.\n\nCurrently Isabl supports out-of-the-box the following **Batch Systems**to submit jobs with `isabl_cli`:\n\nBatch System\n\nImport string\n\nResources\n\n**LSF**\n\n`isabl_cli.batch_systems.submit_lsf`\n\nSee more [IBM Spectrum LSF Reference](https://www.ibm.com/docs/en/spectrum-lsf/10.1.0?topic=started-quick-start-guide)\n\n**Slurm**\n\n`isabl_cli.batch_systems.submit_slurm`\n\nSee more [Slurm - Worload Manager](https://slurm.schedmd.com/documentation.html)\n\n**SGE**\n\n`isabl_cli.batch_systems.submit_sge`\n\nSee more [Sun Grid Engine - queueing system](http://star.mit.edu/cluster/docs/0.93.3/guides/sge.html)\n\nBy default, all submissions are run **locally** using `isabl_cli.batch_systems.submit_local`\n\n**What about other systems?**\n\nTo support other systems or to customize your own submission steps, you may need just to create your own method and define it on your `isabl_cli`'s `SUBMIT_ANALYSES` setting.\n\n**Example:**\n\nCopy\n```\n# my_isabl_extension/batch_systems.py\ndef submit_aws_batch(app, command_tuples):\n    ...\n```\n\nCopy\n```\n// Isabl CLI settings:\n{..., \"SUBMIT_ANALYSES\": \"my_isabl_extension.batch_systems.submit_aws_batch\"}\n```\n\nFor help, creating your custom submit method, follow direction from the [existing ones](https://github.com/papaemmelab/isabl_cli/tree/master/isabl_cli/batch_systems).\n\nPlease consider contributing any new one to the **Isabl Project!**\ud83d\udc8c\n\n### [](https://docs.isabl.io/batch-systems#submit-configuration)\n\n**Submit Configuration**\n\n`isabl_cli`'s settings have a `SUBMIT_CONFIGURATION` dictionary to provide extra arguments to the submission methods. Current parameters used are:\n\nAttribute\n\nType\n\nDescription\n\nExample value\n\n`extra_args`\n\n_String_\n\nAny additional extra arguments passed to the batch submission command.\n\n`\" --time=48:00:00 \"`. Add a maximum job array time.\n\n`get_requirements`\n\n_Import String_\n\nTo define custom resources needs for different applications or methods.\n\nSee the example above.\n\n`throttle_by`\n\n_Integer_\n\nTo control the maximum number of jobs running simultaneously in a job array submission.\n\n`50`\n\n`unbuffer`\n\n_Boolean_\n\nredirect stdout and stderr to same file with ascii characters that allow colored logs.\n\n`True`. If not defined, it is `False` by default. See [Colored Logs](https://docs.isabl.io/batch-systems#colored-logs-with-batch-systems).\n\n#### [](https://docs.isabl.io/batch-systems#example-settings)\n\nExample Settings:\n\n[Previous Maintenance](https://docs.isabl.io/maintenance)[Next Contributing Guide](https://docs.isabl.io/contributing-guide)\n\nLast updated 1 year ago\n\nWas this helpful?\n\nWas this helpful?\n\nCopy\n```\n// isabl cli's settings\n{\n    ...\n    \"SUBMIT_ANALYSES\": \"isabl_cli.batch_systems.submit_slurm\",\n    \"SUBMIT_CONFIGURATION\": {\n        \"extra_args\": \" -p GPU_PARTITION \",\n        \"get_requirements\": \"my_isabl_extension.batch_systems.get_slurm_requirements\",\n        \"throttle_by\": 50,\n        \"unbuffer\": True,\n    },\n    \"SUBMIT_MERGE_ANALYSIS\": \"my_isabl_extension.batch_systems.submit_merge_analysis_to_slurm\",\n    ...\n}\n```\n\nCopy\n```\n# my_isabl_extension/batch_systems.py\n\nfrom my_isabl_extension import apps\n\ndef get_slurm_requirements(app, targets_methods):\n    \"\"\"Get custom requirements for any app or method.\"\"\"\n    \n    # Defaults\n    runtime = 240 # 6 hours\n    cores = 1\n    memory = 6\n    \n    # Technique.method-specific    \n    method = targets_methods[0]\n    if method == \"WG\":\n        runtime = 10080 # 7 days\n\n    # Application-specific\n    if isinstance(app, apps.BwaMemGRCh37):\n        cores = 32\n        runtime = 1440 # 24 hours\n        memory = 8\n\n    return (\n        f\"--ntasks=1 \"\n        f\"--cpus-per-task={cores} \"\n        f\"--time={runtime} \"\n        f\"--mem-per-cpu={memory}G \"\n    )\n\ndef submit_merge_analysis_to_slurm(instance, application, command):\n    \"\"\"Submit command to run merge in slurm.\"\"\"\n\n    command = f\"sbatch --ntasks=1 --cpus-per-task=1 --mem=32G {command}\"\n    subprocess.check_call(command.split())\n    click.secho(f\"Submitted project level merge with: {command}\", fg=\"yellow\")\n```", "source_url": "https://docs.isabl.io/batch-systems"}, "docs/bonus-tips": {"title": "Bonus Tips and Enhancements for Isabl CLI", "summary": "Provides extra features and usability tips to improve the Isabl experience, with practical examples and visual aids. The document highlights enhancements like colored logs with batch systems and other CLI conveniences that make debugging and monitoring jobs easier. It is aimed at power users who want to maximize productivity and visibility when running Isabl workflows.", "tags": ["tips", "cli", "logging", "usability"], "content": "# Bonus tips | Isabl Docs\n\n[![Image 1](https://docs.isabl.io/~gitbook/image?url=https%3A%2F%2F627844163-files.gitbook.io%2F%7E%2Ffiles%2Fv0%2Fb%2Fgitbook-legacy-files%2Fo%2Fspaces%252F-LgZ3I0-6juLK-X9gb1Z%252Favatar.png%3Fgeneration%3D1559694644494728%26alt%3Dmedia&width=32&dpr=3&quality=100&sign=40226d3&sv=2)![Image 2](https://docs.isabl.io/~gitbook/image?url=https%3A%2F%2F627844163-files.gitbook.io%2F%7E%2Ffiles%2Fv0%2Fb%2Fgitbook-legacy-files%2Fo%2Fspaces%252F-LgZ3I0-6juLK-X9gb1Z%252Favatar.png%3Fgeneration%3D1559694644494728%26alt%3Dmedia&width=32&dpr=3&quality=100&sign=40226d3&sv=2) Isabl Docs](https://docs.isabl.io/)\n\n\u2318Ctrl k\n\n[![Image 3](https://docs.isabl.io/~gitbook/image?url=https%3A%2F%2F627844163-files.gitbook.io%2F%7E%2Ffiles%2Fv0%2Fb%2Fgitbook-legacy-files%2Fo%2Fspaces%252F-LgZ3I0-6juLK-X9gb1Z%252Favatar.png%3Fgeneration%3D1559694644494728%26alt%3Dmedia&width=32&dpr=3&quality=100&sign=40226d3&sv=2)![Image 4](https://docs.isabl.io/~gitbook/image?url=https%3A%2F%2F627844163-files.gitbook.io%2F%7E%2Ffiles%2Fv0%2Fb%2Fgitbook-legacy-files%2Fo%2Fspaces%252F-LgZ3I0-6juLK-X9gb1Z%252Favatar.png%3Fgeneration%3D1559694644494728%26alt%3Dmedia&width=32&dpr=3&quality=100&sign=40226d3&sv=2) Isabl Docs](https://docs.isabl.io/)\n\n*   [Home](https://docs.isabl.io/)\n*   [Quick Start](https://docs.isabl.io/quick-start)\n*   [Registering Metadata](https://docs.isabl.io/data-model)\n*   [Importing Data](https://docs.isabl.io/import-data)\n*   [Retrieving Data](https://docs.isabl.io/retrieve-data)\n*   [Writing Applications](https://docs.isabl.io/writing-applications)\n*   [Operational Automations](https://docs.isabl.io/operational-automations)\n*   [Project Privacy](https://docs.isabl.io/project-privacy)\n*   [Isabl Settings](https://docs.isabl.io/isabl-settings)\n*   [Production Deployment](https://docs.isabl.io/production-deployment)\n*   [Maintenance](https://docs.isabl.io/maintenance)\n*   [Batch Systems](https://docs.isabl.io/batch-systems)\n*   [Contributing Guide](https://docs.isabl.io/contributing-guide)\n*   [Other CLI commands](https://docs.isabl.io/other-cli-commands)\n*   [Bonus tips](https://docs.isabl.io/bonus-tips)\n\n[Powered by GitBook](https://www.gitbook.com/?utm_source=content&utm_medium=trademark&utm_campaign=-LgZ3I0-6juLK-X9gb1Z)\n\nOn this page\n\nCopy\n\n# Bonus tips\n\n\ud83c\udfb1 Some extra features to maximize your isabl journey!\"\n\n### [](https://docs.isabl.io/bonus-tips#colored-logs-with-batch-systems)\n\n\ud83c\udf08 Colored Logs with Batch Systems\n\n![Image 5](https://docs.isabl.io/~gitbook/image?url=https%3A%2F%2F627844163-files.gitbook.io%2F%7E%2Ffiles%2Fv0%2Fb%2Fgitbook-x-prod.appspot.com%2Fo%2Fspaces%252F-LgZ3I0-6juLK-X9gb1Z%252Fuploads%252FEpBHmQrxRb8NXgcR5MgQ%252FScreenshot%25202024-10-21%2520at%25202.18.41%25E2%2580%25AFPM.png%3Falt%3Dmedia%26token%3D55eabe53-38ec-423d-8169-f4e0340060f3&width=768&dpr=3&quality=100&sign=72812ac0&sv=2)\n\nDefault: No colored logs \n\n![Image 6](https://docs.isabl.io/~gitbook/image?url=https%3A%2F%2F627844163-files.gitbook.io%2F%7E%2Ffiles%2Fv0%2Fb%2Fgitbook-x-prod.appspot.com%2Fo%2Fspaces%252F-LgZ3I0-6juLK-X9gb1Z%252Fuploads%252F6Go4EZdtHmFNX0RhnaVC%252FScreenshot%25202024-10-21%2520at%25202.17.20%25E2%2580%25AFPM.png%3Falt%3Dmedia%26token%3D1da4626f-af75-409d-ba65-cf7ccddc8ea1&width=768&dpr=3&quality=100&sign=9c7de1ef&sv=2)\n\nColored unbuffered logs\n\nWhen running jobs using batch systems like LSF or Slurm, many programs detect whether their output is being sent to a terminal (`TTY`) or a file and may disable features like color formatting or progress bars if they detect non-interactive output.\n\nOne workaround, using it carefully, is to use the [`unbuffer`](https://manpages.debian.org/stretch/expect/unbuffer.1.en.html) utility from the `expect` package. `unbuffer` simulates a terminal by running the program in a pseudo-terminal (PTY), tricking the program into thinking it is running interactively in a terminal, so it continues to produce colored output.\n\n**Requirements:**\n\n*     Have `unbuffer` available. See tips on [how to install on an HPC](https://docs.isabl.io/bonus-tips#bonus-tip-install-unbuffer-in-an-hpc-with-miniconda). \n*     `unbuffer: True`**,**in your `isabl_cli`s `SUBMIT_CONFIGURATION`. \n*     `>=0.3.28` version of `@papaemmelab/isabl_web` \n*     [8c8ad75](https://github.com/papaemmelab/isabl_cli/commit/8c8ad75c85b6c86f291787fcfbf4a51532930154) commit of `isabl_cli` \n\nUnbuffered output will redirect both stdout/stderr to the same`head_job.log`file, causing the file `head_job.err` output to be empty from errors of the running application.\n\nBy simulating a pseudo-PTY, you can gain desired colored outputs, but some outputs like progress bars print undesired characters that can clutter your logs. Be aware to disable those if possible (i.e. `toil ... --disableProgress),`or for specific applications add a dummy env`TERM=dumb` to tell the program there's no effective terminal attached.\n\n#### [](https://docs.isabl.io/bonus-tips#bonus-tip-install-unbuffer-in-an-hpc-with-miniconda)\n\n**\u2795 Bonus tip**: **Install**`unbuffer`**in an HPC with miniconda.**\n\nHaving `$OPT_DIR` where you install your packages and `$BIN_DIR` where you add your executable binaries, create a runnable script called `unbuffer`, where you add your miniconda env's `unbuffer` executable and add its shared libraries:\n\nTest it works:\n\n### [](https://docs.isabl.io/bonus-tips#use-igv-links-to-be-1-click-away-to-visualize-your-mutation-calls)\n\n\ud83e\uddec Use IGV links to be 1-click away to visualize your mutation calls\n\nThe frontend allows the user to visualize alignment files (`bam`/ `cram`) through IGV, by using the API's `igv` endpoints in 2 cases:\n\n*     `/api/v1/experiments/igv/{system_id}?assembly={assembly}&locus={locus}`: To visualize an aligned file stored in the`Experiment.bam_files` \n*     `/api/v1/analyses/igv/{pk}?result={result}&result_index={result_index}&locus={locus}`: to visualize an analysis result whose `frontend_type` is `igv_<result><result-index>. See`[`Frontend Result Types`](https://docs.isabl.io/writing-applications#frontend-result-types) \n\nBut you can also use these endpoints widely to dynamically create your own **igv links**, when doing data analyses or creating reports!\n\n#### [](https://docs.isabl.io/bonus-tips#demo-time)\n\nDemo time\n\nThis is a cool example where you can generate clickable links in jupyter to visualize fusions events. The idea is to be 1-click away to visualize the reads of a specific sample in the locus of interest to see if a mutation is a real event or not. Taking into account that the param variable `locus` supports multiple locus for example to visualize the 2 breakpoints of the fusion. Each locus, creates a new igv view in a tab. The locus can be defined by adding multiple ones separated by a space.\n\n![Image 7](https://docs.isabl.io/~gitbook/image?url=https%3A%2F%2F627844163-files.gitbook.io%2F%7E%2Ffiles%2Fv0%2Fb%2Fgitbook-x-prod.appspot.com%2Fo%2Fspaces%252F-LgZ3I0-6juLK-X9gb1Z%252Fuploads%252FuizTEuYEgsB1jzoZDLsf%252FScreenshot%25202025-02-26%2520at%25201.38.40%25E2%2580%25AFPM.png%3Falt%3Dmedia%26token%3Dbf0f031d-639f-4116-9959-eadbc9cfdc6d&width=768&dpr=3&quality=100&sign=4b157fb1&sv=2)\n\nCreate IGV links in a Jupyter Notebook\n\nHere you have an **IGV link** for each event. For example, clicking in the `GTF2I::GTF2IRD1`fusion link, will open an IGV where you can visualize the 2 breakpoints: `https://{my-instance}/api/v1/experiments/igv/{system_id}?assembly={assembly}&locus={locus1}%20{locus2}`\n\n`%20` is the safe url encoding for a `space` character, needed to append multiple locus.\n\n![Image 8](https://docs.isabl.io/~gitbook/image?url=https%3A%2F%2F627844163-files.gitbook.io%2F%7E%2Ffiles%2Fv0%2Fb%2Fgitbook-x-prod.appspot.com%2Fo%2Fspaces%252F-LgZ3I0-6juLK-X9gb1Z%252Fuploads%252FW4ibAmLKUX9Mjuh6woqj%252FScreenshot%25202025-02-26%2520at%25201.39.20%25E2%2580%25AFPM.png%3Falt%3Dmedia%26token%3Ddedaf527-d79f-4d2b-a1f2-d347a14896aa&width=768&dpr=3&quality=100&sign=f2046ac2&sv=2)\n\nVisualize events pointing to the desired locus. Example showing a`GTF2I::GTF2IRD1`fusion in 2 locus at `7:74125440`and`7:74015371`\n\nThis feature is extremely powerful and useful, especially for generating reports with tens or thousands of variants. You can click on any variant to visualize it in IGV!\n\n[Previous Other CLI commands](https://docs.isabl.io/other-cli-commands)\n\nLast updated 1 year ago\n\nWas this helpful?\n\n*   [\ud83c\udf08 Colored Logs with Batch Systems](https://docs.isabl.io/bonus-tips#colored-logs-with-batch-systems)\n*   [\ud83e\uddec Use IGV links to be 1-click away to visualize your mutation calls](https://docs.isabl.io/bonus-tips#use-igv-links-to-be-1-click-away-to-visualize-your-mutation-calls)\n\nWas this helpful?\n\nCopy\n```\nconda create -n myenv\nconda activate myenv\nconda install -c conda-forge expect\n```\n\n${BIN_DIR}/unbuffer\n\nCopy\n```\n#!/bin/bash\n\nOPT_DIR=<your-installation-dir>\nexport LD_LIBRARY_PATH=\"${OPT_DIR}/miniconda3/envs/myenv/lib:$LD_LIBRARY_PATH\"\n${OPT_DIR}/miniconda3/envs/myenv/bin/unbuffer \"$@\"\n```\n\nCopy\n```\n$ unbuffer echo \"Hello World!\" \nHello World\n```", "source_url": "https://docs.isabl.io/bonus-tips"}, "docs/contributing-guide": {"title": "Contributing and Setting Up Development Environment", "summary": "Step-by-step contributor tutorial to set up a full local development environment for the Isabl stack. It covers cloning the isabl_api repository and other components, guidance on where to add documentation or code, and encourages community contributions with crediting and coding principles. The guide is aimed at developers who want to extend Isabl or run it locally for development and testing.", "tags": ["contributing", "development", "isabl-api", "setup"], "content": "# Contributing Guide | Isabl Docs\n\n[![Image 1](https://docs.isabl.io/~gitbook/image?url=https%3A%2F%2F627844163-files.gitbook.io%2F%7E%2Ffiles%2Fv0%2Fb%2Fgitbook-legacy-files%2Fo%2Fspaces%252F-LgZ3I0-6juLK-X9gb1Z%252Favatar.png%3Fgeneration%3D1559694644494728%26alt%3Dmedia&width=32&dpr=3&quality=100&sign=40226d3&sv=2)![Image 2](https://docs.isabl.io/~gitbook/image?url=https%3A%2F%2F627844163-files.gitbook.io%2F%7E%2Ffiles%2Fv0%2Fb%2Fgitbook-legacy-files%2Fo%2Fspaces%252F-LgZ3I0-6juLK-X9gb1Z%252Favatar.png%3Fgeneration%3D1559694644494728%26alt%3Dmedia&width=32&dpr=3&quality=100&sign=40226d3&sv=2) Isabl Docs](https://docs.isabl.io/)\n\n\u2318Ctrl k\n\n[![Image 3](https://docs.isabl.io/~gitbook/image?url=https%3A%2F%2F627844163-files.gitbook.io%2F%7E%2Ffiles%2Fv0%2Fb%2Fgitbook-legacy-files%2Fo%2Fspaces%252F-LgZ3I0-6juLK-X9gb1Z%252Favatar.png%3Fgeneration%3D1559694644494728%26alt%3Dmedia&width=32&dpr=3&quality=100&sign=40226d3&sv=2)![Image 4](https://docs.isabl.io/~gitbook/image?url=https%3A%2F%2F627844163-files.gitbook.io%2F%7E%2Ffiles%2Fv0%2Fb%2Fgitbook-legacy-files%2Fo%2Fspaces%252F-LgZ3I0-6juLK-X9gb1Z%252Favatar.png%3Fgeneration%3D1559694644494728%26alt%3Dmedia&width=32&dpr=3&quality=100&sign=40226d3&sv=2) Isabl Docs](https://docs.isabl.io/)\n\n*   [Home](https://docs.isabl.io/)\n*   [Quick Start](https://docs.isabl.io/quick-start)\n*   [Registering Metadata](https://docs.isabl.io/data-model)\n*   [Importing Data](https://docs.isabl.io/import-data)\n*   [Retrieving Data](https://docs.isabl.io/retrieve-data)\n*   [Writing Applications](https://docs.isabl.io/writing-applications)\n*   [Operational Automations](https://docs.isabl.io/operational-automations)\n*   [Project Privacy](https://docs.isabl.io/project-privacy)\n*   [Isabl Settings](https://docs.isabl.io/isabl-settings)\n*   [Production Deployment](https://docs.isabl.io/production-deployment)\n*   [Maintenance](https://docs.isabl.io/maintenance)\n*   [Batch Systems](https://docs.isabl.io/batch-systems)\n*   [Contributing Guide](https://docs.isabl.io/contributing-guide)\n*   [Other CLI commands](https://docs.isabl.io/other-cli-commands)\n*   [Bonus tips](https://docs.isabl.io/bonus-tips)\n\n[Powered by GitBook](https://www.gitbook.com/?utm_source=content&utm_medium=trademark&utm_campaign=-LgZ3I0-6juLK-X9gb1Z)\n\nOn this page\n\nCopy\n\n# Contributing Guide\n\n\u23f1 tutorial time: 20 minutes\n\nThis tutorial will help you set up a **full Development environment** with all components of the `isabl` infrastructure.\n\n\ud83d\udcd8 Contributions are welcome, and they are greatly appreciated! Every little bit helps, and credit will always be given. `isabl` could always use more documentation, whether as part of the **README**, in doc-strings, or even on the web in blog posts articles, and such. Also, bet you've read the [Zen Of Python](https://www.python.org/dev/peps/pep-0020/#the-zen-of-python).\n\n## [](https://docs.isabl.io/contributing-guide#isabl-api)\n\nIsabl API\n\n1.     Clone locally:\n\n Copy\n```\ngit clone [email\u00a0protected]:papaemmelab/isabl_api.git\n cd api\n```  \n2.     Build containers:\n\n Copy`docker-compose build`  \n3.     Run tests using [tox](http://tox.readthedocs.io/):\n\n Copy`docker-compose run --rm django tox` \nOr run [pytest](https://docs.pytest.org/en/latest/), [pylint](https://www.pylint.org/) or [pydocstyle](http://www.pydocstyle.org/en) individually:\n\n Copy\n```\ndocker-compose run --rm django pytest --ds example.settings --cov=isabl_api\n docker-compose run --rm django pylint isabl_api\n docker-compose run --rm django pydocstyle isabl_api\n```  \n\n#### [](https://docs.isabl.io/contributing-guide#create-a-superuser)\n\nCreate a superuser\n\nCreate a superuser with username and password set to `admin` (we
