name: isabl-knowledge

sources:
  - name: isabl_cli
    type: github_python
    repo: papaemmelab/isabl_cli
    extract: [docstrings, cli_commands]

  - name: docs
    type: gitbook
    url: https://docs.isabl.io

  - name: isabl_api
    type: django_api
    repo: papaemmelab/isabl_api

  # Optional: uncomment when you have a swagger.json generated
  # - name: isabl_api_openapi
  #   type: openapi
  #   url: knowledge/data/swagger.json

tree:
  max_depth: 4
  max_nodes: 100
  orientation: "capabilities and use cases, not code internals"

output:
  github_repo: isabl-knowledge-tree
